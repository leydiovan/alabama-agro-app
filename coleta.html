<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Coleta de Ponto — Alabama Agro</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#1c2333;--line:#30363d;--text:#e6edf3;--muted:#8b949e;--gold:#ffc107;--ok:#27ae60;--err:#f85149}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font:16px system-ui,Segoe UI,Arial,sans-serif;padding:12px 12px 90px;-webkit-text-size-adjust:100%}
.top{position:sticky;top:0;background:var(--bg);padding:8px 0 10px;border-bottom:1px solid var(--line);margin-bottom:10px;z-index:5}
.top h1{font-size:18px;display:flex;align-items:center;gap:8px}.top h1 .l{color:var(--gold)}
.top .d{color:var(--muted);font-size:13px}
.card{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:12px 13px;margin-bottom:20px}
.footer2{display:flex;align-items:stretch;justify-content:flex-end;gap:12px;margin-top:12px}
.footer2 .padcol{flex:1;display:flex;flex-direction:column;gap:6px}
.padtall{flex:1;min-height:74px;background:none;border:1.5px solid var(--gold);color:var(--gold);border-radius:10px;font-weight:800;font-size:15px;letter-spacing:.5px;cursor:pointer}
.flagcol{flex:0 0 auto;display:flex;flex-direction:column;justify-content:center;gap:22px;padding-right:4px}
.flagcol label{display:flex;align-items:center;gap:8px;font-size:15px;white-space:nowrap;color:var(--text)}
.flagcol input{width:24px;height:24px}
.card .nm{font-size:16px;font-weight:800}.card .tp{color:var(--muted);font-size:12px}
label{font-size:13px;color:var(--muted);display:block;margin-bottom:4px}
input,select{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:10px;color:var(--text);font-size:17px;padding:11px}
input[type=time]{font-variant-numeric:tabular-nums}
.turno{display:flex;gap:8px;margin-bottom:8px}.turno>div{flex:1}
.fl{display:flex;gap:14px;align-items:center;margin-top:6px;flex-wrap:wrap}
.fl label{display:flex;align-items:center;gap:7px;color:var(--text);font-size:15px;margin:0}
.fl input{width:22px;height:22px}
.btn{display:block;width:100%;border:0;border-radius:12px;padding:15px;font-size:17px;font-weight:800;cursor:pointer;margin-top:8px}
.btn.g{background:var(--gold);color:#1a1100}.btn.k{background:var(--ok);color:#fff}.btn.s{background:var(--bg3);color:var(--text);border:1px solid var(--line)}
.btn.sm{padding:9px;font-size:14px;width:auto;display:inline-block;margin:0}
.bar{position:fixed;left:0;right:0;bottom:0;background:var(--bg2);border-top:1px solid var(--line);padding:10px 12px;display:flex;gap:10px;z-index:9}
.bar .btn{margin:0}
.row{display:flex;gap:10px;align-items:center}
.lk{background:none;border:0;color:var(--gold);font-size:14px;cursor:pointer;padding:6px 0}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:left}
th{color:var(--muted);font-size:11px;text-transform:uppercase}
td.n,th.n{text-align:right}
.he{color:var(--gold);font-weight:700}.muted{color:var(--muted)}
.ok{color:var(--ok)}.err{color:var(--err)}
.center{text-align:center}
.big{font-size:54px}
.add{color:var(--gold);font-size:14px;background:none;border:1px dashed var(--gold);border-radius:8px;padding:6px 10px;cursor:pointer;margin-top:4px}
.padbtn{color:var(--gold);font-size:13px;font-weight:700;background:none;border:1px solid var(--gold);border-radius:8px;padding:7px 12px;cursor:pointer;margin-top:6px}
.card.lock{position:relative;opacity:.55;filter:grayscale(.3)}
.card.lock .lockbadge{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-8deg);background:#1c2333;border:2px solid var(--gold);color:var(--gold);font-weight:900;font-size:18px;letter-spacing:1px;padding:8px 18px;border-radius:10px;box-shadow:0 4px 14px rgba(0,0,0,.4);white-space:nowrap}
</style>
</head>
<body>
<div id="app"><div class="center muted" style="margin-top:40px">Carregando…</div></div>
<script>
const SB_URL='https://ngdidjtfgmtkdkvqwfjf.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5nZGlkanRmZ210a2RrdnF3ZmpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NTU5MDYsImV4cCI6MjA5NjUzMTkwNn0.OW9hGEFTvSYx_THv3DR9pt8xIVC0B9Pw2bTDGD6TBLk';
let SB=null;
const $=id=>document.getElementById(id);
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const TIPO={registrado:'Registrado',diarista:'Diarista',temporario:'Temporário'};
let CFG={}, FUNCS=[], STEP='login', DATA='', FERIADO=false, E={}, JA={}, USER_EMAIL='';   // E[fid]={m:[{ent,sai}],falta,folga}; JA[fid]=já no banco ou na fila

/* ---- tempo / cálculo (igual ao módulo) ---- */
function t2m(s){ if(!s) return null; const m=String(s).match(/^(\d{1,2}):(\d{2})$/); return m?(+m[1])*60+(+m[2]):null; }
function m2hm(min){ if(min==null) return '—'; min=Math.round(min); const h=Math.floor(min/60),mm=min%60; return h+'h'+(mm?(' '+String(mm).padStart(2,'0')):''); }
function ovl(a1,a2,b1,b2){ return Math.max(0,Math.min(a2,b2)-Math.max(a1,b1)); }
function janela(ds,fer){ if(fer) return []; const dow=new Date(ds+'T12:00:00').getDay(); const j=(CFG.jornada||{})[String(dow)]||[]; return j.map(p=>[t2m(p[0]),t2m(p[1])]); }
function turnosPadrao(ds){ const dow=new Date(ds+'T12:00:00').getDay(); const j=(CFG.jornada||{})[String(dow)]||[]; return j.map(p=>({ent:p[0],sai:p[1]})); }
function calc(ds, e, fer){
  const r={worked:0,normal:0,extra:0}; if(e.falta||e.folga) return r;
  const jan=janela(ds,fer);
  (e.m||[]).forEach(mc=>{ const a=t2m(mc.ent),b=t2m(mc.sai); if(a==null||b==null||b<=a) return; r.worked+=(b-a); let n=0; jan.forEach(w=>n+=ovl(a,b,w[0],w[1])); r.normal+=n; });
  r.extra=Math.max(0,r.worked-r.normal); const tol=+CFG.tolerancia_min||5; if(r.extra<=tol) r.extra=0;
  return r;
}

/* ---- Supabase ---- */
function _msg(t,c){ let e=$('msg'); if(e){ e.textContent=t; e.style.color=c||'var(--muted)'; } }
async function boot(){
  if(!window.supabase){ $('app').innerHTML='<div class="center err" style="margin-top:40px">Sem internet.</div>'; return; }
  SB=window.supabase.createClient(SB_URL,SB_KEY);
  const {data}=await SB.auth.getSession();
  if(data&&data.session){ entrar(); } else { STEP='login'; render(); }
}
async function entrar(){
  try{ const {data:c}=await SB.from('rh_config').select('*').eq('id','main').limit(1); if(c&&c[0]) CFG=c[0]; }catch(e){}
  if(!CFG.jornada) CFG.jornada={"1":[["07:00","12:00"],["13:30","18:00"]],"2":[["07:00","12:00"],["13:30","18:00"]],"3":[["07:00","12:00"],["13:30","18:00"]],"4":[["07:00","12:00"],["13:30","18:00"]],"5":[["07:00","12:00"],["13:30","18:00"]],"6":[["07:00","12:00"]],"0":[]};
  try{ const {data:f}=await SB.from('funcionarios').select('id,nome,tipo,ativo').order('nome'); FUNCS=(f||[]).filter(x=>x.ativo!==false); }catch(e){ FUNCS=[]; }
  try{ const {data:u}=await SB.auth.getUser(); USER_EMAIL=(u&&u.user&&u.user.email)||''; }catch(e){}
  STEP='data'; DATA=(()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');})(); render();
}
async function login(){
  const em=$('e').value.trim(), pw=$('s').value;
  if(!em||!pw){ _msg('Preencha e-mail e senha.','var(--gold)'); return; }
  _msg('Entrando…'); try{ const {error}=await SB.auth.signInWithPassword({email:em,password:pw}); if(error){ _msg('Erro: '+error.message,'var(--err)'); return; } entrar(); }
  catch(e){ _msg('Falha: '+e.message,'var(--err)'); }
}

/* ---- render por etapa ---- */
function render(){
  if(STEP==='login') return renderLogin();
  if(STEP==='data')  return renderData();
  if(STEP==='preencher') return renderPreencher();
  if(STEP==='revisar') return renderRevisar();
  if(STEP==='enviado') return renderEnviado();
}
function renderLogin(){
  $('app').innerHTML=`<div class="top"><h1><span class="l">🌱</span> Coleta de Ponto</h1><div class="d">Alabama Agro</div></div>
    <div class="card"><label>E-mail</label><input id="e" type="email" autocomplete="username">
    <label style="margin-top:10px">Senha</label><input id="s" type="password" autocomplete="current-password">
    <button class="btn g" id="b">Entrar</button><div id="msg" class="center" style="margin-top:10px;font-size:13px;min-height:16px"></div></div>`;
  $('b').onclick=login; $('s').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
}
function _dlabel(ds){ const d=new Date(ds+'T12:00:00'); return ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][d.getDay()]+' '+ds.split('-').reverse().join('/'); }
function renderData(){
  $('app').innerHTML=`<div class="top"><h1><span class="l">🗓️</span> Nova coleta</h1><div class="d">Escolha o dia do lançamento</div></div>
    <div class="card"><label>Data</label><input id="dt" type="date" value="${DATA}">
      <div class="fl" style="margin-top:12px"><label><input type="checkbox" id="fer"> Feriado (todos viram hora extra)</label></div>
      <button class="btn g" id="ir">Começar (${FUNCS.length} ativos)</button></div>
    <button class="lk" id="sair">sair</button>`;
  $('ir').onclick=async()=>{ DATA=$('dt').value||DATA; FERIADO=$('fer').checked; const b=$('ir'); b.disabled=true; b.textContent='Carregando…'; await iniciar(); };
  $('sair').onclick=async()=>{ await SB.auth.signOut(); location.reload(); };
}
async function iniciar(){
  JA={};
  try{ const {data}=await SB.from('ponto').select('funcionario_id,marcacoes,falta,folga,feriado').eq('data',DATA); (data||[]).forEach(p=>{p._st='lançado';JA[p.funcionario_id]=p;}); }catch(e){}
  try{ const {data}=await SB.from('ponto_pendente').select('funcionario_id,marcacoes,falta,folga,feriado').eq('data',DATA); (data||[]).forEach(p=>{ if(!JA[p.funcionario_id]){p._st='enviado';JA[p.funcionario_id]=p;} }); }catch(e){}
  E={};
  // cards começam VAZIOS (sem padrão automático); já-lançados ficam travados
  FUNCS.forEach(f=>{ if(!JA[f.id]) E[f.id]={ m:[{ent:'',sai:''},{ent:'',sai:''}], falta:false, folga:false }; });
  STEP='preencher'; render();
}
function cardPadrao(fid){ if(JA[fid])return; const t=turnosPadrao(DATA); E[fid].m = t.length? t.map(x=>({ent:x.ent,sai:x.sai})) : [{ent:'',sai:''},{ent:'',sai:''}]; render(); }
function _resumoJa(j){ const fer=j.feriado?' · feriado':''; if(j.falta) return 'Faltou'; if(j.folga) return 'Folga'; const ms=(j.marcacoes||[]).filter(x=>x.ent||x.sai).map(x=>(x.ent||'?')+'-'+(x.sai||'?')).join(' '); return (ms||'lançado')+fer; }
function renderPreencher(){
  let nLanc=0, nEdit=0;
  const cards=FUNCS.map(f=>{
    if(JA[f.id]){ nLanc++; const stl=JA[f.id]._st==='enviado'?'ENVIADO':'JÁ LANÇADO'; return `<div class="card lock"><div class="lockbadge">${stl}</div><div class="nm">${esc(f.nome)}</div><div class="tp">${TIPO[f.tipo]||f.tipo} · ${esc(_resumoJa(JA[f.id]))}</div></div>`; }
    nEdit++; const e=E[f.id]; const dis=e.falta||e.folga;
    const turnos=(e.m||[]).map((mc,i)=>`<div class="turno"><div><label>Entrada ${i+1}</label><input type="time" data-f="${f.id}" data-i="${i}" data-k="ent" value="${esc(mc.ent||'')}"></div><div><label>Saída ${i+1}</label><input type="time" data-f="${f.id}" data-i="${i}" data-k="sai" value="${esc(mc.sai||'')}"></div></div>`).join('');
    const left=dis?`<div class="muted" style="padding:6px 0;font-size:16px;font-weight:700">${e.falta?'Faltou':'Folga'}</div>`:turnos;
    return `<div class="card"><div class="nm">${esc(f.nome)}</div><div class="tp">${TIPO[f.tipo]||f.tipo}</div>
      <div style="margin-top:8px">${left}</div>
      <div class="footer2">
        ${dis?'':`<div class="padcol"><button class="padtall" data-pad="${f.id}">PADRÃO</button><button class="add" data-add="${f.id}">+ turno</button></div>`}
        <div class="flagcol">
          <label><input type="checkbox" data-flag="falta" data-f="${f.id}" ${e.falta?'checked':''}> Faltou</label>
          <label><input type="checkbox" data-flag="folga" data-f="${f.id}" ${e.folga?'checked':''}> Folga</label>
        </div>
      </div></div>`;
  }).join('');
  $('app').innerHTML=`<div class="top"><h1><span class="l">✍️</span> ${_dlabel(DATA)}${FERIADO?' · feriado':''}</h1><div class="d">${nEdit} a lançar${nLanc?(' · '+nLanc+' já lançado(s)'):''}</div></div>
    ${nEdit?'<button class="btn s" id="todos">⚡ Preencher TODOS os vazios com a jornada padrão</button>':''}
    ${cards||'<div class="card muted">Nenhum funcionário ativo.</div>'}
    <div class="bar"><button class="btn s" id="volta">◀ Data</button><button class="btn g" id="rev">Revisar ▶</button></div>`;
  document.querySelectorAll('input[type=time]').forEach(inp=>inp.onchange=()=>{ const e=E[+inp.dataset.f]; while(e.m.length<=+inp.dataset.i) e.m.push({ent:'',sai:''}); e.m[+inp.dataset.i][inp.dataset.k]=inp.value; });
  document.querySelectorAll('input[data-flag]').forEach(c=>c.onchange=()=>{ const e=E[+c.dataset.f]; e[c.dataset.flag]=c.checked; if(c.checked){ if(c.dataset.flag==='falta')e.folga=false; else e.falta=false; } render(); });
  document.querySelectorAll('[data-add]').forEach(b=>b.onclick=()=>{ E[+b.dataset.add].m.push({ent:'',sai:''}); render(); });
  document.querySelectorAll('[data-pad]').forEach(b=>b.onclick=()=>cardPadrao(+b.dataset.pad));
  if($('todos')) $('todos').onclick=()=>{ const t=turnosPadrao(DATA); FUNCS.forEach(f=>{ if(JA[f.id])return; const e=E[f.id]; if(!e.falta&&!e.folga&&!(e.m||[]).some(x=>x.ent||x.sai)) e.m=t.map(x=>({ent:x.ent,sai:x.sai})); }); render(); };
  $('volta').onclick=()=>{ STEP='data'; render(); };
  $('rev').onclick=()=>{ STEP='revisar'; render(); };
}
function renderRevisar(){
  const edit=FUNCS.filter(f=>!JA[f.id]);
  const aEnviar=edit.filter(f=>{ const e=E[f.id]; return e.falta||e.folga||(e.m||[]).some(x=>x.ent||x.sai); });
  const nJa=FUNCS.length-edit.length, nVazio=edit.length-aEnviar.length;
  let tExtra=0;
  const rows=aEnviar.map(f=>{ const e=E[f.id]; const r=calc(DATA,e,FERIADO); tExtra+=r.extra;
    const st=e.falta?'<span class="err">Faltou</span>':(e.folga?'<span class="muted">Folga</span>':(e.m||[]).filter(x=>x.ent||x.sai).map(x=>(x.ent||'?')+'-'+(x.sai||'?')).join(' ')||'<span class="muted">—</span>');
    return `<tr><td>${esc(f.nome)}</td><td>${st}</td><td class="n">${r.normal?m2hm(r.normal):'—'}</td><td class="n he">${r.extra?m2hm(r.extra):'—'}</td></tr>`;
  }).join('')||'<tr><td colspan="4" class="muted">Nada novo para enviar.</td></tr>';
  $('app').innerHTML=`<div class="top"><h1><span class="l">✅</span> Revisar</h1><div class="d">${_dlabel(DATA)}${FERIADO?' · feriado':''} — confira antes de enviar</div></div>
    <div class="card" style="padding:8px 12px"><b>Vai enviar: ${aEnviar.length}</b> · HE do dia: <span class="he">${m2hm(tExtra)}</span>${nJa?` · <span class="muted">${nJa} já lançado(s) (não mexe)</span>`:''}${nVazio?` · <span class="muted">${nVazio} vazio(s) (não envia)</span>`:''}</div>
    <div class="card" style="padding:6px 8px"><table><thead><tr><th>Funcionário</th><th>Turnos</th><th class="n">Normal</th><th class="n">Extra</th></tr></thead><tbody>${rows}</tbody></table></div>
    <div class="card muted" style="font-size:13px">⚠️ Depois de enviar, este aparelho <b>não tem mais acesso</b> aos dados. Só dá pra corrigir agora, antes de enviar.</div>
    <div class="bar"><button class="btn s" id="corrigir">◀ Corrigir</button><button class="btn k" id="enviar">📤 Enviar</button></div>`;
  $('corrigir').onclick=()=>{ STEP='preencher'; render(); };
  $('enviar').onclick=enviar;
}
async function enviar(){
  const btn=$('enviar'); if(btn){ btn.disabled=true; btn.textContent='Enviando…'; }
  // quem o coletor preencheu (tinha algo e não estava travado ao abrir)
  const intended=FUNCS.filter(f=>{ const e=E[f.id]; return e && (e.falta||e.folga||(e.m||[]).some(x=>x.ent||x.sai)); });
  // releitura anti-corrida: se alguém passou a ter registro (ponto/fila) depois que a tela abriu, não sobrescreve
  try{
    const a=await SB.from('ponto').select('funcionario_id').eq('data',DATA); (a.data||[]).forEach(p=>{ JA[p.funcionario_id]=JA[p.funcionario_id]||{_st:'lançado'}; });
    const b=await SB.from('ponto_pendente').select('funcionario_id').eq('data',DATA); (b.data||[]).forEach(p=>{ JA[p.funcionario_id]=JA[p.funcionario_id]||{_st:'enviado'}; });
  }catch(e){}
  const blocked=intended.filter(f=>JA[f.id]);
  const enviar=intended.filter(f=>!JA[f.id]);
  const linhas=enviar.map(f=>{ const e=E[f.id]; const dis=e.falta||e.folga; const marc=dis?[]:(e.m||[]).filter(x=>x&&(x.ent||x.sai)).map(x=>({ent:x.ent||'',sai:x.sai||''}));
    return { funcionario_id:f.id, data:DATA, marcacoes:marc, feriado:!!FERIADO, falta:!!e.falta, folga:!!e.folga, sem_he:false, enviado_por:USER_EMAIL||null };
  });
  try{
    if(linhas.length){ const {error}=await SB.from('ponto_pendente').upsert(linhas,{onConflict:'funcionario_id,data'}); if(error) throw error; }
    if(blocked.length) alert(blocked.length+' funcionário(s) já tinham sido lançados em outro aparelho e foram ignorados:\n'+blocked.map(f=>f.nome).join(', '));
    STEP='enviado'; E={}; window.scrollTo(0,0); render(); _enviadoN=linhas.length;
  }catch(err){ alert('Falha ao enviar: '+err.message); if(btn){ btn.disabled=false; btn.textContent='📤 Enviar'; } }
}
let _enviadoN=0;
function renderEnviado(){
  $('app').innerHTML=`<div class="center" style="margin-top:40px">
    <div class="big">✅</div>
    <h1 style="font-size:22px;margin:10px 0">Coleta enviada</h1>
    <div class="muted">${_dlabel(DATA)} · ${_enviadoN} funcionário(s)</div>
    <div class="muted" style="font-size:13px;margin-top:8px">Enviado para <b>aprovação</b> do administrador. Este aparelho não acessa o histórico.</div>
    <button class="btn g" id="nova" style="max-width:280px;margin:24px auto 0">Nova coleta</button>
    <button class="lk" id="sair2" style="margin:14px auto 0">sair</button></div>`;
  $('nova').onclick=()=>{ STEP='data'; DATA=(()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');})(); FERIADO=false; render(); };
  $('sair2').onclick=async()=>{ await SB.auth.signOut(); location.reload(); };
}
window.addEventListener('load',boot);
</script>
</body>
</html>
