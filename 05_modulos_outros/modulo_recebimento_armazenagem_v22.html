<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Recebimento e Armazenagem · Estoque — Gestão Alabama Agro</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#080d18; --bg2:#0d1526; --bg3:#111e35; --bg4:#162540; --bg5:#1c2e4a;
  --border:#1f3354; --border2:#2c4a78;
  --text:#e8edf5; --muted:#5a7aa0; --muted2:#3d5a80;
  --ok:#00c896; --ok-d:#00573f; --ok-l:#b2ffe8;
  --warn:#ffb300; --err:#ff4444; --gold:#ffc107; --gold-d:#e65100;
}
*{box-sizing:border-box;}
body{margin:0;font-family:'Segoe UI',system-ui,sans-serif;background:
  radial-gradient(1200px 600px at 70% -10%, #0e1830 0%, var(--bg) 60%);
  color:var(--text);min-height:100vh;font-size:13px;}
header{padding:14px 22px 12px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
header h1{margin:0;font-size:15px;color:var(--gold);letter-spacing:.4px;white-space:nowrap;}
.crumb{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;}
.spacer{flex:1;}
.sumpills{display:flex;gap:8px;flex-wrap:wrap;}
.pill{background:var(--bg4);border:1px solid var(--border);border-radius:9px;padding:5px 12px;display:flex;flex-direction:column;line-height:1.15;}
.pill .k{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.pill .v{font-size:14px;font-weight:800;}
.pill .v small{font-size:10px;color:var(--muted);font-weight:700;}
.pill .v2{font-size:10px;color:var(--muted);font-weight:700;margin-top:1px;}
.toolbar{display:flex;align-items:center;gap:10px;padding:12px 22px 0;}
.toolbar .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;}
.seg{display:inline-flex;border:1px solid var(--border2);border-radius:8px;overflow:hidden;}
.seg button{background:var(--bg3);border:none;color:var(--muted);padding:6px 14px;font-size:12px;cursor:pointer;transition:.15s;}
.seg button.on{background:linear-gradient(135deg,var(--bg5),var(--bg4));color:var(--gold);}
main{padding:8px 22px 28px;max-width:none;}
.sec-title{display:flex;align-items:baseline;gap:10px;margin:20px 0 10px;}
.sec-title h2{margin:0;font-size:13px;color:var(--text);text-transform:uppercase;letter-spacing:2px;}
.sec-title .sub{font-size:11px;color:var(--muted);}
.chip{font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.6px;white-space:nowrap;}
.chip.est{color:var(--gold);background:rgba(255,193,7,.10);border:1px dashed var(--gold-d);}
.chip.pes{color:var(--ok-l);background:rgba(0,200,150,.10);border:1px solid var(--ok-d);}

/* Armazém */
.armazem{background:linear-gradient(180deg,var(--bg3),var(--bg2));border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;gap:18px;align-items:center;flex-wrap:wrap;}
.armazem .ttl{font-size:14px;font-weight:800;color:var(--gold);}
.armazem .big{font-size:26px;font-weight:800;}
.armazem .big small{font-size:12px;color:var(--muted);font-weight:700;}
.armazem .barwrap{flex:1;min-width:240px;}
.armazem .bar{height:22px;border-radius:8px;background:var(--bg);border:1px solid var(--border);overflow:hidden;position:relative;}
.armazem .fill{height:100%;background:linear-gradient(90deg,#0d4f26,#15803d);}
.armazem .barlabel{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:3px;}
.kv{display:flex;flex-direction:column;line-height:1.2;}
.kv .k{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.kv .v{font-size:15px;font-weight:800;}

/* Silos */
.silos{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;}
.silo{background:linear-gradient(180deg,var(--bg3),var(--bg2));border:1px solid var(--border);border-radius:12px;padding:11px 12px;}
.silo .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.silo .head b{font-size:13px;}
.silo .lote{font-size:10px;color:var(--muted);}
.track{display:flex;gap:1px;height:18px;border-radius:5px;overflow:hidden;border:1px solid rgba(255,255,255,.08);}
.cell{flex:1;display:flex;align-items:center;justify-content:center;}
.cell span{font-size:7.5px;font-weight:700;color:rgba(255,255,255,.92);text-shadow:0 1px 1px rgba(0,0,0,.5);}
.silo .foot{display:flex;align-items:center;justify-content:space-between;margin-top:8px;gap:6px;}
.silo .sc{font-size:15px;font-weight:800;}
.silo .sc small{font-size:10px;color:var(--muted);font-weight:700;}
.silo .um{font-size:12px;font-weight:800;}

/* Algodão */
.cot{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;}
.cotcard{background:linear-gradient(180deg,var(--bg3),var(--bg2));border:1px solid var(--border);border-radius:14px;padding:12px 12px 11px;}
.skinbox{background:linear-gradient(180deg,#16263f 0%, #0e1d33 46%, #0a1322 47%, #0a1322 100%);border:1px solid var(--border);border-radius:10px;padding:4px 6px 0;overflow:hidden;}
.skinbox svg{width:100%;display:block;}
.cotcard .meta{display:flex;align-items:center;justify-content:space-between;margin-top:9px;gap:8px;}
.cotcard .name{font-weight:700;font-size:13px;}
.cotcard .talhao{color:var(--muted);font-size:10px;}
.cotcard .foot{display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
.cotcard .at{font-size:17px;font-weight:800;}
.cotcard .at small{font-size:11px;color:var(--muted);font-weight:700;margin-left:2px;}
.note{padding:6px 22px 0;color:var(--muted2);font-size:11px;max-width:820px;line-height:1.6;}
.note b{color:var(--muted);}

/* nav + botoes */
.nav{display:flex;border:1px solid var(--border2);border-radius:9px;overflow:hidden;}
.nav button{background:var(--bg3);border:none;color:var(--muted);padding:7px 16px;font-size:12.5px;cursor:pointer;transition:.15s;}
.nav button.on{background:linear-gradient(135deg,var(--bg5),var(--bg4));color:var(--gold);}
.btn{background:var(--bg4);border:1px solid var(--border);color:var(--text);padding:7px 16px;border-radius:8px;cursor:pointer;font-size:12.5px;transition:.15s;}
.btn:hover{background:var(--bg5);}
.btn.success{background:linear-gradient(135deg,#00695c,#004d40);border-color:var(--ok);color:#fff;font-weight:700;}
/* cadastro */
.cadwrap{background:linear-gradient(180deg,var(--bg3),var(--bg2));border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-top:14px;max-width:940px;}
.cadhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
.cadhead h2{margin:0;font-size:13px;text-transform:uppercase;letter-spacing:2px;color:var(--text);}
.formgrid{display:grid;grid-template-columns:1fr 290px;gap:18px;align-items:start;}
.formactions{grid-column:1 / -1;display:flex;align-items:center;gap:12px;margin-top:4px;}
.fcol{display:flex;flex-direction:column;gap:11px;}
.fcol label{display:flex;flex-direction:column;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;gap:4px;}
.fcol input,.fcol select{background:var(--bg);border:1px solid var(--border2);border-radius:7px;color:var(--text);padding:8px 10px;font-size:13px;}
.fcol input:focus,.fcol select:focus{outline:none;border-color:var(--gold-d);}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.segadd{display:flex;gap:8px;align-items:flex-end;}
.segadd label{flex:1;}
.seglist{display:flex;flex-wrap:wrap;gap:6px;min-height:24px;}
.segchip{font-size:11px;font-weight:700;color:#08121f;padding:3px 8px;border-radius:14px;cursor:pointer;user-select:none;}
.segchip b{opacity:.55;margin-left:4px;}
.segempty{color:var(--muted2);font-size:11px;}
.fprev{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:12px;}
.fprev .prevttl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;}
.fprev .skinbox{margin-bottom:8px;}
.fprev .track{margin-bottom:8px;}
.prevmeta{font-size:12px;color:var(--text);line-height:1.6;}
.tagcls{font-size:10px;font-weight:700;padding:2px 8px;border-radius:12px;text-transform:uppercase;letter-spacing:.5px;}
.tagcls.seco{background:rgba(220,38,38,.15);color:#fca5a5;}
.tagcls.faixa{background:rgba(234,179,8,.15);color:#fde047;}
.tagcls.umido{background:rgba(21,128,61,.18);color:#86efac;}
.hint{font-size:11px;color:var(--muted2);line-height:1.5;}
.fmsg{font-size:12px;font-weight:700;}
.fmsg.ok{color:var(--ok-l);} .fmsg.err{color:var(--err);}
@media(max-width:680px){.formgrid{grid-template-columns:1fr;}}

/* mapa */
.maptoolbar .lay{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text);cursor:pointer;}
.maptoolbar .lay input{accent-color:var(--gold);}
.maphint{font-size:11px;color:var(--muted);}
.mapwrap{position:relative;height:calc(100vh - 205px);min-height:460px;margin-top:6px;}
.mapsvg{position:absolute;inset:0;background:#0a1322;border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.mapsvg svg{width:100%;height:100%;display:block;}
.glab{fill:var(--muted2);font-size:10px;font-family:'Segoe UI',system-ui,sans-serif;}
.mk{cursor:pointer;}
.mk:hover{filter:brightness(1.3);}
.mapinfo{position:absolute;top:14px;right:14px;width:262px;max-height:calc(100% - 28px);overflow:auto;z-index:5;box-shadow:0 10px 26px rgba(0,0,0,.45);background:linear-gradient(180deg,var(--bg3),var(--bg2));border:1px solid var(--border2);border-radius:12px;padding:12px 14px;font-size:12px;color:var(--muted);}
.mapinfo.hidden{display:none;}
.cardbar{display:flex;align-items:center;justify-content:space-between;margin:-12px -14px 9px;padding:6px 10px;background:var(--bg4);border-bottom:1px solid var(--border);border-radius:12px 12px 0 0;cursor:grab;}
.cardbar:active{cursor:grabbing;}
.grip{font-size:9.5px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;user-select:none;}
.cardx{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1;padding:0 2px;}
.cardx:hover{color:var(--text);}
.mapinfo h3{margin:0 0 8px;font-size:14px;color:var(--gold);}
.ir{display:flex;justify-content:space-between;gap:8px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.ir span{color:var(--muted);} .ir b{color:var(--text);}
.mapempty{padding:30px;text-align:center;color:var(--muted2);}
@media(max-width:680px){.mapinfo{width:210px;}}

.maptoolbar .lay{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text);cursor:pointer;}
.maptoolbar .lay input{accent-color:var(--gold);}
.zoomctl{display:inline-flex;gap:5px;}
.zb{width:30px;height:27px;background:var(--bg4);border:1px solid var(--border);color:var(--text);border-radius:7px;cursor:pointer;font-size:15px;line-height:1;}
.zb:hover{background:var(--bg5);}
.zlab{font-size:12px;font-weight:800;font-family:'Segoe UI',system-ui,sans-serif;}
.maptip{font-size:10.5px;color:var(--muted2);margin-top:6px;}
.mapsvg svg{cursor:grab;touch-action:none;}
.mapsvg svg:active{cursor:grabbing;}

.mapsvg svg{cursor:grab;touch-action:none;-webkit-user-select:none;user-select:none;}
.mapsvg svg:active{cursor:grabbing;}
.mk.adj{cursor:move;}
.cardbtns{margin-top:11px;display:flex;flex-direction:column;gap:8px;}
.rotrow{display:flex;align-items:center;gap:8px;}
.rotb{padding:5px 10px;font-size:12px;}
.rotval{font-size:12px;font-weight:700;color:var(--text);min-width:36px;text-align:center;}
.adjhint{font-size:11px;color:var(--gold);}

.sizeseg button{padding:5px 11px;font-size:12px;}
.rotsl{flex:1;accent-color:var(--gold);}
.rotval2{font-size:11px;color:var(--muted);}
.rotval2 b{color:var(--text);}
.rothandle{cursor:grab;}
.pickrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}

.cottable-wrap{border:1px solid var(--border);border-radius:12px;overflow:auto;}
.cottable{width:100%;border-collapse:collapse;font-size:12.5px;background:linear-gradient(180deg,var(--bg3),var(--bg2));}
.cottable th{text-align:left;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:9px 12px;border-bottom:1px solid var(--border);background:var(--bg2);white-space:nowrap;}
.cottable td{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.05);white-space:nowrap;}
.cottable tbody tr:last-child td{border-bottom:none;}
.cottable tbody tr:hover{background:var(--bg4);}
.cottable .num{font-variant-numeric:tabular-nums;}
.cottable .empty{text-align:center;color:var(--muted2);padding:18px;}
.dot{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:7px;vertical-align:middle;}
.mklab{fill:#cdd9ec;font-size:9px;font-weight:700;paint-order:stroke;stroke:#0a1322;stroke-width:2.5px;stroke-linejoin:round;pointer-events:none;}

@media print{
  /* mapa */
  .mapbg{ fill:#ffffff !important; }
  .zlab{ fill:#3a3a3a !important; }
  .mklab{ fill:#111111 !important; stroke:#ffffff !important; }
  .glab{ fill:#444444 !important; }
  /* cabecalho nao deve flutuar/sobrepor na impressao */
  header{ position:static !important; top:auto !important; }
  /* forca a impressao das barras de cor (umidade, capacidade, etc.) */
  .track, .cell, .armazem .bar, .armazem .fill, .dot{
    -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important;
  }
  /* nao cortar objetos na virada de pagina */
  .silo, .armazem, .cottable-wrap, .pill, .formgrid{ break-inside:avoid !important; page-break-inside:avoid !important; }
  .cottable tr, .cottable thead{ break-inside:avoid !important; page-break-inside:avoid !important; }
  .sec-title{ break-after:avoid !important; page-break-after:avoid !important; }
}
</style>
</head>
<body>
<header>
  <div><div class="crumb">Recebimento e Armazenagem</div><h1 id="vtitle">📦 Armazenagem / Estoque</h1></div>
  <div class="nav" id="nav">
    <button data-v="estoque">📦 Estoque</button>
    <button data-v="mapa" class="on">🗺️ Mapa</button>
    <button data-v="cadastro">➕ Entrada</button>
  </div>
  <div class="spacer"></div>
  <div class="sumpills" id="sumpills"></div>
</header>

<main id="main"></main>

<p class="note">
  <b>Estoque</b>: visão só-leitura. <b>Cadastro</b>: dá entrada de silo-bolsa (capacidade + segmentos de umidade + x,y),
  fardão e rolinho (unidade a unidade, @). O cadastrado entra no estoque em memória nesta sessão.
</p>

<script>
let _uid=0; const U=()=>'cg'+(_uid++);
const KG_SC=60, ARROBA_KG=15, TARGET=13.75, TLO=13.4, THI=14.0;
const nf=n=>n.toLocaleString('pt-BR');

// ===== cor de umidade (vermelho seco -> amarelo alvo -> verde) =====
function uColor(u){
  let h,s=68,l=46;
  if(u<=10){h=2;}
  else if(u<TARGET){const t=(u-10)/(TARGET-10);h=2+t*50;l=46+t*4;}
  else if(u<16){const t=(u-TARGET)/(16-TARGET);h=52+t*58;l=50-t*4;}
  else if(u<19.5){const t=(u-16)/(19.5-16);h=110+t*40;l=46-t*14;s=58;}
  else {h=152;l=30;s=54;}
  return `hsl(${h.toFixed(0)} ${s}% ${l}%)`;
}

// ===== SKINS VALIDADOS (rolinho amarelo, fardão) =====
function rolinhoSVG({wrap='#f2c200', wrapD='#a9870a', wrapL='#fff27a'}={}){
  const gb=U(), gf=U(), sh=U();
  const fx=116, fy=98, frx=54, fry=66;
  const bx=204, by=86, brx=48.6, bry=59.4;
  const ftop=fy-fry, fbot=fy+fry, btop=by-bry, bbot=by+bry;
  let creases=''; [0.40,0.60,0.80].forEach(t=>{const x=fx+(bx-fx)*t,yt=ftop+(btop-ftop)*t,yb=fbot+(bbot-fbot)*t,my=(yt+yb)/2;
    creases+=`<path d="M${x} ${yt} Q${x-13} ${my} ${x} ${yb}" fill="none" stroke="${wrapD}" stroke-width="2" opacity=".35"/>`;});
  let swirl=''; [0.74,0.5,0.28,0.1].forEach((k,i)=>{swirl+=`<ellipse cx="${fx-4}" cy="${fy}" rx="${frx*k*0.92}" ry="${fry*k}" fill="none" stroke="#c9c4b4" stroke-width="1.2" opacity="${0.5-i*0.08}"/>`;});
  return `<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg"><defs>
    <linearGradient id="${gb}" gradientUnits="userSpaceOnUse" x1="0" y1="${btop}" x2="0" y2="${fbot}">
    <stop offset="0" stop-color="${wrapD}"/><stop offset=".34" stop-color="${wrapL}"/><stop offset=".56" stop-color="${wrap}"/><stop offset="1" stop-color="${wrapD}"/></linearGradient>
    <radialGradient id="${gf}" cx="42%" cy="38%" r="72%"><stop offset="0" stop-color="#fcfbf6"/><stop offset=".7" stop-color="#efeadd"/><stop offset="1" stop-color="#d6d0c0"/></radialGradient>
    <radialGradient id="${sh}" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#000" stop-opacity=".5"/><stop offset="1" stop-color="#000" stop-opacity="0"/></radialGradient></defs>
    <ellipse cx="160" cy="168" rx="98" ry="12" fill="url(#${sh})"/>
    <ellipse cx="${bx}" cy="${by}" rx="${brx}" ry="${bry}" fill="${wrapD}"/>
    <path d="M${fx} ${ftop} L${bx} ${btop} A${brx} ${bry} 0 0 1 ${bx} ${bbot} L${fx} ${fbot} Z" fill="url(#${gb})"/>
    ${creases}
    <path d="M${fx+6} ${ftop+14} L${bx} ${btop+12}" stroke="${wrapL}" stroke-width="4" opacity=".4" stroke-linecap="round"/>
    <ellipse cx="${fx}" cy="${fy}" rx="${frx}" ry="${fry}" fill="url(#${gf})"/>
    ${swirl}
    <ellipse cx="${fx}" cy="${fy}" rx="${frx}" ry="${fry}" fill="none" stroke="${wrap}" stroke-width="4"/>
    <ellipse cx="${fx}" cy="${fy}" rx="${frx-3}" ry="${fry-3}" fill="none" stroke="#3f74b0" stroke-width="1.4" opacity=".7"/></svg>`;
}
function fardaoSVG({tarp='#2f6db0', tarpD='#1c4575'}={}){
  const cotL='#f2e9d2', cotD='#c6b791', cotDD='#a99c79';
  const g=U(), gt=U(), gtd=U(), gs=U(), sh=U();
  const x0=22, x1=298, y0=54, y1=162, dx=46, dy=-32, r=14;
  const yt=140, ytb=yt+dy;
  const FTL=[x0,y0],FTR=[x1,y0],FBL=[x0,y1],FBR=[x1,y1];
  const BTL=[x0+dx,y0+dy],BTR=[x1+dx,y0+dy],BBR=[x1+dx,y1+dy];
  const RP=(pts,flags)=>{const n=pts.length;let d='';const u=(a,b)=>{const ax=a[0]-b[0],ay=a[1]-b[1],L=Math.hypot(ax,ay)||1;return[ax/L,ay/L];};
    for(let i=0;i<n;i++){const c=pts[i];if(!flags[i]){d+=(i===0?'M':'L')+c[0].toFixed(1)+' '+c[1].toFixed(1);continue;}
      const p=pts[(i-1+n)%n],q=pts[(i+1)%n],v1=u(p,c),v2=u(q,c),pin=[c[0]+v1[0]*r,c[1]+v1[1]*r],po=[c[0]+v2[0]*r,c[1]+v2[1]*r];
      d+=(i===0?'M':'L')+pin[0].toFixed(1)+' '+pin[1].toFixed(1)+'Q'+c[0].toFixed(1)+' '+c[1].toFixed(1)+' '+po[0].toFixed(1)+' '+po[1].toFixed(1);}
    return d+'Z';};
  const cottonFront=RP([FTL,FTR,FBR,FBL],[1,1,0,0]);
  const cottonSide =RP([FTR,BTR,BBR,FBR],[1,1,0,0]);
  const tarpSide   =RP([FTR,BTR,[x1+dx,ytb],[x1,yt]],[1,1,0,0]);
  const topFace    =RP([FTL,FTR,BTR,BTL],[1,1,1,1]);
  let wb=`L${x1} ${yt}`; const k=6, seg=(x1-x0)/k;
  for(let m=0;m<k;m++){const xa=x1-m*seg,xc=(xa-seg/2),xb=(xa-seg);wb+=`Q${xc.toFixed(0)} ${yt+10} ${xb.toFixed(0)} ${yt+2}`;}
  const frontTarp=`M${x0+r} ${y0} L${x1-r} ${y0} Q${x1} ${y0} ${x1} ${y0+r} ${wb} L${x0} ${y0+r} Q${x0} ${y0} ${x0+r} ${y0} Z`;
  const straps=[0.18,0.39,0.61,0.82].map(fr=>Math.round(x0+(x1-x0)*fr));
  let strapFront='',strapTop='';

// classificacao do silo (mesma regra do controle.html)
function classify(s){
  const altos=s.u.filter(x=>x>14);
  let umido=false;
  if(altos.length){
    const pico=Math.max(...altos);
    const scSeg=(s.cap||0)/s.u.length;
    const scAltos=altos.length*scSeg;
    umido=!(pico<=14.3 && scAltos<=700);
  }
  if(umido) return 'umido';
  const um=s.u.reduce((a,b)=>a+b,0)/s.u.length;
  return um<13.4?'seco':'faixa';
}

function saveSilo(){
  const id=(document.getElementById('f-sid').value||'').trim();
  const lote=(document.getElementById('f-slote').value||'').trim()||'-';
  const cap=parseFloat(document.getElementById('f-scap').value)||0;
  const x=parseFloat(document.getElementById('f-sx').value)||null;
  const y=parseFloat(document.getElementById('f-sy').value)||null;
  if(!id){msg('Informe o ID do silo.',false);return;}
  if(S.silos.some(s=>String(s.id)===id)){msg('Já existe um silo com esse ID.',false);return;}
  if(cap<=0){msg('Informe a capacidade (sc).',false);return;}
  if(!draft.segs.length){msg('Adicione ao menos 1 segmento de umidade.',false);return;}
  const u=draft.segs.slice();
  const _s={id,lote,cap,u,x,y,rot:PF.rot||0,umean:u.reduce((a,b)=>a+b,0)/u.length,qtd_est:cap};
  S.silos.push(_s); upsertSiloSB(_s);
  draft={segs:[]}; PF={};
  renderSummary();
  VIEW='estoque'; FILTER='all'; route();
}
function saveCot(kind){
  const id=(document.getElementById('f-cid').value||'').trim();
  const talhao=(document.getElementById('f-ctal').value||'').trim()||'-';
  const at=parseFloat(document.getElementById('f-cat').value)||0;
  if(!id){msg('Informe o ID.',false);return;}
  if(S.cotton.some(c=>c.id===id)){msg('Já existe uma unidade com esse ID.',false);return;}
  if(at<=0){msg('Informe a média estimada (@).',false);return;}
  const x=parseFloat(document.getElementById('f-cx').value)||null;
  const y=parseFloat(document.getElementById('f-cy').value)||null;
  let opts={};
  if(kind==='fardao'){const c=document.getElementById('f-color').value; opts=c==='laranja'?{tarp:'#d2691e',tarpD:'#8a3d10'}:{tarp:'#2f6db0',tarpD:'#1c4575'};}
  const _c={kind,id,talhao,at,pesado:false,opts,x,y,rot:PF.rot||0};
  S.cotton.push(_c); upsertCottonSB(_c);
  PF={};

  VIEW=(x!=null&&y!=null)?'mapa':'estoque'; route();
}

function buildMarkers(){

  const P=mapProj, PX=x=>P.offX+(x-P.minX)*P.sU, PY=y=>P.offY+(P.maxY-y)*P.sU;
  const layers={silo:gv('lay-silo'),fardao:gv('lay-fardao'),rolinho:gv('lay-rolinho')};

      } else { const ww=Math.max(W,6);
        inner=`<rect x="${(-L/2).toFixed(1)}" y="${(-ww/2).toFixed(1)}" width="${L.toFixed(1)}" height="${ww.toFixed(1)}" rx="2" fill="#c9d4e3" stroke="#0a1322" stroke-width="1" vector-effect="non-scaling-stroke"/><line x1="${(-L/2).toFixed(1)}" y1="0" x2="${(L/2).toFixed(1)}" y2="0" stroke="#6d8bb5" stroke-width="1.2" vector-effect="non-scaling-stroke"/><rect x="${(-L/2).toFixed(1)}" y="${(-ww/2).toFixed(1)}" width="${(L*0.12).toFixed(1)}" height="${ww.toFixed(1)}" fill="#6d8bb5" opacity=".5"/>`; half=L/2; }

    const bR=Math.max(5.5,Math.min(half*0.34,17));

function drawMap(){
  const host=document.getElementById('mapsvg'); if(!host) return;
  MAPW=host.clientWidth||860; MAPH=host.clientHeight||580;
  const layers={lotes:gv('lay-lotes')};
  const xs=[], ys=[];
  S.silos.forEach(s=>{ if(s.x!=null&&s.y!=null){xs.push(+s.x);ys.push(+s.y);} });
  S.cotton.forEach(c=>{ if(c.x!=null&&c.y!=null){xs.push(+c.x);ys.push(+c.y);} });
  LOTES.forEach(L=>L.p.forEach(p=>{xs.push(p[0]);ys.push(p[1]);}));
  if(!xs.length){ host.innerHTML='<div class="mapempty">Sem itens georreferenciados ainda.</div>'; return; }
  let minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);
  const dX=(maxX-minX)||100, dY=(maxY-minY)||100;
  minX-=dX*0.06; maxX+=dX*0.06; minY-=dY*0.06; maxY+=dY*0.06;
  const availW=MAPW-2*MAPM, availH=MAPH-2*MAPM, dXr=maxX-minX, dYr=maxY-minY;
  const sU=Math.min(availW/dXr, availH/dYr);
  const offX=MAPM+(availW-dXr*sU)/2, offY=MAPM+(availH-dYr*sU)/2;
  const PX=x=>(offX+(x-minX)*sU), PY=y=>(offY+(maxY-y)*sU);
  mapBaseMpp=1/sU; mapProj={minX,maxX,minY,maxY,offX,offY,sU};

  let zones='';
  if(layers.lotes){
    LOTES.forEach(L=>{
      const hue=hashHue(L.n);
      const d='M'+L.p.map(p=>PX(p[0]).toFixed(1)+' '+PY(p[1]).toFixed(1)).join(' L')+' Z';
      const cx=L.p.reduce((a,p)=>a+p[0],0)/L.p.length, cy=L.p.reduce((a,p)=>a+p[1],0)/L.p.length;
      const isSede=L.n==='SEDE 01'; const lx=isSede?cx+170:cx, ly=cy;
      zones+=`<path d="${d}" fill="hsla(${hue} 55% 50% / .12)" stroke="hsla(${hue} 60% 64% / .75)" stroke-width="1.4" vector-effect="non-scaling-stroke" pointer-events="none"/>`;
      zones+=`<text x="${PX(lx).toFixed(1)}" y="${PY(ly).toFixed(1)}" class="zlab" text-anchor="middle" fill="hsl(${hue} 72% 78%)" pointer-events="none">${L.n.replace(/^Lote ?/,'')}</text>`;
    });
  }
  let grid='';
  for(let k=0;k<=4;k++){
    const gx=PX(minX+(maxX-minX)*k/4), gy=PY(minY+(maxY-minY)*k/4);
    grid+=`<line x1="${gx.toFixed(1)}" y1="0" x2="${gx.toFixed(1)}" y2="${MAPH}" stroke="rgba(255,255,255,.04)" pointer-events="none"/>`+
          `<line x1="0" y1="${gy.toFixed(1)}" x2="${MAPW}" y2="${gy.toFixed(1)}" stroke="rgba(255,255,255,.04)" pointer-events="none"/>`;
  }

  ov.querySelector('#lg_senha').addEventListener('keydown',e=>{ if(e.key==='Enter') tentar(); });
}
async function carregarRecebSB(){
  try{
    _statusSB('⏳ Carregando do banco…','#2c3e50');
    const {data:sil,error:es}=await SB.from('silos').select('*'); if(es) throw es;   // físico: todas as safras
    if(sil){ S.silos=sil.map(r=>{ const u=Array.isArray(r.u)?r.u.map(Number):[]; return {id:String(r.id),lote:r.lote||'-',cap:+r.cap||0,u,x:r.x!=null?+r.x:null,y:r.y!=null?+r.y:null,rot:+r.rot||0,carregado:!!r.carregado,safraOrigem:r.safra_origem||'',umean:u.length?u.reduce((a,b)=>a+b,0)/u.length:0,qtd_est:+r.cap||0}; }); }
    const {data:cot}=await SB.from('cotton').select('*');
    if(cot){ S.cotton=cot.map(r=>({kind:r.kind,id:String(r.id),talhao:r.talhao||'-',at:+r.arrobas||0,pesado:!!r.pesado,opts:r.opts||{},x:r.x!=null?+r.x:null,y:r.y!=null?+r.y:null,rot:+r.rot||0,carregado:!!r.carregado,safraOrigem:r.safra_origem||''})); }
    const {data:arm}=await SB.from('armazem').select('*').limit(1);
    if(arm&&arm.length){ const a=arm[0]; S.armazem.sc=+a.sc||0; S.armazem.umean=+a.umean||0; S.armazem.cap=+a.cap||0; if(a.x!=null)ARM.x=+a.x; if(a.y!=null)ARM.y=+a.y; ARM.rot=+a.rot||0; }
    _statusSB('✅ Recebimento do banco ('+S.silos.length+' silos)','#27ae60');
    route();
  }catch(e){ _statusSB('❌ Falha: '+e.message,'#c0392b'); console.error(e); route(); }
}
async function upsertSiloSB(s){ if(!SB){ _statusSB('⚠️ Sem conexão — só na memória','#e67e22'); return; }
  try{ const {error}=await SB.from('silos').upsert({id:String(s.id),safra_origem:s.safraOrigem||SAFRA,lote:s.lote,cap:s.cap,u:s.u,x:s.x,y:s.y,rot:s.rot||0,carregado:!!s.carregado},{onConflict:'id'});
    if(error){ _statusSB('❌ Erro ao salvar silo: '+error.message,'#c0392b'); return; } _statusSB('✅ Silo '+s.id+' salvo no banco','#27ae60'); }catch(e){ _statusSB('❌ Falha: '+e.message,'#c0392b'); } }
async function upsertCottonSB(c){ if(!SB){ _statusSB('⚠️ Sem conexão — só na memória','#e67e22'); return; }
  try{ const {error}=await SB.from('cotton').upsert({id:String(c.id),safra_origem:c.safraOrigem||SAFRA,kind:c.kind,talhao:c.talhao,arrobas:c.at,pesado:!!c.pesado,opts:c.opts||{},x:c.x,y:c.y,rot:c.rot||0,carregado:!!c.carregado},{onConflict:'id'});
    if(error){ _statusSB('❌ Erro ao salvar: '+error.message,'#c0392b'); return; } _statusSB('✅ '+c.id+' salvo no banco','#27ae60'); }catch(e){ _statusSB('❌ Falha: '+e.message,'#c0392b'); } }
async function salvarPosSB(type,id){ if(!SB) return; const it=getItem(type,id); if(!it) return;
  try{ if(type==='armazem'){ await SB.from('armazem').update({x:ARM.x,y:ARM.y,rot:ARM.rot||0}).eq('id','main'); }
    else { const tab=type==='silo'?'silos':'cotton'; await SB.from(tab).update({x:it.x,y:it.y,rot:it.rot||0}).eq('id',String(id)); }
    _statusSB('✅ Posição salva no banco','#27ae60'); }catch(e){ _statusSB('❌ Falha: '+e.message,'#c0392b'); } }
async function salvarCarregadoSB(type,id,val){ if(!SB||type==='armazem') return;
  try{ const tab=type==='silo'?'silos':'cotton'; const {error}=await SB.from(tab).update({carregado:val}).eq('id',String(id));
    if(error){ _statusSB('❌ '+error.message,'#c0392b'); return; } _statusSB('✅ Carregamento atualizado','#27ae60'); }catch(e){ _statusSB('❌ Falha: '+e.message,'#c0392b'); } }
async function bootSupabase(){
  if(!window.supabase){ _statusSB('⚠️ Lib Supabase não carregou (sem internet?)','#c0392b'); route(); return; }
  SB=window.supabase.createClient(SB_URL,SB_KEY);
  try{ const h=new URLSearchParams(location.hash.slice(1)); const at=h.get('at'), rt=h.get('rt'); const sf=h.get('safra'); if(sf) SAFRA=sf;
    if(at&&rt){ await SB.auth.setSession({access_token:at,refresh_token:rt}); history.replaceState(null,'',location.pathname+location.search); } }catch(e){ console.warn('handoff sessão',e); }
  const {data}=await SB.auth.getSession();
  if(data&&data.session){ _botaoSair(); carregarRecebSB(); }
  else { _telaLogin(); route(); }
}
window.addEventListener('load',()=>{ setTimeout(bootSupabase,300); });

</script>
