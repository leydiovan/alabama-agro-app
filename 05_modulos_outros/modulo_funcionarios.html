<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#1c2333;--line:#30363d;--line2:#3d4d6b;--text:#e6edf3;--muted:#8b949e;--gold:#ffc107;--ok:#27ae60;--err:#f85149;--warn:#e3a008}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font:14px system-ui,Segoe UI,Arial,sans-serif;padding:14px 16px 60px}
h2{font-size:17px;margin-bottom:2px}.sub{color:var(--muted);font-size:12px}
#nav{display:flex;gap:6px;margin:10px 0 14px;flex-wrap:wrap}
#nav button{background:var(--bg3);color:var(--text);border:1px solid var(--line);border-radius:9px;padding:8px 14px;font-weight:700;cursor:pointer}
#nav button.on{background:var(--gold);color:#1a1100;border-color:var(--gold)}
#nav button.alert{border-color:var(--gold);color:var(--gold)}#nav button.alert.on{color:#1a1100}
.wrap{max-width:1280px}
table.fit{width:100%;font-size:12px;table-layout:auto}
table.fit th,table.fit td{padding:4px 6px}
table.fit td.txt{white-space:normal;word-break:break-word;max-width:140px;font-size:11px}
.box{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:14px}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
.fcol{display:flex;flex-direction:column;gap:4px}
label{font-size:12px;color:var(--muted)}
input,select{background:var(--bg);border:1px solid var(--line);border-radius:8px;color:var(--text);padding:8px 10px;font-size:13px}
input:focus,select:focus{outline:none;border-color:var(--gold)}
.btn{background:var(--bg3);border:1px solid var(--line);border-radius:8px;color:var(--text);padding:8px 13px;font-weight:700;cursor:pointer;font-size:13px}
.btn.sm{padding:4px 9px;font-size:12px}
.btn.success{background:var(--ok);border-color:var(--ok);color:#fff}
.btn.gold{background:var(--gold);border-color:var(--gold);color:#1a1100}
.btn.danger{background:transparent;border-color:var(--err);color:var(--err)}
.btn.ghost{background:transparent}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:6px 8px;border-bottom:1px solid var(--line);text-align:left;vertical-align:middle}
th{color:var(--muted);font-weight:700;font-size:11px;text-transform:uppercase}
td.num,th.num{text-align:right}
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid}
.t-reg{color:#79c0ff;border-color:#1f6feb55}.t-dia{color:#7ee787;border-color:#2ea04355}.t-tmp{color:#ffa657;border-color:#bb800955}
.he{color:var(--gold);font-weight:700}.falta{color:var(--err);font-weight:700}
.mark{width:62px}.tot td{font-weight:800;border-top:2px solid var(--line2)}
.hint{color:var(--muted);font-size:12px;margin:6px 0}
.pill{display:inline-flex;gap:6px;align-items:center;background:var(--bg3);border:1px solid var(--line);border-radius:20px;padding:5px 12px;font-size:12px;margin-right:6px}
.pill b{color:var(--gold)}
.dimday{color:var(--muted)}
tr.dom td,tr.fer td{background:#1a1212}
@media print{
  #nav,#sbst,#btnSair,.no-print{display:none!important}
  body{background:#fff;color:#000;padding:6px}
  .wrap{max-width:none}
  .box{background:#fff;border:0;padding:0;margin:0 0 10px}
  h2,b{color:#000!important}
  table,table.fit{font-size:11px}
  th{color:#000;border-bottom:1px solid #000}
  td{color:#000;border-bottom:1px solid #bbb}
  .sub,.dimday{color:#333}
  .he{color:#000!important}
  .pill{border:1px solid #888;color:#000;background:#fff}
  .pill b{color:#000!important}
  table.fit td.txt{max-width:none}
  thead{display:table-header-group}
  tr{page-break-inside:avoid}
  table .btn, table button{display:none!important}
  input,select{border:0;background:#fff;color:#000;padding:0}
}
</style>

/* ---------- helpers de tempo ---------- */
const TIPO_NOME={registrado:'Registrado',diarista:'Diarista',temporario:'Temporário'};
function t2m(s){ if(!s) return null; const m=String(s).match(/^(\d{1,2}):(\d{2})$/); if(!m) return null; return (+m[1])*60+(+m[2]); }
function m2hm(min){ if(min==null) return '—'; const neg=min<0; min=Math.abs(Math.round(min)); const h=Math.floor(min/60), mm=min%60; return (neg?'-':'')+h+'h'+(mm?(' '+String(mm).padStart(2,'0')):''); }
function m2dec(min){ return (min/60); }
function brl(v){ return 'R$ '+(Number(v)||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function nf(v){ return (Number(v)||0).toLocaleString('pt-BR',{maximumFractionDigits:2}); }
function ovl(a1,a2,b1,b2){ return Math.max(0, Math.min(a2,b2)-Math.max(a1,b1)); }
const _ult=(y,m)=>new Date(y,m,0).getDate();   // último dia do mês (m 1-12)

/* ---------- núcleo do cálculo de ponto (regra da fazenda) ---------- */
function janelaDoDia(dateStr, feriado){
  if(feriado) return [];                                  // feriado: tudo extra
  const d=new Date(dateStr+'T12:00:00'); const dow=d.getDay();
  const j=(S.cfg.jornada||{})[String(dow)]||[];
  return j.map(par=>[t2m(par[0]),t2m(par[1])]);
}
function calcDia(p){
  // p: {data, marcacoes:[{ent,sai}], feriado, folga, falta, sem_he, ha}
  const r={ worked:0, normal:0, extra:0, falta:!!p.falta, janela:0, faltaJornada:0 };
  r.ha=+p.ha||0; r.valorHa=(p.valor_ha!=null&&p.valor_ha!=='')?+p.valor_ha:0; r.comissao=r.ha*r.valorHa;   // comissao por hectare do dia
  const jan=janelaDoDia(p.data, p.feriado||p.folga);       // feriado/folga: janela vazia -> tudo vira HE se trabalhar
  jan.forEach(w=>{ r.janela += (w[1]-w[0]); });
  if(p.falta||p.folga){ return r; }                        // falta/folga: sem hora a menos
  const tem=(p.marcacoes||[]).some(x=>x&&(x.ent||x.sai));
  (p.marcacoes||[]).forEach(mc=>{
    const a=t2m(mc.ent), b=t2m(mc.sai); if(a==null||b==null||b<=a) return;
    r.worked += (b-a);
    let nrm=0; jan.forEach(w=>{ nrm += ovl(a,b,w[0],w[1]); });
    r.normal += nrm;
  });
  r.extra = Math.max(0, r.worked - r.normal);
  const tol=+S.cfg.tolerancia_min||5;
  if(r.extra<=tol) r.extra=0;                              // tolerância
  if(p.sem_he) r.extra=0;                                  // dia de aplicação: comissão, sem HE
  // "hora a menos" só nos dias que a pessoa VEIO (tem marcação) — quem faltou não conta a menos (diarista não recebe e pronto)
  r.faltaJornada = tem ? Math.max(0, r.janela - r.normal) : 0;
  if(r.faltaJornada<=tol) r.faltaJornada=0;
  return r;
}
function valorHE(f){ if(f.valor_he!=null&&f.valor_he!=='') return +f.valor_he; if(f.tipo==='diarista') return +S.cfg.valor_he_diarista||0; return +S.cfg.valor_he_registrado||0; }
function valorDiaria(f){ return (f.valor_diaria!=null&&f.valor_diaria!=='')?+f.valor_diaria:(+S.cfg.valor_diaria||0); }

/* ===================== SUPABASE ===================== */
function _st(t,c){ let e=$('sbst'); if(!e){ e=document.createElement('div'); e.id='sbst'; e.style.cssText='position:fixed;bottom:10px;right:10px;z-index:9999;padding:7px 12px;border-radius:8px;font:600 12px system-ui;box-shadow:0 2px 8px rgba(0,0,0,.3)'; document.body.appendChild(e);} e.textContent=t; e.style.background=c||'#333'; e.style.color='#fff'; }
function _botaoSair(){ if(window.self!==window.top) return; if($('btnSair'))return; const b=document.createElement('button'); b.id='btnSair'; b.textContent='Sair'; b.style.cssText='position:fixed;top:10px;right:10px;z-index:9998;padding:6px 12px;border:1px solid #30363d;border-radius:8px;background:#21262d;color:#e6edf3;font:600 12px system-ui;cursor:pointer'; b.onclick=async()=>{ if(SB) await SB.auth.signOut(); location.reload(); }; document.body.appendChild(b); }
function _telaLogin(){

  ov.innerHTML='<div style="background:#161b22;border:1px solid #30363d;border-radius:14px;padding:32px 28px;width:340px"><div style="font-size:20px;font-weight:800;text-align:center;margin-bottom:4px">Gestão Alabama Agro</div><div style="font-size:13px;color:#8b949e;text-align:center;margin-bottom:22px">Funcionários</div><label style="font-size:12px;color:#8b949e">E-mail</label><input id="lg_e" type="email" style="width:100%;padding:10px;border-radius:8px;border:1px solid #30363d;background:#0d1117;color:#e6edf3;margin:4px 0 14px"><label style="font-size:12px;color:#8b949e">Senha</label><input id="lg_s" type="password" style="width:100%;padding:10px;border-radius:8px;border:1px solid #30363d;background:#0d1117;color:#e6edf3;margin:4px 0 18px"><button id="lg_b" style="width:100%;padding:11px;border:0;border-radius:8px;background:#238636;color:#fff;font-weight:700;cursor:pointer">Entrar</button><div id="lg_m" style="font-size:12px;color:#f85149;text-align:center;margin-top:12px;min-height:16px"></div></div>';
  document.body.appendChild(ov);
  const go=async()=>{ const email=ov.querySelector('#lg_e').value.trim(), s=ov.querySelector('#lg_s').value, m=ov.querySelector('#lg_m'); if(!email||!s){m.textContent='Preencha e-mail e senha.';return;} m.style.color='#8b949e'; m.textContent='Entrando…'; try{ const {error}=await SB.auth.signInWithPassword({email,password:s}); if(error){m.style.color='#f85149';m.textContent='Erro: '+error.message;return;} ov.remove(); _botaoSair(); carregar(); }catch(e){m.style.color='#f85149';m.textContent='Falha: '+e.message;} };
  ov.querySelector('#lg_b').onclick=go; ov.querySelector('#lg_s').addEventListener('keydown',e=>{if(e.key==='Enter')go();});
}

    const {data:fs}=await SB.from('funcionarios').select('*').order('nome'); S.funcs=fs||[];

    _st('✅ Carregado ('+S.funcs.length+' funcionários)','#27ae60');

  if(!window.supabase){ _st('⚠️ Sem internet (lib não carregou)','#c0392b'); route(); return; }

  const {data}=await SB.auth.getSession();
  if(data&&data.session){ _botaoSair(); carregar(); } else { _telaLogin(); route(); }
}

/* ===================== ROUTER ===================== */
document.getElementById('nav').addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b)return; VIEW=b.dataset.v; EDIT=null; if(VIEW==='aberto') ABERTO=null; if(VIEW==='rel') REL_MES=null; if(VIEW==='aprov') APROV=null; document.querySelectorAll('#nav button').forEach(x=>x.classList.toggle('on',x===b)); route(); });
function route(){
  const m=$('main');
  if(VIEW==='func'){ m.innerHTML=funcHTML(); bindFunc(); }
  else if(VIEW==='ponto'){ m.innerHTML=pontoHTML(); bindPonto(); }
  else if(VIEW==='aberto'){ m.innerHTML=abertoHTML(); bindAberto(); }
  else if(VIEW==='aprov'){ m.innerHTML=aprovHTML(); bindAprov(); }
  else { m.innerHTML=relHTML(); bindRel(); }
}

/* ===================== ABA FUNCIONÁRIOS ===================== */
function funcHTML(){
  const e=EDIT?S.funcs.find(f=>f.id===EDIT):null;
  const tp=e?e.tipo:'registrado';
  const rows=S.funcs.map(f=>{
    const cls=f.tipo==='diarista'?'t-dia':(f.tipo==='temporario'?'t-tmp':'t-reg');
    const val=f.tipo==='diarista'?('diária '+brl(valorDiaria(f))):(f.tipo==='temporario'?(f.temp_modo||'—'):(f.salario?brl(f.salario)+'/mês':'—'));
    return `<tr><td><b>${esc(f.nome)}</b>${f.funcao?'<div class="sub">'+esc(f.funcao)+'</div>':''}</td>
      <td><span class="tag ${cls}">${TIPO_NOME[f.tipo]||f.tipo}</span></td>
      <td class="sub">${esc(val)}</td><td class="num he">${brl(valorHE(f))}/h</td>
      <td>${f.ativo===false?'<span class="sub">inativo</span>':'ativo'}</td>
      <td><span class="btn sm" onclick="editarFunc(${f.id})">✎</span> <span class="btn sm danger" onclick="excluirFunc(${f.id})">✕</span></td></tr>`;
  }).join('')||'<tr><td colspan="6" class="hint">Nenhum funcionário. Cadastre abaixo.</td></tr>';
  return `<div class="box"><h2 style="font-size:15px">${e?'Editar funcionário':'Novo funcionário'}</h2>
    <div class="row" style="margin-top:8px">
      <div class="fcol" style="flex:1;min-width:180px"><label>Nome</label><input id="f_nome" value="${e?esc(e.nome):''}" placeholder="nome"></div>
      <div class="fcol"><label>Tipo</label><select id="f_tipo" onchange="EDIT_TP=this.value;_funcCampos()">${['registrado','diarista','temporario'].map(t=>`<option value="${t}" ${tp===t?'selected':''}>${TIPO_NOME[t]}</option>`).join('')}</select></div>
      <div class="fcol"><label>Função</label><input id="f_funcao" value="${e?esc(e.funcao||''):''}" placeholder="ex.: tratorista"></div>
      <div class="fcol"><label>CPF</label><input id="f_cpf" value="${e?esc(e.cpf||''):''}" placeholder="—"></div>
    </div>
    <div class="row" style="margin-top:10px" id="f_campos"></div>
    <div class="row" style="margin-top:10px">
      <div class="fcol"><label>Admissão</label><input type="date" id="f_adm" value="${e&&e.admissao?e.admissao:''}"></div>
      <div class="fcol"><label>Fim contrato (temp.)</label><input type="date" id="f_fim" value="${e&&e.fim_contrato?e.fim_contrato:''}"></div>
      <div class="fcol"><label>Ativo</label><select id="f_ativo"><option value="1" ${(!e||e.ativo!==false)?'selected':''}>Sim</option><option value="0" ${(e&&e.ativo===false)?'selected':''}>Não</option></select></div>
      <div class="fcol"><label title="Libera a tela da Melosa no tablet (lançar diesel)">Operador de melosa</label><select id="f_melosa"><option value="0" ${(e&&e.operador_melosa)?'':'selected'}>Não</option><option value="1" ${(e&&e.operador_melosa)?'selected':''}>Sim</option></select></div>
      <div class="fcol"><label title="PIN de 4 dígitos para o operador logar no tablet de campo">PIN (login no tablet)</label><input id="f_pin" inputmode="numeric" maxlength="4" value="${e?esc(e.pin||''):''}" placeholder="4 dígitos"></div>
    </div>
    <div class="row" style="margin-top:10px">
      <div class="fcol"><label>Meio de pagamento</label><select id="f_meio">${['','PIX','Em espécie','Transferência','Cheque','Outro'].map(x=>`<option value="${x}" ${(e&&(e.meio_pgto||'')===x)?'selected':''}>${x||'—'}</option>`).join('')}</select></div>
      <div class="fcol" style="flex:1;min-width:180px"><label>Chave Pix / Conta</label><input id="f_chave" value="${e?esc(e.chave_pix||''):''}" placeholder="chave Pix, banco/ag/conta…"></div>
      <div class="fcol" style="flex:1;min-width:160px"><label>Titular (se for de terceiro)</label><input id="f_titular" value="${e?esc(e.titular||''):''}" placeholder="nome do titular da conta"></div>
    </div>
    <div class="row" style="margin-top:12px"><button class="btn success" id="f_salvar">${e?'Salvar alterações':'Cadastrar'}</button>${e?'<button class="btn ghost" id="f_cancel">Cancelar</button>':''}<span class="hint" id="f_msg"></span></div>
  </div>
  <div class="box"><table><thead><tr><th>Funcionário (${S.funcs.length})</th><th>Tipo</th><th>Remuneração</th><th class="num">HE</th><th>Status</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`;
}
let EDIT_TP='registrado';
function _funcCampos(){
  const e=EDIT?S.funcs.find(f=>f.id===EDIT):null; const tp=EDIT_TP||'registrado'; const box=$('f_campos'); if(!box) return;
  let h='';
  if(tp==='registrado') h=`<div class="fcol"><label>Salário mensal (R$)</label><input type="number" step="any" id="f_sal" value="${e&&e.salario!=null?e.salario:''}" placeholder="0,00"></div>
    <div class="fcol"><label>Hora extra (R$/h)</label><input type="number" step="any" id="f_he" value="${e&&e.valor_he!=null?e.valor_he:''}" placeholder="${S.cfg.valor_he_registrado||10}"></div>`;
  else if(tp==='diarista') h=`<div class="fcol"><label>Valor da diária (R$)</label><input type="number" step="any" id="f_dia" value="${e&&e.valor_diaria!=null?e.valor_diaria:''}" placeholder="${S.cfg.valor_diaria||100}"></div>
    <div class="fcol"><label>Hora extra (R$/h)</label><input type="number" step="any" id="f_he" value="${e&&e.valor_he!=null?e.valor_he:''}" placeholder="${S.cfg.valor_he_diarista||7}"></div>`;
  else h=`<div class="fcol"><label>Modo</label><select id="f_tmodo">${['mensal','hora','hectare'].map(x=>`<option ${e&&e.temp_modo===x?'selected':''}>${x}</option>`).join('')}</select></div>
    <div class="fcol"><label>Valor base (R$ por mês/ha/hora)</label><input type="number" step="any" id="f_tval" value="${e&&e.temp_valor!=null?e.temp_valor:''}" placeholder="0,00"></div>
    <div class="fcol"><label>Hora extra (R$/h) <span class="sub">se houver</span></label><input type="number" step="any" id="f_he" value="${e&&e.valor_he!=null?e.valor_he:''}" placeholder="0"></div>`;
  box.innerHTML=h;
}
function editarFunc(id){ EDIT=id; const f=S.funcs.find(x=>x.id===id); EDIT_TP=f?f.tipo:'registrado'; route(); window.scrollTo(0,0); }
function novoFunc(){ EDIT=null; EDIT_TP='registrado'; route(); }
async function excluirFunc(id){ const f=S.funcs.find(x=>x.id===id); if(!confirm('Excluir "'+(f?f.nome:'')+'"? (mantém o ponto já lançado)')) return; try{ await SB.from('funcionarios').delete().eq('id',id); }catch(e){} S.funcs=S.funcs.filter(x=>x.id!==id); route(); }
function bindFunc(){
  EDIT_TP=($('f_tipo')&&$('f_tipo').value)|| (EDIT?(S.funcs.find(f=>f.id===EDIT)||{}).tipo:'registrado')||'registrado';
  _funcCampos();
  const sv=$('f_salvar'); if(sv) sv.onclick=salvarFunc;

function _mesAtual(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
const MESNOMES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
function _mesLabel(mes){ const [y,m]=mes.split('-').map(Number); return MESNOMES[m-1]+'/'+y; }
function _mesShift(delta){ let [y,m]=MES.split('-').map(Number); m+=delta; while(m<1){m+=12;y--;} while(m>12){m-=12;y++;} MES=y+'-'+String(m).padStart(2,'0'); }
async function pontoMes(delta){ _mesShift(delta); if(PF) await _loadPonto(PF,MES); route(); }
function _turnosPadrao(ds){ const dow=new Date(ds+'T12:00:00').getDay(); const j=(S.cfg.jornada||{})[String(dow)]||[]; return j.map(par=>({ent:par[0],sai:par[1]})); }
function preencherDia(ds){ const p=S.ponto[ds]||(S.ponto[ds]={data:ds,funcionario_id:PF}); p.marcacoes=_turnosPadrao(ds); p.falta=false; route(); }
async function preencherMes(){
  if(!PF) return; const [y,m]=MES.split('-').map(Number); const dias=_ult(y,m); const lote=[];
  for(let d=1; d<=dias; d++){ const ds=MES+'-'+String(d).padStart(2,'0'); const p=S.ponto[ds]; const turnos=_turnosPadrao(ds);
    if(!turnos.length) continue;                                   // domingo: pula
    if(S.feriados[ds]) continue;                                   // feriado: deixa p/ ajuste manual
    const temMarc=p&&(p.marcacoes||[]).some(x=>x&&(x.ent||x.sai));
    if(temMarc||(p&&p.falta)) continue;                            // não sobrescreve dia já lançado/falta
    const reg={funcionario_id:PF,data:ds,marcacoes:turnos,feriado:!!(p&&p.feriado),falta:false,sem_he:!!(p&&p.sem_he),ha:(p&&p.ha)??null,valor_ha:(p&&p.valor_ha)??null,obs:(p&&p.obs)||null};
    S.ponto[ds]=reg; lote.push(reg);
  }
  if(!lote.length){ _st('Nada a preencher (dias já lançados).','#e67e22'); return; }
  try{ const {error}=await SB.from('ponto').upsert(lote,{onConflict:'funcionario_id,data'}); if(error) throw error;
    _st('✅ '+lote.length+' dia(s) preenchidos com a jornada padrão','#27ae60'); await _loadPonto(PF,MES); route();
  }catch(e){ _st('❌ '+e.message,'#c0392b'); }
}

async function _resumoMes(mes){

  const {data}=await SB.from('ponto').select('*').gte('data',ini).lte('data',fim);

  (data||[]).forEach(p=>{ const fer=!!p.feriado||!!S.feriados[p.data]; const r=calcDia({data:p.data,marcacoes:p.marcacoes||[],feriado:fer,folga:p.folga,falta:p.falta,sem_he:p.sem_he,ha:p.ha,valor_ha:p.valor_ha});
    const o=byF[p.funcionario_id]||(byF[p.funcionario_id]={extra:0,falta:0,dias:0,faltaJ:0,comissao:0,ha:0}); o.extra+=r.extra; if(p.falta)o.falta++; else if(!p.folga && (p.marcacoes||[]).length)o.dias++; o.faltaJ+=r.faltaJornada; o.comissao+=r.comissao; o.ha+=r.ha; });
  return byF;

    const k=p.funcionario_id+'|'+mes; const o=agg[k]||(agg[k]={extra:0,dias:0,falta:0,faltaJ:0,comissao:0,ha:0}); o.extra+=r.extra; if(!p.falta&&!p.folga&&(p.marcacoes||[]).length)o.dias++; if(p.falta)o.falta++; o.faltaJ+=r.faltaJornada; o.comissao+=r.comissao; o.ha+=r.ha; });
  const fmap={}, mesesSet=new Set();
  Object.keys(agg).forEach(k=>{ const sp=k.split('|'), fid=+sp[0], mes=sp[1]; const f=S.funcs.find(x=>x.id===fid); if(!f) return;
    const a=agg[k]; const tot=_totFunc(f,a); if(tot<=0||pagos.has(k)) return;
    mesesSet.add(mes);
    const o=fmap[fid]||(fmap[fid]={fid,nome:f.nome,tipo:f.tipo,meio:f.meio_pgto||'',chave:f.chave_pix||'',titular:f.titular||'',porMes:{},total:0,extra:0,dias:0,falta:0,faltaJ:0,he$:0,dia$:0,comissao:0,ha:0});
    o.porMes[mes]=tot; o.total+=tot;
    o.extra+=a.extra; o.dias+=a.dias; o.falta+=(a.falta||0); o.faltaJ+=(a.faltaJ||0); o.comissao+=(a.comissao||0); o.ha+=(a.ha||0);
    o.he$+=m2dec(a.extra)*valorHE(f); o.dia$+=(f.tipo==='diarista'?a.dias*valorDiaria(f):0); });
  const meses=[...mesesSet].sort();
  const funcs=Object.values(fmap).sort((a,b)=>a.nome.localeCompare(b.nome,'pt'));
  const totMes={}; let total=0; meses.forEach(m=>{ let s=0; funcs.forEach(f=>s+=f.porMes[m]||0); totMes[m]=s; total+=s; });
  return {funcs,meses,totMes,total};
}
let AB_COLS=null, AB_TIPO='', AB_BUSCA='', AB_MES_DE='', AB_MES_ATE='';
function _abCols(){ if(!AB_COLS){ let sv=null; try{ sv=JSON.parse(localStorage.getItem('rh_aberto_cols')||'null'); }catch(e){} AB_COLS=Object.assign({dias:true,extra:true,he:true,dia:true,com:true,ha:false,falta:true,faltaJ:true,meio:true,chave:true,titular:true}, sv||{}); } return AB_COLS; }
const AB_DEF=[
  {k:'dias',l:'Dias',cls:'',td:f=>f.dias||'—',ft:s=>s('dias')||'—'},
  {k:'extra',l:'Hora extra',cls:'he',td:f=>f.extra?m2hm(f.extra):'—',ft:s=>m2hm(s('extra'))},
  {k:'he',l:'R$ HE',cls:'',td:f=>f.he$?brl(f.he$):'—',ft:s=>brl(s('he$'))},
  {k:'dia',l:'Diárias',cls:'',td:f=>f.dia$?brl(f.dia$):'—',ft:s=>brl(s('dia$'))},
  {k:'com',l:'Comissão',cls:'',td:f=>f.comissao?brl(f.comissao):'—',ft:s=>brl(s('comissao'))},
  {k:'ha',l:'ha',cls:'',td:f=>f.ha?nf(f.ha):'—',ft:s=>nf(s('ha'))},
  {k:'falta',l:'Faltas',cls:'',td:f=>f.falta||'—',ft:s=>s('falta')||'—'},
  {k:'faltaJ',l:'A menos',cls:'',td:f=>f.faltaJ?m2hm(f.faltaJ):'—',ft:s=>m2hm(s('faltaJ'))},
];
const AB_END=[ {k:'meio',l:'Meio de pagamento',td:f=>esc(f.meio||'—')}, {k:'chave',l:'Chave Pix / Conta',td:f=>esc(f.chave||'—')}, {k:'titular',l:'Titular',td:f=>esc(f.titular||'—')} ];
const AB_SUMKEY={dias:'dias',extra:'extra',he:'he$',dia:'dia$',com:'comissao',ha:'ha',falta:'falta',faltaJ:'faltaJ'};
function abertoHTML(){
  if(!ABERTO) return `<div class="box"><div class="hint">⏳ Calculando o que está em aberto…</div></div>`;
  const C=_abCols();
  // filtros
  let funcs=ABERTO.funcs.slice();
  if(AB_TIPO) funcs=funcs.filter(f=>f.tipo===AB_TIPO);
  if(AB_BUSCA){ const q=AB_BUSCA.toLowerCase(); funcs=funcs.filter(f=>(f.nome||'').toLowerCase().includes(q)); }
  const mesesSet=new Set(); funcs.forEach(f=>Object.keys(f.porMes).forEach(m=>mesesSet.add(m))); const meses=[...mesesSet].sort();
  const totMes={}; let total=0; meses.forEach(m=>{ let s=0; funcs.forEach(f=>s+=f.porMes[m]||0); totMes[m]=s; total+=s; });
  const toggles=[...AB_DEF,...AB_END].map(c=>`<label class="sub" style="margin-right:12px;white-space:nowrap"><input type="checkbox" class="ab-col" data-k="${c.k}" ${C[c.k]?'checked':''}> ${c.l}</label>`).join('');
  const tipoOpts=['','registrado','diarista','temporario'].map(t=>`<option value="${t}" ${AB_TIPO===t?'selected':''}>${t?TIPO_NOME[t]:'Todos os tipos'}</option>`).join('');
  const cabec=`<div class="box"><h2 style="font-size:15px">💰 Em aberto (não pago)</h2>
    <div style="margin:6px 0"><span class="pill">Total ${AB_TIPO||AB_BUSCA?'(filtrado) ':''}<b style="color:var(--gold)">${brl(total)}</b></span> <button class="btn no-print" id="a_reload">↻ Recarregar</button> <button class="btn no-print" id="a_print">🖨️ Imprimir</button></div>
    <div class="row no-print" style="margin-top:6px;gap:10px;align-items:flex-end">
      <div class="fcol"><label>Tipo</label><select id="a_tipo">${tipoOpts}</select></div>
      <div class="fcol"><label>Buscar</label><input id="a_busca" value="${esc(AB_BUSCA)}" placeholder="nome do funcionário"></div>
      <div class="fcol"><label>Período — de</label><input type="month" id="a_de" value="${esc(AB_MES_DE)}"></div>
      <div class="fcol"><label>até</label><input type="month" id="a_ate" value="${esc(AB_MES_ATE)}"></div>
      ${(AB_MES_DE||AB_MES_ATE)?`<button class="btn sm ghost" id="a_limpaper" style="margin-bottom:2px">limpar período</button>`:''}
    </div>
    ${(AB_MES_DE||AB_MES_ATE)?`<div class="hint">Mostrando só ${AB_MES_DE?('de '+_mesLabel(AB_MES_DE)):'o início'} ${AB_MES_ATE?('até '+_mesLabel(AB_MES_ATE)):'até hoje'}.</div>`:''}
    <div class="no-print" style="margin-top:6px"><span class="sub">Mostrar colunas:</span> ${toggles}</div></div>`;
  if(!funcs.length) return cabec+`<div class="box"><div class="hint">${ABERTO.funcs.length?'Nenhum funcionário no filtro.':'🎉 Nada em aberto — tudo pago.'}</div></div>`;
  const det=AB_DEF.filter(c=>C[c.k]); const end=AB_END.filter(c=>C[c.k]);
  const head=`<tr><th>Funcionário</th><th>Tipo</th>${det.map(c=>`<th class="num">${c.l}</th>`).join('')}${meses.map(m=>`<th class="num">${_mesLabel(m)}</th>`).join('')}<th class="num">Total</th>${end.map(c=>`<th>${c.l}</th>`).join('')}</tr>`;
  const rows=funcs.map(f=>`<tr><td><b>${esc(f.nome)}</b></td><td><span class="sub">${TIPO_NOME[f.tipo]}</span></td>`
    +det.map(c=>`<td class="num ${c.cls}">${c.td(f)}</td>`).join('')
    +meses.map(m=>`<td class="num">${f.porMes[m]?brl(f.porMes[m]):'—'}</td>`).join('')
    +`<td class="num"><b style="color:var(--gold)">${brl(f.total)}</b></td>`
    +end.map(c=>`<td class="sub txt">${c.td(f)}</td>`).join('')+`</tr>`).join('');
  const sum=k=>funcs.reduce((s,f)=>s+(f[k]||0),0);
  const foot=`<tr class="tot"><td colspan="2">Totais</td>${det.map(c=>`<td class="num">${c.ft(sum)}</td>`).join('')}${meses.map(m=>`<td class="num">${brl(totMes[m])}</td>`).join('')}<td class="num">${brl(total)}</td>${end.map(()=>'<td></td>').join('')}</tr>`;
  return cabec+`<div class="box" style="overflow-x:auto"><table class="fit"><thead>${head}</thead><tbody>${rows}</tbody><tfoot>${foot}</tfoot></table>
    <div class="hint no-print">Filtre por tipo/nome e marque quais colunas mostrar. "Total" é por funcionário. Para quitar um mês, use "marcar pago" no Relatório daquele mês.</div></div>`;
}
function bindAberto(){
  if(ABERTO===null){ (async()=>{ ABERTO=await _calcAberto(); route(); })(); return; }
  if($('a_reload')) $('a_reload').onclick=async()=>{ ABERTO=null; route(); ABERTO=await _calcAberto(); route(); };
  if($('a_print')) $('a_print').onclick=()=>window.print();
  if($('a_tipo')) $('a_tipo').onchange=()=>{ AB_TIPO=$('a_tipo').value; route(); };
  const _recalcPer=async()=>{ ABERTO=null; route(); ABERTO=await _calcAberto(); route(); };
  if($('a_de')) $('a_de').onchange=()=>{ AB_MES_DE=$('a_de').value||''; _recalcPer(); };
  if($('a_ate')) $('a_ate').onchange=()=>{ AB_MES_ATE=$('a_ate').value||''; _recalcPer(); };

  document.querySelectorAll('.ab-col').forEach(c=>c.onchange=()=>{ _abCols()[c.dataset.k]=c.checked; try{localStorage.setItem('rh_aberto_cols',JSON.stringify(AB_COLS));}catch(e){} route(); });

/* ===================== ABA APROVAÇÕES (fila da coleta) ===================== */
function _dataLabel(ds){ const d=new Date(ds+'T12:00:00'); const dow=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'][d.getDay()]; return ds.split('-').reverse().join('/')+' · '+dow; }
function _dtLabel(ts){ try{ const d=new Date(ts); return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }catch(e){ return ''; } }
async function _updAprovBadge(){ const btn=$('navAprov'); if(!btn) return; if(!IS_ADMIN){ btn.style.display='none'; return; } btn.style.display='';
  try{ const {data}=await SB.from('ponto_pendente').select('id'); const tot=(data||[]).length; btn.textContent='Aprovações'+(tot?(' ('+tot+')'):''); btn.classList.toggle('alert',tot>0); }catch(e){}
}
async function _loadAprov(){
  const {data}=await SB.from('ponto_pendente').select('*').order('data',{ascending:false});
  APE={}; const groups={};
  (data||[]).forEach(p=>{
    const f=S.funcs.find(x=>x.id===p.funcionario_id);
    const g=groups[p.data]||(groups[p.data]={data:p.data, enviado_por:p.enviado_por||'', enviado_em:p.enviado_em||'', items:[]});
    if(p.enviado_em && (!g.enviado_em || p.enviado_em>g.enviado_em)) g.enviado_em=p.enviado_em;
    if(p.enviado_por && !g.enviado_por) g.enviado_por=p.enviado_por;
    g.items.push({fid:p.funcionario_id, nome:f?f.nome:('#'+p.funcionario_id), tipo:f?f.tipo:''});
    APE[p.data+'|'+p.funcionario_id]={marcacoes:(p.marcacoes||[]).map(x=>({ent:x.ent||'',sai:x.sai||''})), feriado:(!!p.feriado||!!S.feriados[p.data]), falta:!!p.falta, folga:!!p.folga, sem_he:!!p.sem_he};
  });
  APROV=Object.values(groups).sort((a,b)=>String(b.data).localeCompare(String(a.data)));
  // feriado já embutido em APE.feriado (flag por-card OR feriado cadastrado) -> fonte única
  APROV.forEach(g=>{ g.items.sort((a,b)=>String(a.nome).localeCompare(String(b.nome),'pt')); g.temFeriado=g.items.some(i=>APE[g.data+'|'+i.fid].feriado); });
}
function aprovHTML(){
  if(!IS_ADMIN) return `<div class="box"><div class="hint">🔒 Apenas administrador.</div></div>`;
  if(APROV===null) return `<div class="box"><div class="hint">⏳ Carregando fila…</div></div>`;
  if(!APROV.length) return `<div class="box"><h2 style="font-size:15px">📥 Aprovações</h2><div class="hint">🎉 Nada na fila. As coletas enviadas pelo celular aparecem aqui para você revisar e aprovar.</div></div>`;
  const cards=APROV.map(g=>{
    const fer=g.temFeriado; let rows='', tExtra=0;
    g.items.forEach(it=>{
      const e=APE[g.data+'|'+it.fid]; const ferDia=e.feriado; const dis=e.falta||e.folga;
      const r=calcDia({data:g.data,marcacoes:e.marcacoes,feriado:ferDia,folga:e.folga,falta:e.falta,sem_he:e.sem_he}); tExtra+=r.extra;
      const mk=(i,k)=>{ const v=(e.marcacoes[i]&&e.marcacoes[i][k])||''; return `<input class="mark" data-ap="${g.data}|${it.fid}" data-i="${i}" data-k="${k}" value="${esc(v)}" placeholder="${k==='ent'?'ent':'sai'}" ${dis?'disabled':''}>`; };
      rows+=`<tr><td><b>${esc(it.nome)}</b><div class="sub">${TIPO_NOME[it.tipo]||it.tipo}</div></td>
        <td>${mk(0,'ent')} ${mk(0,'sai')}</td><td>${mk(1,'ent')} ${mk(1,'sai')}</td><td>${mk(2,'ent')} ${mk(2,'sai')}</td>
        <td class="num" id="nr_${g.data}|${it.fid}">${r.normal?m2hm(r.normal):'—'}</td><td class="num he" id="ex_${g.data}|${it.fid}">${r.extra?m2hm(r.extra):'—'}</td>
        <td style="white-space:nowrap"><label class="sub"><input type="checkbox" data-apflag="falta" data-ap="${g.data}|${it.fid}" ${e.falta?'checked':''}> falta</label>
          <label class="sub"><input type="checkbox" data-apflag="folga" data-ap="${g.data}|${it.fid}" ${e.folga?'checked':''}> folga</label></td>
        <td><button class="btn sm danger" data-aprm="${g.data}|${it.fid}" title="Descartar este">✕</button></td></tr>`;
    });
    const ferBadge=fer?`<span class="tag" style="background:#3a1d00;border-color:var(--gold);color:var(--gold);font-size:13px;padding:4px 12px">⚠ FERIADO — confirme</span>`:'';
    return `<div class="box" style="${fer?'border-color:var(--gold);box-shadow:0 0 0 1px var(--gold) inset':''}">
      <div class="row" style="justify-content:space-between;align-items:center;gap:8px">
        <div><div style="font-weight:800;font-size:15px">${_dataLabel(g.data)} ${ferBadge}</div>
          <div class="sub">${g.items.length} funcionário(s)${g.enviado_por?(' · por '+esc(g.enviado_por)):''}${g.enviado_em?(' · '+_dtLabel(g.enviado_em)):''} · HE total <b class="he" id="het_${g.data}">${m2hm(tExtra)}</b></div></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <label class="pill" style="${fer?'border-color:var(--gold)':''}"><input type="checkbox" data-apfer="${g.data}" ${fer?'checked':''}> Feriado (dia todo)</label>
          <button class="btn success" data-apok="${g.data}">✓ Aprovar</button>
          <button class="btn danger" data-apdel="${g.data}">Descartar</button>
        </div>
      </div>
      <div style="overflow-x:auto;margin-top:8px"><table><thead><tr><th>Funcionário</th><th>Turno 1 (ent/sai)</th><th>Turno 2</th><th>3º turno</th><th class="num">Normal</th><th class="num">Extra</th><th>Flags</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>
    </div>`;
  }).join('');
  return `<div class="box"><h2 style="font-size:15px">📥 Aprovações <span class="sub">(${APROV.length} dia(s) na fila)</span></h2>
    <div class="hint">Revise, ajuste se precisar e aprove. Ao <b>aprovar</b>, os dados são consolidados no ponto (e somem da fila). Dias com <b style="color:var(--gold)">FERIADO</b> ficam destacados — confirme antes de aprovar.</div></div>${cards}`;
}
function _aprovRecalc(key){
  const sp=key.split('|'), data=sp[0]; const e=APE[key];
  const r=calcDia({data,marcacoes:e.marcacoes,feriado:e.feriado,folga:e.folga,falta:e.falta,sem_he:e.sem_he});
  const nr=$('nr_'+key), ex=$('ex_'+key); if(nr) nr.textContent=r.normal?m2hm(r.normal):'—'; if(ex) ex.textContent=r.extra?m2hm(r.extra):'—';
  const g=APROV&&APROV.find(x=>x.data===data); if(g){ let t=0; g.items.forEach(it=>{ const ee=APE[data+'|'+it.fid]; t+=calcDia({data,marcacoes:ee.marcacoes,feriado:ee.feriado,folga:ee.folga,falta:ee.falta,sem_he:ee.sem_he}).extra; }); const ht=$('het_'+data); if(ht) ht.textContent=m2hm(t); }
}
function bindAprov(){
  if(!IS_ADMIN) return;
  if(APROV===null){ (async()=>{ await _loadAprov(); route(); })(); return; }
  document.querySelectorAll('input.mark[data-ap]').forEach(inp=>inp.onchange=()=>{ const key=inp.dataset.ap, e=APE[key], i=+inp.dataset.i,k=inp.dataset.k; while(e.marcacoes.length<=i) e.marcacoes.push({ent:'',sai:''}); e.marcacoes[i][k]=inp.value.trim(); _aprovRecalc(key); });
  document.querySelectorAll('input[data-apflag]').forEach(c=>c.onchange=()=>{ const e=APE[c.dataset.ap]; e[c.dataset.apflag]=c.checked; if(c.checked){ if(c.dataset.apflag==='falta')e.folga=false; else e.falta=false; e.marcacoes=[]; } route(); });
  document.querySelectorAll('input[data-apfer]').forEach(c=>c.onchange=()=>{ const data=c.dataset.apfer; const g=APROV.find(x=>x.data===data); if(g){ g.items.forEach(it=>{ APE[data+'|'+it.fid].feriado=c.checked; }); g.temFeriado=c.checked; } route(); });
  document.querySelectorAll('[data-apok]').forEach(b=>b.onclick=()=>aprovarDia(b.dataset.apok));
  document.querySelectorAll('[data-apdel]').forEach(b=>b.onclick=()=>descartarDia(b.dataset.apdel));
  document.querySelectorAll('[data-aprm]').forEach(b=>b.onclick=()=>descartarUm(b.dataset.aprm));
}
async function aprovarDia(data){
  const g=APROV.find(x=>x.data===data); if(!g) return;
  if(!confirm('Aprovar e consolidar '+g.items.length+' lançamento(s) de '+data.split('-').reverse().join('/')+'?\n(vira ponto definitivo)')) return;
  const ids=g.items.map(it=>it.fid);
  const linhas=g.items.map(it=>{ const e=APE[data+'|'+it.fid]; const marc=(e.falta||e.folga)?[]:(e.marcacoes||[]).filter(x=>x&&(x.ent||x.sai)).map(x=>({ent:x.ent||'',sai:x.sai||''}));
    return { funcionario_id:it.fid, data, marcacoes:marc, feriado:!!e.feriado, falta:!!e.falta, folga:!!e.folga, sem_he:!!e.sem_he }; });
  try{
    const {error}=await SB.from('ponto').upsert(linhas,{onConflict:'funcionario_id,data'}); if(error) throw error;
    await SB.from('ponto_pendente').delete().eq('data',data).in('funcionario_id',ids);   // só os consolidados (não apaga pendência que chegou depois)
    _st('✅ '+linhas.length+' lançamento(s) aprovados','#27ae60');
    await _loadAprov(); _updAprovBadge(); route();
  }catch(e){ _st('❌ '+e.message,'#c0392b'); }
}
async function descartarDia(data){
  const g=APROV.find(x=>x.data===data); if(!g) return;
  if(!confirm('Descartar TODA a coleta de '+data.split('-').reverse().join('/')+'?\nOs dados NÃO serão salvos no ponto.')) return;
  try{ await SB.from('ponto_pendente').delete().eq('data',data); _st('Coleta descartada','#e67e22'); await _loadAprov(); _updAprovBadge(); route(); }catch(e){ _st('❌ '+e.message,'#c0392b'); }
}
async function descartarUm(key){
  const sp=key.split('|'), data=sp[0], fid=+sp[1]; if(!confirm('Descartar este lançamento?')) return;
  try{ await SB.from('ponto_pendente').delete().eq('data',data).eq('funcionario_id',fid); await _loadAprov(); _updAprovBadge(); route(); }catch(e){ _st('❌ '+e.message,'#c0392b'); }
}
