<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<title>Campo — Alabama Agro</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0d1117">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Campo">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon.svg">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}</script>
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#1c2333;--line:#30363d;--text:#e6edf3;--muted:#8b949e;--gold:#ffc107;--ok:#27ae60;--err:#f85149;--blue:#388bfd}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font:17px system-ui,Segoe UI,Arial,sans-serif;padding:12px 12px 96px;-webkit-text-size-adjust:100%}
.top{position:sticky;top:0;background:var(--bg);padding:8px 0 10px;border-bottom:1px solid var(--line);margin-bottom:10px;z-index:5}
.top h1{font-size:18px;display:flex;align-items:center;gap:8px}.top h1 .l{color:var(--gold)}
.top .d{color:var(--muted);font-size:13px}
.card{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:14px}
.card .nm{font-size:16px;font-weight:800}.card .tp{color:var(--muted);font-size:12px;margin-top:2px}
label{font-size:13px;color:var(--muted);display:block;margin-bottom:4px}
input,select{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:10px;color:var(--text);font-size:18px;padding:13px}
input[type=time],input[type=number]{font-variant-numeric:tabular-nums}
.two{display:flex;gap:10px}.two>div{flex:1}
.btn{display:block;width:100%;border:0;border-radius:12px;padding:16px;font-size:18px;font-weight:800;cursor:pointer;margin-top:8px}
.btn.huge{font-size:21px;min-height:68px;padding:18px}
.daycard{padding:14px 15px}
.dhead{display:flex;justify-content:space-between;align-items:center;gap:12px}
.cbtn{width:auto;margin:0;min-height:56px;padding:14px 22px;font-size:17px}
.btn.g{background:var(--gold);color:#1a1100}.btn.k{background:var(--ok);color:#fff}.btn.s{background:var(--bg3);color:var(--text);border:1px solid var(--line)}
.btn.b{background:var(--blue);color:#fff}.btn.danger{background:transparent;border:1px solid var(--err);color:var(--err)}
.btn.sm{padding:9px 12px;font-size:14px;width:auto;display:inline-block;margin:0}
.btn:disabled{opacity:.5}
.bar{position:fixed;left:0;right:0;bottom:0;background:var(--bg2);border-top:1px solid var(--line);padding:10px 12px;display:flex;gap:10px;z-index:9}
.bar .btn{margin:0}
.lk{background:none;border:0;color:var(--gold);font-size:14px;cursor:pointer;padding:6px 0}
.muted{color:var(--muted)}.ok{color:var(--ok)}.err{color:var(--err)}.gold{color:var(--gold)}
.center{text-align:center}.big{font-size:54px}
.pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;border:1px solid var(--line);color:var(--muted)}
.pill.on{border-color:var(--ok);color:var(--ok)}.pill.go{border-color:var(--gold);color:var(--gold)}
.cmd{display:block;width:100%;text-align:left;background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:10px;cursor:pointer;color:var(--text)}
.cmd:active{border-color:var(--gold)}
.cmd .cod{font-weight:800;font-size:15px}
.cmd .meta{color:var(--muted);font-size:13px;margin-top:3px}
.cmd .st{float:right}
.hint{color:var(--muted);font-size:13px;margin-top:8px;line-height:1.4}
.kv{display:flex;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px solid var(--line);font-size:14px}
.kv b{font-weight:700}
.sec{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:14px 0 6px}
.agora{margin-top:4px}
.fl{display:flex;gap:10px;align-items:center;margin-top:8px}.fl input{width:24px;height:24px}.fl label{margin:0;color:var(--text);font-size:15px}
</style>
</head>
<body>
<div id="app"><div class="center muted" style="margin-top:40px">Carregando…</div></div>
<script>
const SB_URL='https://ngdidjtfgmtkdkvqwfjf.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5nZGlkanRmZ210a2RrdnF3ZmpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NTU5MDYsImV4cCI6MjA5NjUzMTkwNn0.OW9hGEFTvSYx_THv3DR9pt8xIVC0B9Pw2bTDGD6TBLk';
let SB=null;
const $=id=>document.getElementById(id);
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const num=v=>{ const n=parseFloat(String(v==null?'':v).replace(',','.')); return isFinite(n)?n:null; };
const brl=v=>'R$ '+(Number(v)||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const TIPO={registrado:'Registrado',diarista:'Diarista',temporario:'Temporário'};

let STEP='login', USER_EMAIL='';
let FUNCS=[], MAQS=[], IMPS=[], LOTES=[], SAFRA='', COMANDAS=[];
let OPER=null;              // {id,nome,tipo} operador escolhido (salvo no aparelho)
let DIA='';                 // 'AAAA-MM-DD'
let EXECS={};               // comanda_codigo -> execucao_campo de hoje (status das comandas)
let CUR=null;               // comanda aberta
let VERTODAS=false;         // fallback: mostrar todas as comandas (sem designação)

/* ---------- helpers ---------- */
function nowHM(){ const d=new Date(); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
function hoje(){ return new Date().toISOString().slice(0,10); }
function _dlabel(ds){ const d=new Date(ds+'T12:00:00'); return ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][d.getDay()]+' '+ds.split('-').reverse().join('/'); }
function t2m(s){ if(!s) return null; const m=String(s).match(/^(\d{1,2}):(\d{2})$/); return m?(+m[1])*60+(+m[2]):null; }
function horasEntre(a,b){ const x=t2m(a),y=t2m(b); if(x==null||y==null||y<=x) return null; return (y-x)/60; }
function areaLote(nome){ const l=LOTES.find(x=>x.nome===nome); return l?l.area:null; }
function _st(t,c){ let e=$('snack'); if(!e){ e=document.createElement('div'); e.id='snack'; e.style.cssText='position:fixed;left:12px;right:12px;bottom:78px;z-index:50;padding:11px 14px;border-radius:10px;font:600 14px system-ui;text-align:center;box-shadow:0 4px 14px rgba(0,0,0,.4)'; document.body.appendChild(e);} e.textContent=t; e.style.background=c||'#333'; e.style.color='#fff'; clearTimeout(e._t); e._t=setTimeout(()=>{e.remove();},3200); }

/* ---------- boot / login ---------- */
async function boot(){
  if(!window.supabase){ $('app').innerHTML='<div class="center err" style="margin-top:40px">Sem internet (biblioteca não carregou).</div>'; return; }
  SB=window.supabase.createClient(SB_URL,SB_KEY);
  const {data}=await SB.auth.getSession();
  if(data&&data.session){ entrar(); } else { STEP='login'; render(); }
}
function _msg(t,c){ const e=$('msg'); if(e){ e.textContent=t; e.style.color=c||'var(--muted)'; } }
async function login(){
  const em=$('e').value.trim(), pw=$('s').value;
  if(!em||!pw){ _msg('Preencha e-mail e senha.','var(--gold)'); return; }
  _msg('Entrando…'); try{ const {error}=await SB.auth.signInWithPassword({email:em,password:pw}); if(error){ _msg('Erro: '+error.message,'var(--err)'); return; } entrar(); }
  catch(e){ _msg('Falha: '+e.message,'var(--err)'); }
}
async function entrar(){
  DIA=hoje();
  try{ const {data:u}=await SB.auth.getUser(); USER_EMAIL=(u&&u.user&&u.user.email)||''; }catch(e){}
  try{ const {data:f}=await SB.from('funcionarios').select('id,nome,tipo,ativo').order('nome'); FUNCS=(f||[]).filter(x=>x.ativo!==false); }catch(e){ FUNCS=[]; }
  try{ const {data:m}=await SB.from('maquinas').select('id,nome,categoria,id_frota,consumo_ref').order('nome'); MAQS=m||[]; }catch(e){ MAQS=[]; }
  try{ const {data:i}=await SB.from('implementos').select('id,nome,categoria,id_frota,largura_trabalho').order('nome'); IMPS=i||[]; }catch(e){ IMPS=[]; }
  try{ const {data:l}=await SB.from('lotes').select('nome,area').order('nome'); LOTES=l||[]; }catch(e){ LOTES=[]; }
  await carregarSafra();
  // operador salvo no aparelho?
  let oid=null; try{ oid=+localStorage.getItem('campo_oper')||null; }catch(e){}
  OPER = oid? (FUNCS.find(f=>f.id===oid)||null) : null;
  if(OPER){ await carregarDia(); STEP='home'; } else { STEP='quemsou'; }
  render();
}
async function carregarSafra(){
  let safras=[]; try{ const {data}=await SB.from('safras').select('*'); safras=data||[]; }catch(e){}
  const h=hoje();
  let s=safras.find(x=>x.inicio&&x.fim&&x.inicio<=h&&h<=x.fim);
  if(!s) s=safras.slice().sort((a,b)=>(b.ano||0)-(a.ano||0))[0];
  SAFRA=s?s.nome:'';
  try{ const {data}=await SB.from('comandas').select('*').eq('safra',SAFRA).neq('status','cancelada'); COMANDAS=data||[]; }catch(e){ COMANDAS=[]; }
}
async function carregarDia(){
  if(!OPER) return;
  // execuções de hoje deste operador (só p/ marcar o status das comandas na lista)
  EXECS={};
  try{ const {data}=await SB.from('execucao_campo').select('*').eq('funcionario_id',OPER.id).eq('data',DIA); (data||[]).forEach(x=>{ if(x.comanda_codigo) EXECS[x.comanda_codigo]=x; }); }catch(e){}
}

/* ---------- comandas do operador ---------- */
function comandasDoOperador(){
  const desig=COMANDAS.filter(c=>(c.operadores||[]).map(Number).includes(OPER.id));
  if(desig.length || !VERTODAS) return desig;
  return COMANDAS.slice();
}

/* ===================== RENDER ===================== */
function render(){
  if(STEP==='login') return renderLogin();
  if(STEP==='quemsou') return renderQuemSou();
  if(STEP==='home') return renderHome();
  if(STEP==='exec') return renderExec();
  if(STEP==='fim') return renderFim();
}
function _botoesSair(){ return '<button class="lk" id="sair">sair</button> <button class="lk" id="troca" style="margin-left:14px">trocar operador</button>'; }
function _bindSair(){ if($('sair'))$('sair').onclick=async()=>{ if(SB) await SB.auth.signOut(); location.reload(); }; if($('troca'))$('troca').onclick=()=>{ try{localStorage.removeItem('campo_oper');}catch(e){} OPER=null; STEP='quemsou'; render(); }; }

function renderLogin(){
  $('app').innerHTML=`<div class="top"><h1><span class="l">🚜</span> Campo</h1><div class="d">Alabama Agro</div></div>
    <div class="card"><label>E-mail</label><input id="e" type="email" autocomplete="username">
      <label style="margin-top:10px">Senha</label><input id="s" type="password" autocomplete="current-password">
      <button class="btn g" id="b">Entrar</button>
      <div id="msg" class="center" style="margin-top:10px;font-size:13px;min-height:16px"></div></div>`;
  $('b').onclick=login; $('s').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
}
function renderQuemSou(){
  const opts=FUNCS.map(f=>`<option value="${f.id}">${esc(f.nome)} (${TIPO[f.tipo]||f.tipo})</option>`).join('');
  $('app').innerHTML=`<div class="top"><h1><span class="l">👤</span> Quem é você?</h1><div class="d">Escolha o operador deste tablet (fica salvo no aparelho)</div></div>
    <div class="card"><label>Operador</label><select id="op"><option value="">— escolha —</option>${opts}</select>
      <button class="btn g" id="ok">Confirmar</button>
      <div class="hint">Isso identifica de quem são as comandas deste tablet. Você pode trocar depois em "trocar operador".</div></div>
    <div style="margin-top:8px">${_botoesSair()}</div>`;
  $('ok').onclick=async()=>{ const id=+$('op').value; if(!id){ _st('Escolha o operador.','#e67e22'); return; } OPER=FUNCS.find(f=>f.id===id); try{localStorage.setItem('campo_oper',String(id));}catch(e){} await carregarDia(); STEP='home'; render(); };
  _bindSair();
}
function renderHome(){
  const lista=comandasDoOperador();
  const desigCount=COMANDAS.filter(c=>(c.operadores||[]).map(Number).includes(OPER.id)).length;
  const cards=lista.map(c=>{
    const ex=EXECS[c.codigo]; const done=c.status==='executada';
    let stbadge = done?'<span class="pill on st">concluída</span>'
      : ex?(ex.concluiu_lote?'<span class="pill on st">enviada · lote concluído</span>':'<span class="pill go st">apontada hoje</span>')
      : '<span class="pill st">a fazer</span>';
    const area=areaLote(c.lote_nome);
    return `<button class="cmd" data-cod="${esc(c.codigo)}">${stbadge}
      <div class="cod">${esc(c.codigo)} · ${esc(c.tipo_ativ||'—')}</div>
      <div class="meta">Lote ${esc(c.lote_nome||'—')}${area?(' · '+area+' ha'):''}${c.prod_texto?(' · '+esc(c.prod_texto)):''}</div></button>`;
  }).join('');
  $('app').innerHTML=`<div class="top"><h1><span class="l">🚜</span> ${esc(OPER.nome)}</h1>
      <div class="d">${_dlabel(DIA)} · safra ${esc(SAFRA||'—')}</div></div>
    <div class="sec">Comandas ${desigCount?('designadas a você ('+desigCount+')'):''}</div>
    ${cards||`<div class="card muted">Nenhuma comanda ${desigCount?'':'designada a você '}nesta safra.${desigCount?'':' <a class="lk" id="vt" style="display:inline">ver todas para teste</a>'}</div>`}
    <div class="bar">${_botoesSairBar()}</div>`;
  if($('vt'))$('vt').onclick=()=>{ VERTODAS=true; render(); };
  document.querySelectorAll('[data-cod]').forEach(b=>b.onclick=()=>abrirComanda(b.dataset.cod));
  _bindSairBar();
}
function _botoesSairBar(){ return `<button class="btn s" id="sair2">Sair</button><button class="btn s" id="troca2">Trocar operador</button>`; }
function _bindSairBar(){ if($('sair2'))$('sair2').onclick=async()=>{ if(SB) await SB.auth.signOut(); location.reload(); }; if($('troca2'))$('troca2').onclick=()=>{ try{localStorage.removeItem('campo_oper');}catch(e){} OPER=null; STEP='quemsou'; render(); }; }

let CUR_DAYS=[];                 // execuções (1 card por dia) da comanda aberta
let HDR={maquina_id:'',implemento_id:''};   // máquina/implemento escolhidos no cabeçalho
async function _carregarDiasComanda(){
  CUR_DAYS=[];
  try{ const {data}=await SB.from('execucao_campo').select('*').eq('comanda_codigo',CUR.codigo).eq('funcionario_id',OPER.id).order('data',{ascending:false}); CUR_DAYS=data||[]; }catch(e){ _st('❌ '+e.message,'#c0392b'); }
  const ult=CUR_DAYS[0];
  HDR={ maquina_id:(ult&&ult.maquina_id)||'', implemento_id:(ult&&ult.implemento_id)||'' };
}
async function abrirComanda(cod){
  CUR=COMANDAS.find(c=>String(c.codigo)===String(cod)); if(!CUR){ _st('Comanda não encontrada.','#c0392b'); return; }
  await _carregarDiasComanda();
  STEP='exec'; render(); window.scrollTo(0,0);
}
function renderExec(){
  const c=CUR; const area=areaLote(c.lote_nome);
  const maqOpt=`<option value="">— escolher trator/máquina —</option>`+MAQS.map(m=>`<option value="${m.id}" ${String(HDR.maquina_id)===String(m.id)?'selected':''}>${esc(m.nome)}${m.id_frota?(' ('+esc(m.id_frota)+')'):''}</option>`).join('');
  const impOpt=`<option value="">— implemento (opcional) —</option>`+IMPS.map(m=>`<option value="${m.id}" ${String(HDR.implemento_id)===String(m.id)?'selected':''}>${esc(m.nome)}${m.largura_trabalho?(' · '+m.largura_trabalho+' m'):''}</option>`).join('');
  const hojeCard=CUR_DAYS.find(r=>r.data===DIA);
  const emAndamento=hojeCard && !hojeCard.hora_fim;
  const concluida=CUR_DAYS.some(r=>r.concluiu_lote) || c.status==='executada';
  const cards=CUR_DAYS.map(r=>_dayCard(r)).join('') || '<div class="card muted" style="text-align:center;padding:22px">Nenhum dia ainda. Toque em <b>Iniciar</b> para começar.</div>';
  $('app').innerHTML=`<div class="top"><h1><span class="l">📋</span> ${esc(c.codigo)}</h1><div class="d">${esc(c.tipo_ativ||'')} · Lote ${esc(c.lote_nome||'—')}${area?(' · '+area+' ha'):''}</div></div>
    <div class="card">
      <div class="kv"><span>Operador</span><b>${esc(OPER.nome)}</b></div>
      <label style="margin-top:10px">Trator / máquina</label><select id="h_maq">${maqOpt}</select>
      <label style="margin-top:12px">Implemento</label><select id="h_imp">${impOpt}</select>
      ${concluida?'<div class="hint" style="margin-top:14px">✅ Lote concluído e enviado.</div>'
        : emAndamento?'<div class="hint" style="margin-top:14px">Atividade de hoje em andamento — finalize no card abaixo.</div>'
        : `<button class="btn b huge" id="btn_ini" style="margin-top:16px">▶ Iniciar${hojeCard?' (novo dia)':''}</button>`}
    </div>
    ${cards}
    ${concluida?'' : `<button class="btn s" id="concluir">✔ Concluí o lote — enviar comanda</button>`}
    <div class="bar"><button class="btn s" id="voltar">◀ Voltar às comandas</button></div>`;
  if($('h_maq'))$('h_maq').onchange=()=>{ HDR.maquina_id=$('h_maq').value; };
  if($('h_imp'))$('h_imp').onchange=()=>{ HDR.implemento_id=$('h_imp').value; };
  if($('btn_ini'))$('btn_ini').onclick=iniciarAtividade;
  if($('concluir'))$('concluir').onclick=concluirLote;
  if($('voltar'))$('voltar').onclick=async()=>{ STEP='home'; await carregarDia(); render(); };
  document.querySelectorAll('[data-fin]').forEach(b=>b.onclick=()=>finalizarAtividade(b.dataset.fin));
  document.querySelectorAll('.cardf').forEach(inp=>inp.onchange=()=>salvarCampoCard(inp.dataset.d, inp.dataset.f, inp.value));
}
function _dayCard(r){
  const d=r.data; const tempo=horasEntre(r.hora_inicio,r.hora_fim);
  const hm=(r.horimetro_ini!=null&&r.horimetro_fim!=null)?(num(r.horimetro_fim)-num(r.horimetro_ini)):null;
  if(!r.hora_fim){
    return `<div class="card daycard"><div class="dhead">
      <div><b>${_dlabel(d)}</b><div class="muted" style="font-size:14px;margin-top:2px">início ${esc(r.hora_inicio||'—')} · <span class="gold">em andamento</span></div></div>
      <button class="btn k cbtn" data-fin="${d}">■ Finalizar</button></div></div>`;
  }
  return `<div class="card daycard"><div class="dhead"><div><b>${_dlabel(d)}</b>
      <div class="muted" style="font-size:14px;margin-top:2px">${esc(r.hora_inicio||'—')}–${esc(r.hora_fim)}${tempo!=null?(' · '+tempo.toFixed(1)+' h'):''}${r.concluiu_lote?' · <span class="ok">lote concluído</span>':''}</div></div></div>
    <div class="two" style="margin-top:10px">
      <div><label>Horímetro início</label><input class="cardf" type="number" step="any" inputmode="decimal" data-d="${d}" data-f="horimetro_ini" value="${r.horimetro_ini??''}"></div>
      <div><label>Horímetro fim</label><input class="cardf" type="number" step="any" inputmode="decimal" data-d="${d}" data-f="horimetro_fim" value="${r.horimetro_fim??''}"></div>
    </div>
    <div class="hint" id="hm_${r.id}">${(hm!=null&&isFinite(hm))?('Hora-máquina: <b class="gold">'+hm.toFixed(1)+' h</b>'):''}</div>
    <label style="margin-top:10px">Diesel (L)</label><input class="cardf" type="number" step="any" inputmode="decimal" data-d="${d}" data-f="diesel_litros" value="${r.diesel_litros??''}" placeholder="litros abastecidos">
    <label style="margin-top:10px">Área feita (ha)</label><input class="cardf" type="number" step="any" inputmode="decimal" data-d="${d}" data-f="area_ha" value="${r.area_ha??''}" placeholder="manual (GPS na fase 2)">
    <label style="margin-top:10px">Observação</label><input class="cardf" data-d="${d}" data-f="obs" value="${esc(r.obs||'')}" placeholder="opcional">
  </div>`;
}
async function iniciarAtividade(){
  HDR.maquina_id=($('h_maq')&&$('h_maq').value)||HDR.maquina_id;
  HDR.implemento_id=($('h_imp')&&$('h_imp').value)||HDR.implemento_id;
  if(!HDR.maquina_id){ _st('Escolha o trator/máquina no cabeçalho.','#e67e22'); return; }
  const existe=CUR_DAYS.find(r=>r.data===DIA);
  if(existe && !existe.hora_fim){ _st('Já há atividade em andamento hoje.','#e67e22'); return; }
  if(existe && existe.hora_fim && !confirm('Já existe um card de hoje. Iniciar de novo vai sobrescrever. Continuar?')) return;
  const reg={ comanda_codigo:CUR.codigo, safra:SAFRA, funcionario_id:OPER.id, lote_nome:CUR.lote_nome||null, data:DIA,
    maquina_id:+HDR.maquina_id, implemento_id:HDR.implemento_id?+HDR.implemento_id:null,
    hora_inicio:nowHM(), hora_fim:null, status:'aberto', enviado_por:USER_EMAIL||null, atualizado_em:new Date().toISOString() };
  try{ const {error}=await SB.from('execucao_campo').upsert(reg,{onConflict:'comanda_codigo,funcionario_id,data'}); if(error) throw error;
    _st('▶ Atividade iniciada às '+reg.hora_inicio,'#27ae60'); await _carregarDiasComanda(); render(); }
  catch(e){ _st('❌ '+e.message,'#c0392b'); }
}
async function finalizarAtividade(d){
  const r=CUR_DAYS.find(x=>x.data===d); if(!r) return;
  if(!confirm('Finalizar a atividade agora ('+nowHM()+')?')) return;
  try{ const {error}=await SB.from('execucao_campo').update({hora_fim:nowHM(), status:'enviada', atualizado_em:new Date().toISOString()}).eq('id',r.id); if(error) throw error;
    _st('■ Atividade finalizada','#27ae60'); await _carregarDiasComanda(); render(); }
  catch(e){ _st('❌ '+e.message,'#c0392b'); }
}
async function salvarCampoCard(d, campo, valor){
  const r=CUR_DAYS.find(x=>x.data===d); if(!r) return;
  const patch={atualizado_em:new Date().toISOString()}; patch[campo]=(campo==='obs')?(valor||null):num(valor);
  try{ const {error}=await SB.from('execucao_campo').update(patch).eq('id',r.id); if(error) throw error; Object.assign(r,patch);
    if(campo==='horimetro_ini'||campo==='horimetro_fim'){ const el=$('hm_'+r.id); if(el){ const hm=(r.horimetro_ini!=null&&r.horimetro_fim!=null)?(num(r.horimetro_fim)-num(r.horimetro_ini)):null; el.innerHTML=(hm!=null&&isFinite(hm))?('Hora-máquina: <b class="gold">'+hm.toFixed(1)+' h</b>'):''; } }
  }catch(e){ _st('❌ '+e.message,'#c0392b'); }
}
async function concluirLote(){
  if(!CUR_DAYS.length){ _st('Nenhum dia lançado ainda.','#e67e22'); return; }
  if(!confirm('Concluir o lote e enviar a comanda para aprovação?')) return;
  const r=CUR_DAYS.find(x=>x.data===DIA)||CUR_DAYS[0];
  const patch={concluiu_lote:true, status:'enviada', atualizado_em:new Date().toISOString()};
  if(!r.hora_fim) patch.hora_fim=nowHM();   // se concluiu sem finalizar o dia, fecha agora
  try{ const {error}=await SB.from('execucao_campo').update(patch).eq('id',r.id); if(error) throw error;
    STEP='fim'; render(); }
  catch(e){ _st('❌ '+e.message,'#c0392b'); }
}
function renderFim(){
  $('app').innerHTML=`<div class="center" style="margin-top:46px">
    <div class="big">✅</div>
    <h1 style="font-size:24px;margin:10px 0">Comanda enviada</h1>
    <div class="muted">${esc(CUR.codigo)} · lote ${esc(CUR.lote_nome||'')}</div>
    <div class="muted" style="font-size:14px;margin-top:8px">Lote concluído e enviado para aprovação do administrador.</div>
    <button class="btn g huge" id="volta" style="max-width:340px;margin:24px auto 0">Voltar às comandas</button>
  </div>`;
  $('volta').onclick=async()=>{ STEP='home'; await carregarDia(); render(); };
}

window.addEventListener('load',()=>{ setTimeout(boot,150); });
</script>
</body>
