<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#1c2333;--line:#30363d;--text:#e6edf3;--muted:#8b949e;--gold:#ffc107;--ok:#27ae60;--err:#f85149;--blue:#388bfd}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font:17px system-ui,Segoe UI,Arial,sans-serif;padding:12px 12px 96px;-webkit-text-size-adjust:100%}
.top{position:sticky;top:0;background:var(--bg);padding:8px 0 10px;border-bottom:1px solid var(--line);margin-bottom:10px;z-index:5}
.top h1{font-size:18px;display:flex;align-items:center;gap:8px}.top h1 .l{color:var(--gold)}
.top .d{color:var(--muted);font-size:13px}
.card{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:14px}
.card .nm{font-size:16px;font-weight:800}.card .tp{color:var(--muted);font-size:12px;margin-top:2px}
label{font-size:13px;color:var(--muted);display:block;margin-bottom:4px}
input,select{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:10px;color:var(--text);font-size:18px;padding:13px}
input[type=time],input[type=number]{font-variant-numeric:tabular-nums}
.two{display:flex;gap:10px}.two>div{flex:1}
.btn{display:block;width:100%;border:0;border-radius:12px;padding:16px;font-size:18px;font-weight:800;cursor:pointer;margin-top:8px}
.btn.huge{font-size:21px;min-height:68px;padding:18px}
.daycard{padding:14px 15px}
.dhead{display:flex;justify-content:space-between;align-items:center;gap:12px}
.cbtn{width:auto;margin:0;min-height:56px;padding:14px 22px;font-size:17px}
.btn.g{background:var(--gold);color:#1a1100}.btn.k{background:var(--ok);color:#fff}.btn.s{background:var(--bg3);color:var(--text);border:1px solid var(--line)}
.btn.b{background:var(--blue);color:#fff}.btn.danger{background:transparent;border:1px solid var(--err);color:var(--err)}
.btn.sm{padding:9px 12px;font-size:14px;width:auto;display:inline-block;margin:0}
.btn:disabled{opacity:.5}
.bar{position:fixed;left:0;right:0;bottom:0;background:var(--bg2);border-top:1px solid var(--line);padding:10px 12px;display:flex;gap:10px;z-index:9}
.bar .btn{margin:0}
.lk{background:none;border:0;color:var(--gold);font-size:14px;cursor:pointer;padding:6px 0}
.muted{color:var(--muted)}.ok{color:var(--ok)}.err{color:var(--err)}.gold{color:var(--gold)}
.center{text-align:center}.big{font-size:54px}
.pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;border:1px solid var(--line);color:var(--muted)}
.pill.on{border-color:var(--ok);color:var(--ok)}.pill.go{border-color:var(--gold);color:var(--gold)}
.cmd{display:block;width:100%;text-align:left;background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:10px;cursor:pointer;color:var(--text)}
.cmd:active{border-color:var(--gold)}
.cmd .cod{font-weight:800;font-size:15px}
.cmd .meta{color:var(--muted);font-size:13px;margin-top:3px}
.cmd .st{float:right}
.hint{color:var(--muted);font-size:13px;margin-top:8px;line-height:1.4}
.kv{display:flex;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px solid var(--line);font-size:14px}
.kv b{font-weight:700}
.sec{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:14px 0 6px}
.agora{margin-top:4px}
.fl{display:flex;gap:10px;align-items:center;margin-top:8px}.fl input{width:24px;height:24px}.fl label{margin:0;color:var(--text);font-size:15px}

const brl=v=>'R$ '+(Number(v)||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});

/* ---------- helpers ---------- */
function nowHM(){ const d=new Date(); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
function hoje(){ return new Date().toISOString().slice(0,10); }
function _dlabel(ds){ const d=new Date(ds+'T12:00:00'); return ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][d.getDay()]+' '+ds.split('-').reverse().join('/'); }
function t2m(s){ if(!s) return null; const m=String(s).match(/^(\d{1,2}):(\d{2})$/); return m?(+m[1])*60+(+m[2]):null; }
function horasEntre(a,b){ const x=t2m(a),y=t2m(b); if(x==null||y==null||y<=x) return null; return (y-x)/60; }
function areaLote(nome){ const l=LOTES.find(x=>x.nome===nome); return l?l.area:null; }
function _st(t,c){ let e=$('snack'); if(!e){ e=document.createElement('div'); e.id='snack'; e.style.cssText='position:fixed;left:12px;right:12px;bottom:78px;z-index:50;padding:11px 14px;border-radius:10px;font:600 14px system-ui;text-align:center;box-shadow:0 4px 14px rgba(0,0,0,.4)'; document.body.appendChild(e);} e.textContent=t; e.style.background=c||'#333'; e.style.color='#fff'; clearTimeout(e._t); e._t=setTimeout(()=>{e.remove();},3200); }

/* ---------- boot / login ---------- */
async function boot(){
  if(!window.supabase){ $('app').innerHTML='<div class="center err" style="margin-top:40px">Sem internet (biblioteca não carregou).</div>'; return; }
  SB=window.supabase.createClient(SB_URL,SB_KEY);
  const {data}=await SB.auth.getSession();
  if(data&&data.session){ entrar(); } else { STEP='login'; render(); }
}
function _msg(t,c){ const e=$('msg'); if(e){ e.textContent=t; e.style.color=c||'var(--muted)'; } }
async function login(){
  const em=$('e').value.trim(), pw=$('s').value;
  if(!em||!pw){ _msg('Preencha e-mail e senha.','var(--gold)'); return; }
  _msg('Entrando…'); try{ const {error}=await SB.auth.signInWithPassword({email:em,password:pw}); if(error){ _msg('Erro: '+error.message,'var(--err)'); return; } entrar(); }
  catch(e){ _msg('Falha: '+e.message,'var(--err)'); }
}
async function entrar(){
  DIA=hoje();
  try{ const {data:u}=await SB.auth.getUser(); USER_EMAIL=(u&&u.user&&u.user.email)||''; }catch(e){}
  try{ const {data:f}=await SB.from('funcionarios').select('id,nome,tipo,ativo').order('nome'); FUNCS=(f||[]).filter(x=>x.ativo!==false); }catch(e){ FUNCS=[]; }
  try{ const {data:m}=await SB.from('maquinas').select('id,nome,categoria,id_frota,consumo_ref').order('nome'); MAQS=m||[]; }catch(e){ MAQS=[]; }
  try{ const {data:i}=await SB.from('implementos').select('id,nome,categoria,id_frota,largura_trabalho').order('nome'); IMPS=i||[]; }catch(e){ IMPS=[]; }
  try{ const {data:l}=await SB.from('lotes').select('nome,area,geom').order('nome'); LOTES=l||[]; }catch(e){ LOTES=[]; }
  await carregarSafra();
  // operador salvo no aparelho?
  let oid=null; try{ oid=+localStorage.getItem('campo_oper')||null; }catch(e){}
  OPER = oid? (FUNCS.find(f=>f.id===oid)||null) : null;
  if(OPER){ await carregarDia(); STEP='home'; } else { STEP='quemsou'; }
  render();
}
async function carregarSafra(){
  let safras=[]; try{ const {data}=await SB.from('safras').select('*'); safras=data||[]; }catch(e){}
  const h=hoje();
  let s=safras.find(x=>x.inicio&&x.fim&&x.inicio<=h&&h<=x.fim);
  if(!s) s=safras.slice().sort((a,b)=>(b.ano||0)-(a.ano||0))[0];
  SAFRA=s?s.nome:'';
  try{ const {data}=await SB.from('comandas').select('*').eq('safra',SAFRA).neq('status','cancelada'); COMANDAS=data||[]; }catch(e){ COMANDAS=[]; }
}
async function carregarDia(){
  if(!OPER) return;
  // execuções de hoje deste operador (só p/ marcar o status das comandas na lista)
  EXECS={};
  try{ const {data}=await SB.from('execucao_campo').select('*').eq('funcionario_id',OPER.id).eq('data',DIA); (data||[]).forEach(x=>{ if(x.comanda_codigo) EXECS[x.comanda_codigo]=x; }); }catch(e){}
}

/* ---------- comandas do operador ---------- */
function comandasDoOperador(){
  const desig=COMANDAS.filter(c=>(c.operadores||[]).map(Number).includes(OPER.id));
  if(desig.length || !VERTODAS) return desig;
  return COMANDAS.slice();
}

/* ===================== RENDER ===================== */
function render(){
  if(STEP==='login') return renderLogin();
  if(STEP==='quemsou') return renderQuemSou();
  if(STEP==='home') return renderHome();
  if(STEP==='exec') return EXVIEW==='trabalho'?renderTrabalho():renderExecMenu();
  if(STEP==='fim') return renderFim();
}
function _botoesSair(){ return '<button class="lk" id="sair">sair</button> <button class="lk" id="troca" style="margin-left:14px">trocar operador</button>'; }
function _bindSair(){ if($('sair'))$('sair').onclick=async()=>{ if(SB) await SB.auth.signOut(); location.reload(); }; if($('troca'))$('troca').onclick=()=>{ try{localStorage.removeItem('campo_oper');}catch(e){} OPER=null; STEP='quemsou'; render(); }; }

function renderLogin(){
  $('app').innerHTML=`<div class="top"><h1><span class="l">🚜</span> Campo</h1><div class="d">Alabama Agro</div></div>
    <div class="card"><label>E-mail</label><input id="e" type="email" autocomplete="username">
      <label style="margin-top:10px">Senha</label><input id="s" type="password" autocomplete="current-password">
      <button class="btn g" id="b">Entrar</button>
      <div id="msg" class="center" style="margin-top:10px;font-size:13px;min-height:16px"></div></div>`;
  $('b').onclick=login; $('s').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
}
function renderQuemSou(){
  const opts=FUNCS.map(f=>`<option value="${f.id}">${esc(f.nome)} (${TIPO[f.tipo]||f.tipo})</option>`).join('');
  $('app').innerHTML=`<div class="top"><h1><span class="l">👤</span> Quem é você?</h1><div class="d">Escolha o operador deste tablet (fica salvo no aparelho)</div></div>
    <div class="card"><label>Operador</label><select id="op"><option value="">— escolha —</option>${opts}</select>
      <button class="btn g" id="ok">Confirmar</button>
      <div class="hint">Isso identifica de quem são as comandas deste tablet. Você pode trocar depois em "trocar operador".</div></div>
    <div style="margin-top:8px">${_botoesSair()}</div>`;
  $('ok').onclick=async()=>{ const id=+$('op').value; if(!id){ _st('Escolha o operador.','#e67e22'); return; } OPER=FUNCS.find(f=>f.id===id); try{localStorage.setItem('campo_oper',String(id));}catch(e){} await carregarDia(); STEP='home'; render(); };
  _bindSair();
}
function renderHome(){
  const lista=comandasDoOperador();
  const desigCount=COMANDAS.filter(c=>(c.operadores||[]).map(Number).includes(OPER.id)).length;
  const cards=lista.map(c=>{
    const ex=EXECS[c.codigo]; const done=c.status==='executada';
    let stbadge = done?'<span class="pill on st">concluída</span>'
      : ex?(ex.concluiu_lote?'<span class="pill on st">enviada · lote concluído</span>':'<span class="pill go st">apontada hoje</span>')
      : '<span class="pill st">a fazer</span>';
    const area=areaLote(c.lote_nome);
    return `<button class="cmd" data-cod="${esc(c.codigo)}">${stbadge}
      <div class="cod">${esc(c.codigo)} · ${esc(c.tipo_ativ||'—')}</div>
      <div class="meta">Lote ${esc(c.lote_nome||'—')}${area?(' · '+area+' ha'):''}${c.prod_texto?(' · '+esc(c.prod_texto)):''}</div></button>`;
  }).join('');
  $('app').innerHTML=`<div class="top"><h1><span class="l">🚜</span> ${esc(OPER.nome)}</h1>
      <div class="d">${_dlabel(DIA)} · safra ${esc(SAFRA||'—')}</div></div>
    <div class="sec">Comandas ${desigCount?('designadas a você ('+desigCount+')'):''}</div>
    ${cards||`<div class="card muted">Nenhuma comanda ${desigCount?'':'designada a você '}nesta safra.${desigCount?'':' <a class="lk" id="vt" style="display:inline">ver todas para teste</a>'}</div>`}
    <div class="bar">${_botoesSairBar()}</div>`;
  if($('vt'))$('vt').onclick=()=>{ VERTODAS=true; render(); };
  document.querySelectorAll('[data-cod]').forEach(b=>b.onclick=()=>abrirComanda(b.dataset.cod));
  _bindSairBar();
}
function _botoesSairBar(){ return `<button class="btn s" id="sair2">Sair</button><button class="btn s" id="troca2">Trocar operador</button>`; }
function _bindSairBar(){ if($('sair2'))$('sair2').onclick=async()=>{ if(SB) await SB.auth.signOut(); location.reload(); }; if($('troca2'))$('troca2').onclick=()=>{ try{localStorage.removeItem('campo_oper');}catch(e){} OPER=null; STEP='quemsou'; render(); }; }

let CUR_DAYS=[];                 // execuções (1 card por dia) da comanda aberta
let HDR={maquina_id:'',implemento_id:''};   // máquina/implemento escolhidos no cabeçalho
let EXVIEW='menu';              // dentro da comanda: 'menu' (ícones) | 'trabalho' (apontamento)
async function _carregarDiasComanda(){
  CUR_DAYS=[];
  try{ const {data}=await SB.from('execucao_campo').select('*').eq('comanda_codigo',CUR.codigo).eq('funcionario_id',OPER.id).order('data',{ascending:false}); CUR_DAYS=data||[]; }catch(e){ _st('❌ '+e.message,'#c0392b'); }
  const ult=CUR_DAYS[0];
  HDR={ maquina_id:(ult&&ult.maquina_id)||'', implemento_id:(ult&&ult.implemento_id)||'' };
}
async function abrirComanda(cod){
  CUR=COMANDAS.find(c=>String(c.codigo)===String(cod)); if(!CUR){ _st('Comanda não encontrada.','#c0392b'); return; }
  if(GPS.watchId!=null){ try{navigator.geolocation.clearWatch(GPS.watchId);}catch(e){} GPS.watchId=null; } GPS.running=false; GPS.pts=[]; GPS.cells=new Set(); GPS.areaHa=0; GPS.bb=null; _TR=null;
  await _carregarDiasComanda();
  EXVIEW='menu'; STEP='exec'; render(); window.scrollTo(0,0);
}
/* ---- menu da comanda: dois ícones ---- */
function renderExecMenu(){
  const c=CUR; const area=areaLote(c.lote_nome);
  $('app').innerHTML=`<div class="top"><h1><span class="l">📋</span> ${esc(c.codigo)}</h1><div class="d">${esc(c.tipo_ativ||'')} · Lote ${esc(c.lote_nome||'—')}${area?(' · '+area+' ha'):''}</div></div>
    <button class="btn b huge" id="ic_cmd" style="margin-top:6px">📋 Ver comanda</button>
    <div class="hint" style="text-align:center;margin-top:2px">a comanda impressa — dá pra dar zoom com os dedos</div>
    <button class="btn k huge" id="ic_trab" style="margin-top:16px">🛰️ Tela de trabalho</button>
    <div class="hint" style="text-align:center;margin-top:2px">apontar o dia (máquina, horímetro, diesel, área)</div>
    <div class="bar"><button class="btn s" id="voltar">◀ Voltar às comandas</button></div>`;
  if($('ic_cmd'))$('ic_cmd').onclick=abrirComandaDoc;
  if($('ic_trab'))$('ic_trab').onclick=()=>{ EXVIEW='trabalho'; render(); window.scrollTo(0,0); };
  if($('voltar'))$('voltar').onclick=async()=>{ STEP='home'; EXVIEW='menu'; await carregarDia(); render(); };
}
/* ---- abre a comanda (placeholder até virar PDF offline; NUNCA carrega o admin) ---- */
function abrirComandaDoc(){
  const ov=document.createElement('div'); ov.id='docov';
  ov.style.cssText='position:fixed;inset:0;z-index:1000;background:#0d1117;color:#e6edf3;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center';
  ov.innerHTML='<div style="font-size:52px">📄</div><h2 style="margin:10px 0">Comanda '+esc(CUR.codigo)+'</h2><div class="muted" style="max-width:360px;line-height:1.5">Aqui vai abrir a comanda como <b>PDF</b> — pra funcionar <b>offline</b> no campo e dar zoom direito, <u>sem acessar o sistema admin</u>. Estou montando esse formato.</div><button class="btn g" id="docback" style="max-width:240px;margin-top:22px">Voltar</button>';
  document.body.appendChild(ov);
  ov.querySelector('#docback').onclick=()=>ov.remove();
}
/* ===================== TELA DE TRABALHO (GPS — cobertura) ===================== */
let GPS={running:false,watchId:null,pts:[],cells:new Set(),areaHa:0,speed:0,head:0,wake:null,acc:null,_lt:0,bb:null,_dt:null};
const CELL=2; // m — resolução da cobertura
function latLngToUTM(lat,lon,zona){
  const a=6378137.0,f=1/298.257223563,e2=f*(2-f),ep2=e2/(1-e2),k0=0.9996;
  const lon0=(zona*6-183)*Math.PI/180, latR=lat*Math.PI/180, lonR=lon*Math.PI/180;
  const N=a/Math.sqrt(1-e2*Math.sin(latR)**2), T=Math.tan(latR)**2, C=ep2*Math.cos(latR)**2, A=Math.cos(latR)*(lonR-lon0);
  const M=a*((1-e2/4-3*e2*e2/64-5*e2*e2*e2/256)*latR-(3*e2/8+3*e2*e2/32+45*e2*e2*e2/1024)*Math.sin(2*latR)+(15*e2*e2/256+45*e2*e2*e2/1024)*Math.sin(4*latR)-(35*e2*e2*e2/3072)*Math.sin(6*latR));
  const E=k0*N*(A+(1-T+C)*A**3/6+(5-18*T+T*T+72*C-58*ep2)*A**5/120)+500000;
  let No=k0*(M+N*Math.tan(latR)*(A*A/2+(5-T+9*C+4*C*C)*A**4/24+(61-58*T+T*T+600*C-330*ep2)*A**6/720));
  if(lat<0) No+=10000000;
  return [E,No];
}
function _polyUTM(){ const l=LOTES.find(x=>x.nome===CUR.lote_nome); const g=l&&l.geom; return (g&&Array.isArray(g.ring)&&g.ring.length>2)?g.ring:null; }
function _widthM(){ const m=IMPS.find(x=>String(x.id)===String(HDR.implemento_id)); return m&&m.largura_trabalho?+m.largura_trabalho:0; }
function _otherDaysArea(){ return CUR_DAYS.filter(r=>r.data!==DIA).reduce((s,r)=>s+(+r.area_ha||0),0); }
let _CV=null,_TR=null;
function _setupCanvas(){ const cv=$('cv'); if(!cv) return; const dpr=window.devicePixelRatio||1; const w=cv.clientWidth,h=cv.clientHeight; cv.width=Math.max(1,Math.round(w*dpr)); cv.height=Math.max(1,Math.round(h*dpr)); _CV=cv; cv.getContext('2d').setTransform(dpr,0,0,dpr,0,0); _computeTransform(w,h); }
function _updBB(E,N){ if(!GPS.bb) GPS.bb={minE:E,maxE:E,minN:N,maxN:N}; else{ if(E<GPS.bb.minE)GPS.bb.minE=E; if(E>GPS.bb.maxE)GPS.bb.maxE=E; if(N<GPS.bb.minN)GPS.bb.minN=N; if(N>GPS.bb.maxN)GPS.bb.maxN=N; } }
function _computeTransform(w,h){ if(!w||!h){ _TR=null; return; }
  const poly=_polyUTM(); let minE=Infinity,maxE=-Infinity,minN=Infinity,maxN=-Infinity;
  if(poly) poly.forEach(p=>{ if(p[0]<minE)minE=p[0]; if(p[0]>maxE)maxE=p[0]; if(p[1]<minN)minN=p[1]; if(p[1]>maxN)maxN=p[1]; });
  if(GPS.bb){ if(GPS.bb.minE<minE)minE=GPS.bb.minE; if(GPS.bb.maxE>maxE)maxE=GPS.bb.maxE; if(GPS.bb.minN<minN)minN=GPS.bb.minN; if(GPS.bb.maxN>maxN)maxN=GPS.bb.maxN; }
  if(!isFinite(minE)){ _TR=null; return; }
  const pad=18, spanE=Math.max(1,maxE-minE), spanN=Math.max(1,maxN-minN);
  _TR={minE,minN,sc:Math.min((w-2*pad)/spanE,(h-2*pad)/spanN),pad,w,h};
}
function _scheduleDraw(){ if(GPS._dt) return; GPS._dt=setTimeout(()=>{ GPS._dt=null; _computeTransform(_CV?_CV.clientWidth:0,_CV?_CV.clientHeight:0); _drawMapa(); },120); }
function _x(E){ return _TR?(E-_TR.minE)*_TR.sc+_TR.pad:0; }
function _y(N){ return _TR?(_TR.h-((N-_TR.minN)*_TR.sc+_TR.pad)):0; }
function _drawMapa(){ const cv=_CV||$('cv'); if(!cv) return; const ctx=cv.getContext('2d'); const w=cv.clientWidth,h=cv.clientHeight;
  if(!_TR) _computeTransform(w,h); ctx.clearRect(0,0,w,h);
  const poly=_polyUTM();
  if(poly&&_TR){ ctx.beginPath(); poly.forEach((p,i)=>{ const X=_x(p[0]),Y=_y(p[1]); i?ctx.lineTo(X,Y):ctx.moveTo(X,Y); }); ctx.closePath(); ctx.fillStyle='rgba(60,90,40,.18)'; ctx.fill(); ctx.lineWidth=2; ctx.strokeStyle='#7ee787'; ctx.stroke(); }
  if(GPS.pts.length&&_TR){ const wpx=Math.max(3,_widthM()*_TR.sc); ctx.lineJoin='round'; ctx.lineCap='round'; ctx.lineWidth=wpx; ctx.strokeStyle='rgba(255,193,7,.45)'; ctx.beginPath(); GPS.pts.forEach((p,i)=>{ const X=_x(p.E),Y=_y(p.N); i?ctx.lineTo(X,Y):ctx.moveTo(X,Y); }); ctx.stroke();
    const last=GPS.pts[GPS.pts.length-1]; ctx.save(); ctx.translate(_x(last.E),_y(last.N)); ctx.rotate(GPS.head); ctx.fillStyle='#fff'; ctx.strokeStyle='#0d1117'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(0,-11); ctx.lineTo(8,9); ctx.lineTo(0,4); ctx.lineTo(-8,9); ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.restore(); }
}
function _hud(){ const el=$('hud'); if(!el) return; const loteA=areaLote(CUR.lote_nome)||0; const cum=_otherDaysArea()+GPS.areaHa; const pct=loteA>0?Math.min(100,cum/loteA*100):null;
  const pill=(l,v)=>'<span class="pill" style="background:#0d1117cc;backdrop-filter:blur(2px)">'+l+' <b class="gold">'+v+'</b></span>';
  el.innerHTML=pill('Vel',(GPS.speed||0).toFixed(0)+' km/h')+pill('Área',GPS.areaHa.toFixed(2)+' ha')+(pct!=null?pill('Lote',pct.toFixed(0)+'%'):'')+(GPS.acc!=null?pill('GPS','±'+Math.round(GPS.acc)+'m'):'');
}
function _segDist(px,py,aE,aN,bE,bN){ const dx=bE-aE,dy=bN-aN,L2=dx*dx+dy*dy; let t=L2?((px-aE)*dx+(py-aN)*dy)/L2:0; t=t<0?0:(t>1?1:t); return Math.hypot(px-(aE+dx*t),py-(aN+dy*t)); }
function _markCells(aE,aN,bE,bN){ const hw=_widthM()/2; if(hw<=0) return;
  const i0=Math.floor((Math.min(aE,bE)-hw)/CELL),i1=Math.floor((Math.max(aE,bE)+hw)/CELL),j0=Math.floor((Math.min(aN,bN)-hw)/CELL),j1=Math.floor((Math.max(aN,bN)+hw)/CELL);
  for(let i=i0;i<=i1;i++)for(let j=j0;j<=j1;j++){ if(_segDist((i+0.5)*CELL,(j+0.5)*CELL,aE,aN,bE,bN)<=hw) GPS.cells.add(i+'_'+j); }
  GPS.areaHa=GPS.cells.size*CELL*CELL/10000;
}
function _onFix(pos){ const cur=pos.coords; GPS.acc=cur.accuracy;
  if(cur.accuracy!=null&&cur.accuracy>25){ _hud(); return; }
  const u=latLngToUTM(cur.latitude,cur.longitude,23); const E=u[0],No=u[1]; const t=pos.timestamp||0;
  if(GPS.pts.length){ const last=GPS.pts[GPS.pts.length-1]; const d=Math.hypot(E-last.E,No-last.N); if(d<1){ _hud(); return; }
    GPS.head=Math.atan2(E-last.E,No-last.N);
    if(GPS.running) _markCells(last.E,last.N,E,No);
    if(cur.speed!=null&&cur.speed>=0) GPS.speed=cur.speed*3.6; else { const dt=(t-(GPS._lt||t))/1000; if(dt>0) GPS.speed=d/dt*3.6; }
  }
  GPS._lt=t; GPS.pts.push({E,N:No,lat:cur.latitude,lon:cur.longitude,t}); _updBB(E,No);
  _hud(); _scheduleDraw();
  if(GPS.running&&GPS.pts.length%40===0) _saveGps(false);
}
function _restoreToday(){ GPS.pts=[]; GPS.cells=new Set(); GPS.areaHa=0; GPS.speed=0; GPS.bb=null;
  const r=CUR_DAYS.find(x=>x.data===DIA); if(!r||!Array.isArray(r.trajeto)) return;
  r.trajeto.forEach(p=>{ const lat=p[0],lon=p[1]; if(lat==null||lon==null) return; const u=latLngToUTM(lat,lon,23); if(GPS.pts.length){ const last=GPS.pts[GPS.pts.length-1]; _markCells(last.E,last.N,u[0],u[1]); } GPS.pts.push({E:u[0],N:u[1],lat,lon,t:p[2]||0}); _updBB(u[0],u[1]); });
  if((!GPS.cells.size||_widthM()<=0) && r.area_ha!=null) GPS.areaHa=+r.area_ha;   // mantém a área já salva se não dá p/ recomputar
}
async function _saveGps(final){ const r=CUR_DAYS.find(x=>x.data===DIA); if(!r) return;
  const patch={ trajeto:GPS.pts.map(p=>[+p.lat.toFixed(6),+p.lon.toFixed(6),p.t||0]), area_ha:+GPS.areaHa.toFixed(2), atualizado_em:new Date().toISOString() };
  if(final){ patch.hora_fim=nowHM(); patch.status='enviada'; }
  try{ const {error}=await SB.from('execucao_campo').update(patch).eq('id',r.id); if(error) throw error; Object.assign(r,patch); }catch(e){ if(final) _st('❌ '+e.message,'#c0392b'); }
}
async function _saveManual(){ const r=CUR_DAYS.find(x=>x.data===DIA); if(!r) return;
  const patch={ horimetro_ini:num($('g_hmi')&&$('g_hmi').value), horimetro_fim:num($('g_hmf')&&$('g_hmf').value), diesel_litros:num($('g_die')&&$('g_die').value), atualizado_em:new Date().toISOString() };
  try{ const {error}=await SB.from('execucao_campo').update(patch).eq('id',r.id); if(error) throw error; Object.assign(r,patch); }catch(e){ _st('❌ '+e.message,'#c0392b'); }
}
async function _gpsStart(){ if(GPS.running) return;
  HDR.maquina_id=($('h_maq')&&$('h_maq').value)||HDR.maquina_id; HDR.implemento_id=($('h_imp')&&$('h_imp').value)||HDR.implemento_id;
  if(!HDR.maquina_id){ _st('Escolha o trator/máquina.','#e67e22'); return; }
  if(!_widthM()) _st('⚠️ Implemento sem largura cadastrada — a área não vai calcular.','#e67e22');
  if(!navigator.geolocation){ _st('Sem GPS neste aparelho.','#c0392b'); return; }
  let r=CUR_DAYS.find(x=>x.data===DIA);
  if(!r){ const reg={comanda_codigo:CUR.codigo,safra:SAFRA,funcionario_id:OPER.id,lote_nome:CUR.lote_nome||null,data:DIA,maquina_id:+HDR.maquina_id,implemento_id:HDR.implemento_id?+HDR.implemento_id:null,hora_inicio:nowHM(),status:'aberto',enviado_por:USER_EMAIL||null,atualizado_em:new Date().toISOString()};
    try{ const {error}=await SB.from('execucao_campo').upsert(reg,{onConflict:'comanda_codigo,funcionario_id,data'}); if(error) throw error; }catch(e){ _st('❌ '+e.message,'#c0392b'); return; } await _carregarDiasComanda(); }
  GPS.running=true;
  try{ if(navigator.wakeLock) GPS.wake=await navigator.wakeLock.request('screen'); }catch(e){}
  try{ GPS.watchId=navigator.geolocation.watchPosition(_onFix,err=>_st('GPS: '+err.message,'#e67e22'),{enableHighAccuracy:true,maximumAge:0,timeout:15000}); }catch(e){ _st('❌ '+e.message,'#c0392b'); GPS.running=false; return; }
  render();
}
async function _gpsStop(){ if(GPS.watchId!=null){ navigator.geolocation.clearWatch(GPS.watchId); GPS.watchId=null; } GPS.running=false;
  try{ if(GPS.wake){ await GPS.wake.release(); GPS.wake=null; } }catch(e){}
  await _saveGps(true); await _saveManual(); await _carregarDiasComanda(); render(); _st('■ Capturado: '+GPS.areaHa.toFixed(2)+' ha','#27ae60');
}
function renderTrabalho(){
  const c=CUR; if(!GPS.running && !GPS.pts.length) _restoreToday();
  const concl=CUR_DAYS.some(r=>r.concluiu_lote)||c.status==='executada'; const today=CUR_DAYS.find(r=>r.data===DIA);
  const maqOpt=`<option value="">— trator/máquina —</option>`+MAQS.map(m=>`<option value="${m.id}" ${String(HDR.maquina_id)===String(m.id)?'selected':''}>${esc(m.nome)}</option>`).join('');
  const impOpt=`<option value="">— implemento —</option>`+IMPS.map(m=>`<option value="${m.id}" ${String(HDR.implemento_id)===String(m.id)?'selected':''}>${esc(m.nome)}${m.largura_trabalho?(' · '+m.largura_trabalho+'m'):''}</option>`).join('');
  $('app').innerHTML=`<div style="position:fixed;inset:0;display:flex;flex-direction:column;background:#0a0f18">
    <div style="flex:0 0 auto;display:flex;gap:8px;align-items:center;padding:8px 10px;background:#0d1117">
      <button class="btn s" id="voltar" style="width:auto;margin:0;padding:8px 14px">◀</button>
      <div style="flex:1;min-width:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis"><b>${esc(c.codigo)}</b> <span class="muted" style="font-size:13px">${esc(c.lote_nome||'')}</span></div>
    </div>
    <div style="flex:0 0 auto;display:flex;gap:6px;padding:6px 10px;background:#0d1117">
      <select id="h_maq" style="flex:1;min-width:0;font-size:14px;padding:9px">${maqOpt}</select>
      <select id="h_imp" style="flex:1;min-width:0;font-size:14px;padding:9px">${impOpt}</select>
    </div>
    <div style="flex:1;position:relative;min-height:0">
      <canvas id="cv" style="width:100%;height:100%;display:block"></canvas>
      <div id="hud" style="position:absolute;top:8px;left:8px;right:8px;display:flex;gap:6px;flex-wrap:wrap"></div>
      ${_polyUTM()?'':'<div style="position:absolute;bottom:8px;left:8px;right:8px;background:#3a1d00;color:#ffc107;border-radius:8px;padding:6px 10px;font-size:12px;text-align:center">Talhão sem poligonal — mostrando só o trajeto.</div>'}
    </div>
    <div style="flex:0 0 auto;background:#0d1117;padding:8px 10px">
      ${concl?'<div class="hint" style="text-align:center;padding:6px">✅ Lote concluído.</div>':`
      ${GPS.running?'<button class="btn k huge" id="gstop" style="margin:0">■ Parar captura</button>':'<button class="btn b huge" id="gstart" style="margin:0">▶ Iniciar captura</button>'}
      <div class="two" style="margin-top:8px">
        <div><label>Horímetro início</label><input class="gf" type="number" step="any" inputmode="decimal" id="g_hmi" value="${today&&today.horimetro_ini!=null?today.horimetro_ini:''}"></div>
        <div><label>Horímetro fim</label><input class="gf" type="number" step="any" inputmode="decimal" id="g_hmf" value="${today&&today.horimetro_fim!=null?today.horimetro_fim:''}"></div>
      </div>
      <label style="margin-top:6px">Diesel (L)</label><input class="gf" type="number" step="any" inputmode="decimal" id="g_die" value="${today&&today.diesel_litros!=null?today.diesel_litros:''}" placeholder="litros">
      <button class="btn s" id="concluir" style="margin-top:8px">✔ Concluí o lote — enviar comanda</button>`}
    </div>
  </div>`;
  if($('voltar'))$('voltar').onclick=()=>{ if(GPS.running){ _st('Toque em ■ Parar antes de sair.','#e67e22'); return; } EXVIEW='menu'; render(); };
  if($('h_maq'))$('h_maq').onchange=()=>{ HDR.maquina_id=$('h_maq').value; };
  if($('h_imp'))$('h_imp').onchange=()=>{ HDR.implemento_id=$('h_imp').value; GPS.cells=new Set(); GPS.areaHa=0; for(let i=1;i<GPS.pts.length;i++) _markCells(GPS.pts[i-1].E,GPS.pts[i-1].N,GPS.pts[i].E,GPS.pts[i].N); _drawMapa(); _hud(); };
  if($('gstart'))$('gstart').onclick=_gpsStart;
  if($('gstop'))$('gstop').onclick=_gpsStop;
  if($('concluir'))$('concluir').onclick=concluirLote;
  ['g_hmi','g_hmf','g_die'].forEach(id=>{ const el=$(id); if(el) el.onchange=_saveManual; });
  setTimeout(()=>{ _setupCanvas(); _drawMapa(); _hud(); },30);
}
async function concluirLote(){
  let r=CUR_DAYS.find(x=>x.data===DIA);
  if(!r){ _st('Inicie a atividade (▶) primeiro.','#e67e22'); return; }
  if(!confirm('Concluir o lote e enviar a comanda para aprovação?')) return;
  if(GPS.running) await _gpsStop(); else { await _saveGps(false); await _saveManual(); }
  r=CUR_DAYS.find(x=>x.data===DIA); if(!r) return;
  const patch={concluiu_lote:true,status:'enviada',atualizado_em:new Date().toISOString()}; if(!r.hora_fim) patch.hora_fim=nowHM();
  try{ const {error}=await SB.from('execucao_campo').update(patch).eq('id',r.id); if(error) throw error; STEP='fim'; render(); }
  catch(e){ _st('❌ '+e.message,'#c0392b'); }
}
function renderFim(){
  $('app').innerHTML=`<div class="center" style="margin-top:46px">
    <div class="big">✅</div>
    <h1 style="font-size:24px;margin:10px 0">Comanda enviada</h1>
    <div class="muted">${esc(CUR.codigo)} · lote ${esc(CUR.lote_nome||'')}</div>
    <div class="muted" style="font-size:14px;margin-top:8px">Lote concluído e enviado para aprovação do administrador.</div>
    <button class="btn g huge" id="volta" style="max-width:340px;margin:24px auto 0">Voltar às comandas</button>
  </div>`;
  $('volta').onclick=async()=>{ STEP='home'; await carregarDia(); render(); };
}

/* mantém a tela ligada e salva quando o app volta/ sai (campo: troca de app, tela apaga) */
document.addEventListener('visibilitychange',()=>{ if(!GPS.running) return;
  if(document.visibilityState==='visible'){ if(navigator.wakeLock) navigator.wakeLock.request('screen').then(w=>GPS.wake=w).catch(()=>{}); }
  else { _saveGps(false); } });
window.addEventListener('pagehide',()=>{ if(GPS.running) _saveGps(false); });
window.addEventListener('load',()=>{ setTimeout(boot,150); });
</script>
