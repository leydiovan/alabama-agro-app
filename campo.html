function _numCmd(safra,codigo){ const s=String(safra||'').split('/').map(a=>a.trim().slice(-2)).filter(Boolean).join('/'); return (s?s+'-':'')+(codigo!=null?codigo:''); }
function _idb(){ return new Promise((res,rej)=>{ let r; try{ r=indexedDB.open('campo-cache',2); }catch(e){ return rej(e); } r.onupgradeneeded=()=>{ const db=r.result; if(!db.objectStoreNames.contains('pdfs')) db.createObjectStore('pdfs'); if(!db.objectStoreNames.contains('sessions')) db.createObjectStore('sessions',{keyPath:'lid'}); if(!db.objectStoreNames.contains('abast')) db.createObjectStore('abast',{keyPath:'lid'}); }; r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
function _idbPut(store,val){ return new Promise(async(res,rej)=>{ try{ const db=await _idb(); const tx=db.transaction(store,'readwrite'); tx.objectStore(store).put(val); tx.oncomplete=()=>res(1); tx.onerror=()=>rej(tx.error); }catch(e){ rej(e); } }); }
function _idbAll(store){ return new Promise(async(res)=>{ try{ const db=await _idb(); const tx=db.transaction(store,'readonly'); const rq=tx.objectStore(store).getAll(); rq.onsuccess=()=>res(rq.result||[]); rq.onerror=()=>res([]); }catch(e){ res([]); } }); }
function _idbDel(store,key){ return new Promise(async(res)=>{ try{ const db=await _idb(); const tx=db.transaction(store,'readwrite'); tx.objectStore(store).delete(key); tx.oncomplete=()=>res(1); tx.onerror=()=>res(0); }catch(e){ res(0); } }); }
async function _pdfCacheSet(k,blob){ try{ const db=await _idb(); await new Promise((res,rej)=>{ const tx=db.transaction('pdfs','readwrite'); tx.objectStore('pdfs').put(blob,k); tx.oncomplete=res; tx.onerror=()=>rej(tx.error); }); }catch(e){} }
async function _pdfCacheGet(k){ try{ const db=await _idb(); return await new Promise((res)=>{ const tx=db.transaction('pdfs','readonly'); const rq=tx.objectStore('pdfs').get(k); rq.onsuccess=()=>res(rq.result||null); rq.onerror=()=>res(null); }); }catch(e){ return null; } }
/* cache de dados de referência (offline-first): salva online, lê do cache se cair a rede */

/* ---------- boot / login ---------- */
async function boot(){

/* mantém viva a sessão de sincronização, SEM travar a tela. No APK entra sozinho; no site, não faz nada. */
async function _garantirSessao(){
  if(!SB||!navigator.onLine) return null;
  let s=null; try{ const {data}=await _q(SB.auth.getSession(),6000); s=data&&data.session; }catch(e){}

async function entrar(){
  DIA=hoje();

  FUNCS=_cacheGet('funcs',[])||[]; MAQS=_cacheGet('maqs',[])||[]; IMPS=_cacheGet('imps',[])||[]; LOTES=_cacheGet('lotes',[])||[];

  if(FUNCS.length){ OPER=null; STEP='quemsou'; render(); _atualizarCadastros(); return; }   // já provisionado -> entra offline e atualiza em 2º plano
  $('app').innerHTML='<div class="center" style="margin-top:40px">Preparando o aparelho…</div>';   // 1ª vez neste aparelho: precisa da rede uma vez
  await _atualizarCadastros();
  OPER=null; STEP='quemsou'; render();
}
/* atualiza cadastros/comandas em 2º PLANO: tudo em paralelo e, se a rede falhar, mantém o que está no aparelho */
async function _atualizarCadastros(){
  if(!SB) return;
  try{ const {data:sd}=await _q(SB.auth.getSession(),6000); USER_EMAIL=(sd&&sd.session&&sd.session.user&&sd.session.user.email)||''; }catch(e){}
  const g=async(tab,sel)=>{ try{ if(!navigator.onLine) throw 0; const {data,error}=await _q(SB.from(tab).select(sel).order('nome')); if(error) throw error; return data||[]; }catch(e){ return null; } };
  const [f,m,i,l]=await Promise.all([
    g('funcionarios_campo','id,nome,tipo,ativo,visivel_coleta,operador_melosa,pin'),   // view restrita: sem salário/CPF/folha (migração 78)
    g('maquinas','id,nome,categoria,id_frota,consumo_ref,marca,modelo,faixa_m'),
    g('implementos','id,nome,categoria,id_frota,largura_trabalho'),
    g('lotes','nome,area,geom')
  ]);
  // BLINDAGEM: resposta vazia NUNCA apaga o que está no aparelho (sessão expirada/RLS devolve [] com sucesso -> trancaria o operador do lado de fora)
  const ff=(f||[]).filter(x=>x.ativo!==false && x.visivel_coleta!==false);
  if(ff.length){ FUNCS=ff; _cacheSet('funcs',FUNCS); }   // o PIN vem junto -> login offline no próximo boot
  if(m&&m.length){ MAQS=m; _cacheSet('maqs',MAQS); }
  if(i&&i.length){ IMPS=i; _cacheSet('imps',IMPS); }
  if(l&&l.length){ LOTES=l; _cacheSet('lotes',LOTES); }
  await carregarSafra();
  if(STEP==='quemsou') render();   // a lista de operadores acabou de chegar
  _updPend(); if(navigator.onLine) _syncAll().then(async()=>{ if(OPER){ await carregarDia(); if(STEP==='home') render(); } });
}

async function carregarSafra(){
  let safras=null, netOk=false;   // netOk = o servidor respondeu COM DADO -> prova de sessão viva (só aí uma lista vazia é verdade)
  try{ if(!navigator.onLine) throw 0; const {data,error}=await _q(SB.from('safras').select('*')); if(error) throw error; safras=data||[]; if(safras.length){ netOk=true; _cacheSet('safras',safras); } else safras=_cacheGet('safras',[]); }catch(e){ safras=_cacheGet('safras',[]); }   // vazio não apaga o cache
  const h=hoje();
  let s=safras.find(x=>x.inicio&&x.fim&&x.inicio<=h&&h<=x.fim);
  if(!s) s=safras.slice().sort((a,b)=>(b.ano||0)-(a.ano||0))[0];
  SAFRA=s?s.nome:(_cacheGet('safra','')||''); if(SAFRA) _cacheSet('safra',SAFRA);
  if(!netOk) return;   // sem PROVA de sessão viva (offline, sessão caída, RLS devolvendo vazio) -> mantém as comandas que já estão no aparelho
  // COMANDAS DE QUALQUER SAFRA: o operador pode estar terminando serviço de uma safra anterior.
  // Vêm só as EM ABERTO (leve); as finalizadas vêm à parte, só o código, para limpar o aparelho.
  try{ if(!navigator.onLine) throw 0;
    const [ab,fin]=await Promise.all([
      _q(SB.from('comandas').select('*').neq('status','cancelada').neq('status','executada')),
      _q(SB.from('comandas').select('codigo,safra').eq('status','executada'))
    ]);
    if(ab.error) throw ab.error;
    COMANDAS=ab.data||[]; _cacheSet('comandas',COMANDAS);
    if(!fin.error) for(const c of (fin.data||[])){ try{ await _purgeComandaLocal(c.codigo,c.safra); }catch(_){} }   // admin finalizou -> limpa o local (só online, com o servidor confirmando)
  }catch(e){ COMANDAS=_cacheGet('comandas',[]); }
}
/* apaga do aparelho os dados JÁ SINCRONIZADOS de uma comanda finalizada (segurança: nunca apaga dirty/não-enviado) */
async function _purgeComandaLocal(codigo,safra){
  const _mesmo=x=>String(x.comanda_codigo)===String(codigo)&&(!safra||(x.safra||'')===safra);   // só a comanda DESTA safra (código repete entre safras)
  try{ const ss=(await _idbAll('sessions')).filter(x=>_mesmo(x)&&!x.dirty); for(const x of ss) await _idbDel('sessions',x.lid); }catch(e){}
  try{ const aa=(await _idbAll('abast')).filter(x=>_mesmo(x)&&!x.dirty); for(const x of aa) await _idbDel('abast',x.lid); }catch(e){}
  try{ if(OPER&&OPER.id!=null) localStorage.removeItem('campo_cache_days_'+codigo+'_'+OPER.id); }catch(e){}
  try{ await _idbDel('pdfs', _pdfPath(codigo, safra||SAFRA)); }catch(e){}
}
async function carregarDia(){
  if(!OPER) return;
  // execuções de hoje deste operador (só p/ marcar o status das comandas na lista)
  EXECS={}; let _srvDia=null;
  try{ if(!navigator.onLine) throw 0; const {data,error}=await _q(SB.from('execucao_campo').select('*').eq('funcionario_id',OPER.id).eq('data',DIA)); if(error) throw error; _srvDia=data||[]; _srvDia.forEach(x=>{ if(x.comanda_codigo) EXECS[_kExec(x)]=x; }); _cacheSet('execs_'+DIA,EXECS); }catch(e){ EXECS=_cacheGet('execs_'+DIA,{})||{}; }
  try{ let loc=(await _idbAll('sessions')).filter(s=>String(s.funcionario_id)===String(OPER.id)&&s.data===DIA); if(_srvDia!==null) loc=await _reconcile(loc,_srvDia); loc.forEach(s=>{ EXECS[_kExec(s)]=s; }); }catch(e){}   // sessões locais (offline) + remove descartadas pelo admin
  await _fecharSessoesPendentes();
}
/* distância total do trajeto salvo (m) — usada p/ decidir se a sessão teve trabalho real */
function _trajDistM(tr){ let d=0; for(let i=1;i<tr.length;i++){ const a=tr[i-1],b=tr[i]; if(a[0]==null||b[0]==null) continue; const ua=latLngToUTM(a[0],a[1],23), ub=latLngToUTM(b[0],b[1],23); d+=Math.hypot(ub[0]-ua[0],ub[1]-ua[1]); } return d; }
/* Fecha as MINHAS sessões que ficaram ABERTAS em dias anteriores (app morreu, bateria acabou, virou o dia).
   Sem isso elas ficam 'aberto' e sem hora_fim para sempre — a jornada some, embora a área/custo entrem na aprovação.
   hora_fim vem do ÚLTIMO PONTO gravado (cada ponto tem timestamp absoluto) — não é chute.
   A COMANDA continua na lista: só o admin finaliza (pode ter outro operador nela). */
async function _fecharSessoesPendentes(){
  if(!OPER) return 0;
  let n=0;
  try{
    const abertas=(await _idbAll('sessions')).filter(s=>String(s.funcionario_id)===String(OPER.id) && (s.data||'')<DIA && s.status==='aberto' && !s.hora_fim);
    for(const s of abertas){
      const tr=Array.isArray(s.trajeto)?s.trajeto:[];
      const temTrab=((s.tanques||[]).length>0) || (tr.length>=2 && ((+s.area_ha||0)>=0.01 || _trajDistM(tr)>=25));   // mesmo critério de _sessTemTrabalho
      if(!temTrab){ if(!s.serverId){ try{ await _idbDel('sessions',s.lid); }catch(e){} continue; } }   // fantasma nunca enviado -> some (não vira movimentação falsa)
      const ult=tr.length?(+tr[tr.length-1][2]||0):0;
      s.hora_fim = ult ? (function(d){ return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); })(new Date(ult)) : nowHM();
      s.status='enviada'; s.dirty=true; s._v=(s._v||0)+1; s.atualizado_em=new Date().toISOString();
      try{ await _idbPut('sessions',s); }catch(e){}
      await _syncSession(s); n++;
    }
  }catch(e){}
  if(n) _st('✔ '+n+' trabalho de outro dia foi fechado automaticamente','#e67e22');
  return n;
}

/* ---------- comandas do operador ---------- */
function comandasDoOperador(){
  const base=COMANDAS.filter(c=>c.status!=='executada');   // aprovada/finalizada pelo admin some do tablet
  const desig=base.filter(c=>(c.operadores||[]).map(Number).includes(OPER.id) || (c.operadores_calda||[]).map(Number).includes(OPER.id));   // pulverização: operador da calda também vê a comanda
  if(desig.length || !VERTODAS) return desig;
  return base.slice();
}
function _ehPulvTerr(c){ c=c||CUR; return !!(c && c.perfil==='PULV' && /Terrestre/i.test(c.tipo_ativ||'')); }
function _ehAdub(c){ c=c||CUR; return !!(c && c.perfil==='SOLIDO'); }   // adubação / aplicação de sólidos (caçambas de adubo)
function _ehCampo(c){ return _ehPulvTerr(c) || _ehAdub(c); }   // tipos com fluxo de campo (2 papéis + cargas)
function _papelOper(){ if(!_ehCampo()) return null; const pid=String(OPER&&OPER.id); const isP=(CUR.operadores||[]).map(String).includes(pid); const isC=(CUR.operadores_calda||[]).map(String).includes(pid); const p1=_ehAdub()?'aplicador':'pulverizador', p2=_ehAdub()?'carregamento':'calda'; return isP?p1:(isC?p2:p1); }
function _papelAplica(){ const p=_papelOper(); return p==='pulverizador'||p==='aplicador'; }   // papel 1: pinta área + ciclo de cargas/tanques
function _papelApoio(){ const p=_papelOper(); return p==='calda'||p==='carregamento'; }   // papel 2: telemetria (calda/carregamento)
/* rótulos por tipo de campo */
function _termCarga(){ return _ehAdub()?'carga':'tanque'; }
function _termUnid(){ return _ehAdub()?'kg':'litros'; }
function _ehCarreg(){ return _ehAdub() && _papelApoio(); }   // operador de CARREGAMENTO da adubação (papel 2): leva/carrega o adubo
function _maqFaixa(id){ const m=MAQS.find(x=>String(x.id)===String(id)); return m&&m.faixa_m?+m.faixa_m:0; }

  let local=(await _idbAll('sessions')).filter(s=>String(s.comanda_codigo)===String(CUR.codigo)&&(s.safra||SAFRA)===_sf&&String(s.funcionario_id)===String(OPER.id));   // local só tem as minhas
  if(server!==null) local=await _reconcile(local, server);   // tira o que o admin descartou

async function _pdfRender(blob, url, box, pages){
  const lib=window.pdfjsLib;
  if(!lib){ box.innerHTML='<iframe src="'+url+'" style="width:100%;height:100%;border:0;background:#fff"></iframe>'; return; }
  try{
    try{ lib.GlobalWorkerOptions.workerSrc=PDFJS_WORKER; }catch(e){}
    const buf=await blob.arrayBuffer();
    const pdf=await lib.getDocument({data:buf}).promise;
    const larg=Math.max(320, Math.min(box.clientWidth||360, 1400)) - 12;   // ajusta à tela do tablet
    const lista=[];
    for(let n=1;n<=pdf.numPages;n++){
      const pg=await pdf.getPage(n);
      const v1=pg.getViewport({scale:1});
      const base=Math.max(1, (larg/v1.width) * (window.devicePixelRatio||1));   // 1:1 com os pixels da tela
      const cv=document.createElement('canvas');
      cv.style.cssText='display:block;margin:6px auto;width:100%;max-width:100%;height:auto;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.5)';   // 100% = nunca sobra rolagem lateral (a barra vertical muda a largura depois)
      pages.appendChild(cv);
      lista.push({pg, base, cv});
      await _pdfDesenha(lista[lista.length-1], 1);
    }
    _pdfGestos(box, pages, lista);
  }catch(e){
    box.innerHTML='<div style="padding:24px;text-align:center;color:#e6edf3">Não foi possível abrir o PDF neste aparelho.<br><span class="muted" style="font-size:12px">'+esc(e.message||'')+'</span></div>';
  }
}

async function _pdfDesenha(it, k){

  if(it._nit===nit || it._busy) return; it._busy=true;
  try{
    const vp=it.pg.getViewport({scale: it.base*nit});
    it.cv.width=Math.floor(vp.width); it.cv.height=Math.floor(vp.height);
    await it.pg.render({canvasContext:it.cv.getContext('2d'), viewport:vp}).promise;

      ultTap=ag; ini={x:e.touches[0].clientX, y:e.touches[0].clientY, tx, ty};

    }

      <canvas id="cv" style="width:100%;height:100%;display:block;touch-action:none"></canvas>
      <div id="hud" style="position:absolute;top:8px;left:8px;right:8px;display:flex;gap:6px;flex-wrap:wrap"></div>

      ${_simOK()?`<button class="btn ${SIM.on?'k':'s'}" id="btn_sim" style="position:absolute;right:10px;bottom:62px;width:auto;margin:0;padding:10px 14px">${SIM.on?'⏸ Sim':'🧪 Simular'}</button>`:''}
      ${(_simOK()&&SIM.on)?`<button class="btn s" id="btn_simvel" style="position:absolute;right:10px;bottom:114px;width:auto;margin:0;padding:10px 14px">⏩ ${SIM.vel} km/h</button>`:''}
    </div>
    <div style="flex:0 0 auto;padding:8px 10px;background:#0d1117">
      <div class="muted" style="font-size:12px;margin:0 2px 6px">${_caldaResumo()}</div>
      ${_btnCaldaHTML()}
    </div>
  </div>`;
  if($('voltar'))$('voltar').onclick=async()=>{ await _gpsLeave(); EXVIEW='menu'; render(); };
  if($('btn_follow'))$('btn_follow').onclick=()=>{ VIEW.follow=!VIEW.follow; $('btn_follow').textContent=VIEW.follow?'🎯 Seguindo':'✋ Livre'; _drawMapa(); };
  if($('btn_sim'))$('btn_sim').onclick=_simToggle;
  if($('btn_simvel'))$('btn_simvel').onclick=_simVelCiclar;
  if($('btn_calda'))$('btn_calda').onclick=()=>{ if($('btn_calda').disabled) return; _acaoCalda($('btn_calda').dataset.act); };
  if(!_FIMIV)_FIMIV=setInterval(_tickFimBtns,1000);
  setTimeout(()=>{ _setupCanvas(); _drawMapa(); _hud(); },30);
}
let _gestBound=null;
function _bindGestures(cv){ if(_gestBound===cv) return; _gestBound=cv;
  let mode=null,startD=1,startZoom=1,lx=0,ly=0,tx=0,ty=0,moved=0,tapTS=0;
  const dist=ts=>Math.hypot(ts[0].clientX-ts[1].clientX, ts[0].clientY-ts[1].clientY);
  cv.addEventListener('touchstart',e=>{ if(e.touches.length>=2){ mode='pinch'; startD=dist(e.touches)||1; startZoom=VIEW.zoom; } else { mode='pan'; lx=e.touches[0].clientX; ly=e.touches[0].clientY; tx=lx; ty=ly; moved=0; } },{passive:false});
  cv.addEventListener('touchmove',e=>{ e.preventDefault();
    if(mode==='pinch'&&e.touches.length>=2){ VIEW.zoom=Math.max(0.3,Math.min(25,startZoom*dist(e.touches)/startD)); _scheduleDraw(); }
    else if(mode==='pan'&&e.touches.length===1&&VIEW.cx!=null){ const t=e.touches[0],sc=_sc()||1; moved+=Math.abs(t.clientX-lx)+Math.abs(t.clientY-ly); VIEW.cx-=(t.clientX-lx)/sc; VIEW.cy+=(t.clientY-ly)/sc; lx=t.clientX; ly=t.clientY; VIEW.follow=false; const b=$('btn_follow'); if(b) b.textContent='✋ Livre'; _scheduleDraw(); }
  },{passive:false});
  cv.addEventListener('touchend',e=>{ if(mode==='pan'&&moved<8){ tapTS=Date.now(); _mapTap(tx,ty); } mode=null; },{passive:false});
  cv.addEventListener('click',e=>{ if(Date.now()-tapTS<600) return; _mapTap(e.clientX,e.clientY); });   // desktop (ignora o click sintético pós-toque)
}

async function concluirLote(){
  const today=CUR_DAYS.filter(r=>r.data===DIA && String(r.funcionario_id)===String(OPER.id) && (r.hora_fim || (Array.isArray(r.trajeto)&&r.trajeto.length) || r.area_ha));   // só as MINHAS de hoje
  if(!today.length){ _st('Sem sessão com trabalho hoje — abra a Tela de trabalho.','#e67e22'); return; }
  if(!confirm('Concluir o lote e enviar a comanda para aprovação?')) return;
  for(let k=0;k<today.length;k++){ const r=await _ensureLocal(today[k]); r.status='enviada'; if(!r.hora_fim) r.hora_fim=nowHM(); if(k===today.length-1) r.concluiu_lote=true; r.dirty=true; r.atualizado_em=new Date().toISOString(); try{ await _idbPut('sessions',r); }catch(e){} await _syncSession(r); }
  _updPend(); STEP='fim'; render();
}

document.addEventListener('visibilitychange',()=>{ if(GPS.watchId==null) return;
  if(document.visibilityState==='visible'){ if(navigator.wakeLock) navigator.wakeLock.request('screen').then(w=>GPS.wake=w).catch(()=>{}); }
  else { _saveGps(false); } });
window.addEventListener('pagehide',()=>{ if(GPS.watchId!=null) _saveGps(false); });
window.addEventListener('load',()=>{ setTimeout(boot,150); });
