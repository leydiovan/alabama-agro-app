:root{--bg:#0d1117;--bg2:#161b22;--bg3:#1c2333;--line:#30363d;--text:#e6edf3;--muted:#8b949e;--gold:#ffc107;--ok:#27ae60;--err:#f85149;--blue:#388bfd}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font:17px system-ui,Segoe UI,Arial,sans-serif;padding:12px 12px 96px;-webkit-text-size-adjust:100%}

.btn.b{background:var(--blue);color:#fff}.btn.danger{background:transparent;border:1px solid var(--err);color:var(--err)}

.sec{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:14px 0 6px}

/* ---------- helpers ---------- */
function nowHM(){ const d=new Date(); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
function hoje(){ return new Date().toISOString().slice(0,10); }
function _dlabel(ds){ const d=new Date(ds+'T12:00:00'); return ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][d.getDay()]+' '+ds.split('-').reverse().join('/'); }
function t2m(s){ if(!s) return null; const m=String(s).match(/^(\d{1,2}):(\d{2})$/); return m?(+m[1])*60+(+m[2]):null; }
function horasEntre(a,b){ const x=t2m(a),y=t2m(b); if(x==null||y==null||y<=x) return null; return (y-x)/60; }
function areaLote(nome){ const l=LOTES.find(x=>x.nome===nome); return l?l.area:null; }
function _dt2(n){ return String(n).padStart(2,'0'); }
function nowLocalDT(){ const d=new Date(); return d.getFullYear()+'-'+_dt2(d.getMonth()+1)+'-'+_dt2(d.getDate())+'T'+_dt2(d.getHours())+':'+_dt2(d.getMinutes()); }
function tsToLocalDT(ts){ const d=new Date(ts); return d.getFullYear()+'-'+_dt2(d.getMonth()+1)+'-'+_dt2(d.getDate())+'T'+_dt2(d.getHours())+':'+_dt2(d.getMinutes()); }
function fmtDT(ts){ const d=new Date(ts); return _dt2(d.getDate())+'/'+_dt2(d.getMonth()+1)+' '+_dt2(d.getHours())+':'+_dt2(d.getMinutes()); }
function _pdfPath(codigo,safra){ return 'comandas/'+String(safra||'').replace(/[^\w.-]/g,'-')+'/'+String(codigo)+'.pdf'; }
function _idb(){ return new Promise((res,rej)=>{ let r; try{ r=indexedDB.open('campo-cache',2); }catch(e){ return rej(e); } r.onupgradeneeded=()=>{ const db=r.result; if(!db.objectStoreNames.contains('pdfs')) db.createObjectStore('pdfs'); if(!db.objectStoreNames.contains('sessions')) db.createObjectStore('sessions',{keyPath:'lid'}); if(!db.objectStoreNames.contains('abast')) db.createObjectStore('abast',{keyPath:'lid'}); }; r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
function _idbPut(store,val){ return new Promise(async(res,rej)=>{ try{ const db=await _idb(); const tx=db.transaction(store,'readwrite'); tx.objectStore(store).put(val); tx.oncomplete=()=>res(1); tx.onerror=()=>rej(tx.error); }catch(e){ rej(e); } }); }
function _idbAll(store){ return new Promise(async(res)=>{ try{ const db=await _idb(); const tx=db.transaction(store,'readonly'); const rq=tx.objectStore(store).getAll(); rq.onsuccess=()=>res(rq.result||[]); rq.onerror=()=>res([]); }catch(e){ res([]); } }); }
function _idbDel(store,key){ return new Promise(async(res)=>{ try{ const db=await _idb(); const tx=db.transaction(store,'readwrite'); tx.objectStore(store).delete(key); tx.oncomplete=()=>res(1); tx.onerror=()=>res(0); }catch(e){ res(0); } }); }
async function _pdfCacheSet(k,blob){ try{ const db=await _idb(); await new Promise((res,rej)=>{ const tx=db.transaction('pdfs','readwrite'); tx.objectStore('pdfs').put(blob,k); tx.oncomplete=res; tx.onerror=()=>rej(tx.error); }); }catch(e){} }
async function _pdfCacheGet(k){ try{ const db=await _idb(); return await new Promise((res)=>{ const tx=db.transaction('pdfs','readonly'); const rq=tx.objectStore('pdfs').get(k); rq.onsuccess=()=>res(rq.result||null); rq.onerror=()=>res(null); }); }catch(e){ return null; } }
/* cache de dados de referência (offline-first): salva online, lê do cache se cair a rede */
function _cacheSet(k,v){ try{ localStorage.setItem('campo_cache_'+k, JSON.stringify(v)); }catch(e){} }
function _cacheGet(k,def){ try{ const s=localStorage.getItem('campo_cache_'+k); return s?JSON.parse(s):def; }catch(e){ return def; } }
function _q(p,ms){ return Promise.race([ Promise.resolve(p), new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')), ms||4000)) ]); }  // não pendura em rede ruim
function _st(t,c){ let e=$('snack'); if(!e){ e=document.createElement('div'); e.id='snack'; e.style.cssText='position:fixed;left:12px;right:12px;bottom:78px;z-index:50;padding:11px 14px;border-radius:10px;font:600 14px system-ui;text-align:center;box-shadow:0 4px 14px rgba(0,0,0,.4)'; document.body.appendChild(e);} e.textContent=t; e.style.background=c||'#333'; e.style.color='#fff'; clearTimeout(e._t); e._t=setTimeout(()=>{e.remove();},3200); }

/* ---------- boot / login ---------- */
async function boot(){
  if(!window.supabase){ $('app').innerHTML='<div class="center err" style="margin-top:40px">Sem internet (biblioteca não carregou).</div>'; return; }
  SB=window.supabase.createClient(SB_URL,SB_KEY);
  const {data}=await SB.auth.getSession();
  if(data&&data.session){ entrar(); } else { STEP='login'; render(); }
}
function _msg(t,c){ const e=$('msg'); if(e){ e.textContent=t; e.style.color=c||'var(--muted)'; } }
async function login(){
  const em=$('e').value.trim(), pw=$('s').value;
  if(!em||!pw){ _msg('Preencha e-mail e senha.','var(--gold)'); return; }
  _msg('Entrando…'); try{ const {error}=await SB.auth.signInWithPassword({email:em,password:pw}); if(error){ _msg('Erro: '+error.message,'var(--err)'); return; } entrar(); }
  catch(e){ _msg('Falha: '+e.message,'var(--err)'); }
}
async function entrar(){
  DIA=hoje();
  try{ const {data:sd}=await SB.auth.getSession(); USER_EMAIL=(sd&&sd.session&&sd.session.user&&sd.session.user.email)||''; }catch(e){}   // getSession = local (não bate na rede)
  try{ if(!navigator.onLine) throw 0; const {data:f,error}=await _q(SB.from('funcionarios').select('id,nome,tipo,ativo').order('nome')); if(error) throw error; FUNCS=(f||[]).filter(x=>x.ativo!==false); _cacheSet('funcs',FUNCS); }catch(e){ FUNCS=_cacheGet('funcs',[]); }
  try{ if(!navigator.onLine) throw 0; const {data:m,error}=await _q(SB.from('maquinas').select('id,nome,categoria,id_frota,consumo_ref,marca,modelo').order('nome')); if(error) throw error; MAQS=m||[]; _cacheSet('maqs',MAQS); }catch(e){ MAQS=_cacheGet('maqs',[]); }
  try{ if(!navigator.onLine) throw 0; const {data:i,error}=await _q(SB.from('implementos').select('id,nome,categoria,id_frota,largura_trabalho').order('nome')); if(error) throw error; IMPS=i||[]; _cacheSet('imps',IMPS); }catch(e){ IMPS=_cacheGet('imps',[]); }
  try{ if(!navigator.onLine) throw 0; const {data:l,error}=await _q(SB.from('lotes').select('nome,area,geom').order('nome')); if(error) throw error; LOTES=l||[]; _cacheSet('lotes',LOTES); }catch(e){ LOTES=_cacheGet('lotes',[]); }
  await carregarSafra();
  // operador salvo no aparelho?
  let oid=null; try{ oid=+localStorage.getItem('campo_oper')||null; }catch(e){}
  OPER = oid? (FUNCS.find(f=>f.id===oid)||null) : null;
  if(OPER){ await carregarDia(); STEP='home'; } else { STEP='quemsou'; }
  render();
  _updPend(); if(navigator.onLine) _syncAll().then(async()=>{ if(OPER){ await carregarDia(); if(STEP==='home') render(); } });
}
window.addEventListener('online', async()=>{ if(!SB||!OPER) return; _st('🔄 Sincronizando…','#3498db'); await _syncAll(); await carregarDia(); if(STEP==='home') render(); else _updPend(); _st('✅ Sincronizado','#27ae60'); });
async function carregarSafra(){
  let safras=null; try{ if(!navigator.onLine) throw 0; const {data,error}=await _q(SB.from('safras').select('*')); if(error) throw error; safras=data||[]; _cacheSet('safras',safras); }catch(e){ safras=_cacheGet('safras',[]); }
  const h=hoje();
  let s=safras.find(x=>x.inicio&&x.fim&&x.inicio<=h&&h<=x.fim);
  if(!s) s=safras.slice().sort((a,b)=>(b.ano||0)-(a.ano||0))[0];
  SAFRA=s?s.nome:(_cacheGet('safra','')||''); _cacheSet('safra',SAFRA);
  try{ if(!navigator.onLine) throw 0; const {data,error}=await _q(SB.from('comandas').select('*').eq('safra',SAFRA).neq('status','cancelada')); if(error) throw error; COMANDAS=data||[]; _cacheSet('comandas',COMANDAS);
    for(const c of COMANDAS){ if(c.status==='executada'){ try{ await _purgeComandaLocal(c.codigo); }catch(_){} } }   // admin finalizou -> limpa o local (só online, com o servidor confirmando)
  }catch(e){ COMANDAS=_cacheGet('comandas',[]); }
}
/* apaga do aparelho os dados JÁ SINCRONIZADOS de uma comanda finalizada (segurança: nunca apaga dirty/não-enviado) */
async function _purgeComandaLocal(codigo){
  try{ const ss=(await _idbAll('sessions')).filter(x=>String(x.comanda_codigo)===String(codigo)&&!x.dirty); for(const x of ss) await _idbDel('sessions',x.lid); }catch(e){}
  try{ const aa=(await _idbAll('abast')).filter(x=>String(x.comanda_codigo)===String(codigo)&&!x.dirty); for(const x of aa) await _idbDel('abast',x.lid); }catch(e){}
  try{ if(OPER&&OPER.id!=null) localStorage.removeItem('campo_cache_days_'+codigo+'_'+OPER.id); }catch(e){}
  try{ await _idbDel('pdfs', _pdfPath(codigo, SAFRA)); }catch(e){}
}
async function carregarDia(){
  if(!OPER) return;
  // execuções de hoje deste operador (só p/ marcar o status das comandas na lista)
  EXECS={}; let _srvDia=null;
  try{ if(!navigator.onLine) throw 0; const {data,error}=await _q(SB.from('execucao_campo').select('*').eq('funcionario_id',OPER.id).eq('data',DIA)); if(error) throw error; _srvDia=data||[]; _srvDia.forEach(x=>{ if(x.comanda_codigo) EXECS[x.comanda_codigo]=x; }); _cacheSet('execs_'+DIA,EXECS); }catch(e){ EXECS=_cacheGet('execs_'+DIA,{})||{}; }
  try{ let loc=(await _idbAll('sessions')).filter(s=>String(s.funcionario_id)===String(OPER.id)&&s.data===DIA); if(_srvDia!==null) loc=await _reconcile(loc,_srvDia); loc.forEach(s=>{ EXECS[s.comanda_codigo]=s; }); }catch(e){}   // sessões locais (offline) + remove descartadas pelo admin
}

/* ---------- comandas do operador ---------- */
function comandasDoOperador(){
  const base=COMANDAS.filter(c=>c.status!=='executada');   // aprovada/finalizada pelo admin some do tablet
  const desig=base.filter(c=>(c.operadores||[]).map(Number).includes(OPER.id));
  if(desig.length || !VERTODAS) return desig;
  return base.slice();
}

/* ===================== RENDER ===================== */
function render(){
  if(STEP==='login') return renderLogin();
  if(STEP==='quemsou') return renderQuemSou();
  if(STEP==='home') return renderHome();
  if(STEP==='exec') return EXVIEW==='trabalho'?renderTrabalho():renderExecMenu();
  if(STEP==='fim') return renderFim();
}
function _botoesSair(){ return '<button class="lk" id="sair">sair</button> <button class="lk" id="troca" style="margin-left:14px">trocar operador</button>'; }
function _bindSair(){ if($('sair'))$('sair').onclick=async()=>{ if(SB) await SB.auth.signOut(); location.reload(); }; if($('troca'))$('troca').onclick=()=>{ try{localStorage.removeItem('campo_oper');}catch(e){} OPER=null; STEP='quemsou'; render(); }; }

function renderLogin(){
  $('app').innerHTML=`<div class="top"><h1><span class="l">🚜</span> Campo</h1><div class="d">Alabama Agro</div></div>
    <div class="card"><label>E-mail</label><input id="e" type="email" autocomplete="username">
      <label style="margin-top:10px">Senha</label><input id="s" type="password" autocomplete="current-password">
      <button class="btn g" id="b">Entrar</button>
      <div id="msg" class="center" style="margin-top:10px;font-size:13px;min-height:16px"></div></div>`;
  $('b').onclick=login; $('s').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
}
function renderQuemSou(){
  const opts=FUNCS.map(f=>`<option value="${f.id}">${esc(f.nome)} (${TIPO[f.tipo]||f.tipo})</option>`).join('');
  $('app').innerHTML=`<div class="top"><h1><span class="l">👤</span> Quem é você?</h1><div class="d">Escolha o operador deste tablet (fica salvo no aparelho)</div></div>
    <div class="card"><label>Operador</label><select id="op"><option value="">— escolha —</option>${opts}</select>
      <button class="btn g" id="ok">Confirmar</button>
      <div class="hint">Isso identifica de quem são as comandas deste tablet. Você pode trocar depois em "trocar operador".</div></div>
    <div style="margin-top:8px">${_botoesSair()}</div>`;
  $('ok').onclick=async()=>{ const id=+$('op').value; if(!id){ _st('Escolha o operador.','#e67e22'); return; } OPER=FUNCS.find(f=>f.id===id); try{localStorage.setItem('campo_oper',String(id));}catch(e){} await carregarDia(); STEP='home'; render(); };
  _bindSair();
}
function renderHome(){
  const lista=comandasDoOperador();
  const desigCount=COMANDAS.filter(c=>(c.operadores||[]).map(Number).includes(OPER.id)).length;
  const cards=lista.map(c=>{

  HDROP=_donoHDR();   // o operador atual acabou de escolher nesta comanda -> o HDR é dele+desta comanda
  _saveConj(); _updConjSum();
  const nm=HDR.maquina_id, ni=HDR.implemento_id;
  if(SESS && String(SESS.maquina_id||'')===String(nm) && String(SESS.implemento_id||'')===String(ni) && +(SESS.largura_m||0)===+(HDR.largura_m||0)){ _VELC=null; _recalcCells(); _drawMapa(); _hud(); return; }
  if(!GPS.pts.length){   // nada pintado ainda: lazy cria a sessão no 1º ponto com o conjunto novo
    if(SESS){ SESS.maquina_id=nm?+nm:null; SESS.implemento_id=ni?+ni:null; SESS.largura_m=_widthM()||0; SESS.atualizado_em=new Date().toISOString(); SESS.dirty=true; SESS._v=(SESS._v||0)+1; try{ _idbPut('sessions',SESS); }catch(e){} if(navigator.onLine) _syncSession(SESS); _updPend(); }
    _VELC=null; _recalcCells(); _drawMapa(); _hud(); return;
  }
  // sessão com trabalho: PAUSA o GPS, fecha a anterior; a nova nasce no 1º ponto com o conjunto NOVO
  const tinhaWatch=GPS.watchId!=null;
  if(GPS.watchId!=null){ try{navigator.geolocation.clearWatch(GPS.watchId);}catch(e){} GPS.watchId=null; }
  (async()=>{
    if(SESS) await _saveGps(true);
    SESS=null; GPS.pts=[]; GPS.cells=new Set(); GPS.areaHa=0;   // a anterior vai p/ DAYSEGS; o desenho ativo zera
    await _carregarDiasComanda(); _buildDaySegs(); _VELC=null; _drawMapa(); _hud(); _st('Conjunto trocado — nova sessão começa ao mover','#27ae60');
    if(tinhaWatch){ try{ GPS.watchId=navigator.geolocation.watchPosition(_onFix,err=>_st('GPS: '+err.message,'#e67e22'),{enableHighAccuracy:true,maximumAge:0,timeout:15000}); }catch(e){} }
  })();
}
/* ===== conjunto (trator/implemento/largura): perdura entre entradas; obrigatório na 1ª vez ===== */
function _conjOK(){ return !!(HDR.maquina_id && HDR.implemento_id && +HDR.largura_m>0); }
function _donoHDR(){ return (OPER&&OPER.id)+'|'+(CUR&&CUR.codigo); }   // o conjunto perdura por OPERADOR + COMANDA (não vaza entre comandas)
function _remConj(){ try{ return JSON.parse(localStorage.getItem('conj_'+_donoHDR())||'null'); }catch(e){ return null; } }
function _saveConj(){ try{ if(OPER&&OPER.id&&CUR&&CUR.codigo) localStorage.setItem('conj_'+_donoHDR(), JSON.stringify({maquina_id:HDR.maquina_id||'', implemento_id:HDR.implemento_id||'', largura_m:+HDR.largura_m||0})); }catch(e){} }
function _setHDRde(s){ s=s||{}; HDR={ maquina_id:s.maquina_id!=null?s.maquina_id:'', implemento_id:s.implemento_id!=null?s.implemento_id:'', largura_m:(+s.largura_m>0?+s.largura_m:(_implLarg(s.implemento_id)||0)) }; HDROP=HDR.maquina_id?_donoHDR():null; }   // marca o dono (operador+comanda) do HDR
function _initHDR(){   // ordem de prioridade p/ o conjunto vigente do OPERADOR+COMANDA atuais (perdura — só zera de propósito)
  if(SESS && SESS.maquina_id!=null){ _setHDRde(SESS); return; }              // 1. sessão aberta de hoje (retomada)
  if(_conjOK() && HDROP===_donoHDR()) return;                                // 2. já escolhido por ESTE operador NESTA comanda -> NÃO mexe (não vaza de outro operador nem de outra comanda)
  const mine=CUR_DAYS.find(r=>String(r.funcionario_id)===String(OPER.id) && r.maquina_id!=null);   // 3. minha sessão COMPLETA mais recente DESTA comanda (CUR_DAYS é da comanda atual)
  _setHDRde(mine||_remConj()||{});                                           // 4. última escolha salva p/ ESTE operador+comanda (localStorage); senão vazio -> modal obrigatório
}
function _pedirConjunto(){
  const old=$('conjov'); if(old) old.remove();
  const maqOpt=`<option value="">— escolha o trator —</option>`+MAQS.map(m=>`<option value="${m.id}" ${String(HDR.maquina_id)===String(m.id)?'selected':''}>${esc(m.nome)}</option>`).join('');
  const impOpt=`<option value="">— escolha o implemento —</option>`+IMPS.map(m=>`<option value="${m.id}" ${String(HDR.implemento_id)===String(m.id)?'selected':''}>${esc(m.nome)}${m.largura_trabalho?(' · '+m.largura_trabalho+'m'):''}</option>`).join('');
  const ov=document.createElement('div'); ov.id='conjov';
  ov.style.cssText='position:fixed;inset:0;z-index:1200;background:#0d1117ee;display:flex;align-items:center;justify-content:center;padding:18px';
  ov.innerHTML=`<div class="card" style="width:100%;max-width:440px;margin:0">
    <div style="font-size:19px;font-weight:900;margin-bottom:4px">🚜 Conjunto de trabalho</div>
    <div class="hint" style="margin:0 0 12px">Escolha o trator, o implemento e a largura de faixa. Fica salvo — só muda quando você tocar em 🔄 Trocar conjunto.</div>
    <label>Trator / máquina</label><select id="cj_maq">${maqOpt}</select>
    <div style="height:10px"></div>
    <label>Implemento</label><select id="cj_imp">${impOpt}</select>
    <div style="height:10px"></div>
    <label>Largura de faixa (m)</label><input id="cj_larg" type="number" inputmode="decimal" step="0.1" min="0" value="${HDR.largura_m||''}" placeholder="ex.: 6.5">
    <button class="btn g" id="cj_ok" style="margin-top:16px">Confirmar e trabalhar</button>
    <button class="btn s" id="cj_back" style="margin-top:8px">Voltar às comandas</button>
  </div>`;
  document.body.appendChild(ov);
  const upd=()=>{ const m=$('cj_maq').value, i=$('cj_imp').value, l=num($('cj_larg').value); $('cj_ok').disabled=!(m&&i&&l>0); };
  $('cj_imp').onchange=()=>{ const i=$('cj_imp').value, lf=$('cj_larg'); if((!num(lf.value)||num(lf.value)<=0) && _implLarg(i)>0) lf.value=_implLarg(i); upd(); };
  $('cj_maq').onchange=upd; $('cj_larg').oninput=upd; upd();
  $('cj_back').onclick=async()=>{ ov.remove(); await _gpsLeave(); EXVIEW='menu'; render(); };
  $('cj_ok').onclick=()=>{ const m=$('cj_maq').value, i=$('cj_imp').value, l=num($('cj_larg').value)||0; if(!(m&&i&&l>0)) return;
    HDR.maquina_id=m; HDR.implemento_id=i; HDR.largura_m=l;
    ov.remove(); _aplicarConjunto();   // aplica (fecha sessão antiga se já tinha trabalho) + salva + redesenha
  };
}
let _gestBound=null;
function _bindGestures(cv){ if(_gestBound===cv) return; _gestBound=cv;
  let mode=null,startD=1,startZoom=1,lx=0,ly=0,tx=0,ty=0,moved=0,tapTS=0;
  const dist=ts=>Math.hypot(ts[0].clientX-ts[1].clientX, ts[0].clientY-ts[1].clientY);
  cv.addEventListener('touchstart',e=>{ if(e.touches.length>=2){ mode='pinch'; startD=dist(e.touches)||1; startZoom=VIEW.zoom; } else { mode='pan'; lx=e.touches[0].clientX; ly=e.touches[0].clientY; tx=lx; ty=ly; moved=0; } },{passive:false});
  cv.addEventListener('touchmove',e=>{ e.preventDefault();
    if(mode==='pinch'&&e.touches.length>=2){ VIEW.zoom=Math.max(0.3,Math.min(25,startZoom*dist(e.touches)/startD)); _scheduleDraw(); }
    else if(mode==='pan'&&e.touches.length===1&&VIEW.cx!=null){ const t=e.touches[0],sc=_sc()||1; moved+=Math.abs(t.clientX-lx)+Math.abs(t.clientY-ly); VIEW.cx-=(t.clientX-lx)/sc; VIEW.cy+=(t.clientY-ly)/sc; lx=t.clientX; ly=t.clientY; VIEW.follow=false; const b=$('btn_follow'); if(b) b.textContent='✋ Livre'; _scheduleDraw(); }
  },{passive:false});
  cv.addEventListener('touchend',e=>{ if(mode==='pan'&&moved<8){ tapTS=Date.now(); _mapTap(tx,ty); } mode=null; },{passive:false});
  cv.addEventListener('click',e=>{ if(Date.now()-tapTS<600) return; _mapTap(e.clientX,e.clientY); });   // desktop (ignora o click sintético pós-toque)
}
function renderTrabalho(){
  const c=CUR; const manual=!GPS.paintAuto;
  $('app').innerHTML=`<div style="position:fixed;inset:0;display:flex;flex-direction:column;background:#0a0f18">
    <div style="flex:0 0 auto;display:flex;gap:8px;align-items:center;padding:8px 10px;background:#0d1117">
      <button class="btn s" id="voltar" style="width:auto;margin:0;padding:8px 14px">◀</button>
      <div style="flex:1;min-width:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis"><b>${esc(c.codigo)}</b> <span class="muted" style="font-size:13px">${esc(c.lote_nome||'')}</span></div>
    </div>
    <div style="flex:0 0 auto;display:flex;gap:8px;align-items:center;padding:6px 10px;background:#0d1117">
      <div id="conj_sum" style="flex:1;min-width:0;font-size:14px;line-height:1.2;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${_conjResumo()}</div>
      <button class="btn s" id="btn_conj" style="width:auto;margin:0;padding:9px 14px;white-space:nowrap">🔄 Trocar conjunto</button>
    </div>
    <div style="flex:1;position:relative;min-height:0">
      <canvas id="cv" style="width:100%;height:100%;display:block;touch-action:none"></canvas>
      <div id="hud" style="position:absolute;top:8px;left:8px;right:8px;display:flex;gap:6px;flex-wrap:wrap"></div>
      <div style="position:absolute;right:10px;bottom:10px;display:flex;flex-direction:column;gap:8px;align-items:flex-end">
        <button class="btn s" id="btn_follow" style="width:auto;margin:0;padding:10px 14px">${VIEW.follow?'🎯 Seguindo':'✋ Livre'}</button>
        <button class="btn s" id="btn_cmode" style="width:auto;margin:0;padding:10px 14px">${(VIEW.mode==='vel')?'🌡 Velocidade':'🎨 Cobertura'}</button>
        <button class="btn s" id="btn_pmode" style="width:auto;margin:0;padding:10px 14px">${manual?'✋ Manual':'🅰 Auto'}</button>
        ${manual?`<button class="btn ${GPS.painting?'k':'b'}" id="btn_paint" style="width:auto;margin:0;padding:10px 16px">${GPS.painting?'● Pintando':'▶ Pintar'}</button>`:''}
      </div>
      <div id="vleg" style="display:${(VIEW.mode==='vel')?'flex':'none'};position:absolute;left:10px;bottom:10px;gap:8px;align-items:center;background:#0d1117cc;border-radius:8px;padding:6px 9px;font-size:11px;color:#fff">Vel: <span style="color:#3aa0ff">baixa</span><span style="width:54px;height:8px;border-radius:4px;background:linear-gradient(90deg,hsl(240,85%,50%),hsl(120,85%,50%),hsl(0,85%,50%))"></span><span style="color:#ff5b5b">alta</span></div>
      <div id="cleg" style="display:${(VIEW.mode==='vel')?'none':'flex'};position:absolute;left:10px;bottom:10px;gap:10px;align-items:center;background:#0d1117cc;border-radius:8px;padding:6px 9px;font-size:11px;color:#fff"><span style="color:#ffd24a">▮ eu hoje</span><span style="color:#58a6ff">▮ eu (out. dias)</span><span style="color:#bc8cff">▮ outro operador</span></div>
      ${_polyUTM()?'':'<div style="position:absolute;bottom:46px;left:10px;background:#3a1d00;color:#ffc107;border-radius:8px;padding:6px 10px;font-size:12px">Talhão sem poligonal</div>'}
    </div>
  </div>`;
  if($('voltar'))$('voltar').onclick=async()=>{ await _gpsLeave(); EXVIEW='menu'; render(); };
  if($('btn_conj'))$('btn_conj').onclick=()=>_pedirConjunto();
  if($('btn_follow'))$('btn_follow').onclick=()=>{ VIEW.follow=!VIEW.follow; $('btn_follow').textContent=VIEW.follow?'🎯 Seguindo':'✋ Livre'; _drawMapa(); };
  if($('btn_cmode'))$('btn_cmode').onclick=()=>{ VIEW.mode=(VIEW.mode==='vel')?'cob':'vel'; $('btn_cmode').textContent=(VIEW.mode==='vel')?'🌡 Velocidade':'🎨 Cobertura'; const lg=$('vleg'); if(lg) lg.style.display=(VIEW.mode==='vel')?'flex':'none'; const cg=$('cleg'); if(cg) cg.style.display=(VIEW.mode==='vel')?'none':'flex'; _drawMapa(); };
  if($('btn_pmode'))$('btn_pmode').onclick=()=>{ GPS.paintAuto=!GPS.paintAuto; if(GPS.paintAuto) GPS.painting=false; render(); };
  if($('btn_paint'))$('btn_paint').onclick=()=>{ GPS.painting=!GPS.painting; render(); };
  setTimeout(()=>{ _setupCanvas(); _drawMapa(); _hud(); if(!_conjOK()) _pedirConjunto(); },30);   // 1ª vez (ou conjunto incompleto): janela obrigatória de escolha
}
async function concluirLote(){
  const today=CUR_DAYS.filter(r=>r.data===DIA && String(r.funcionario_id)===String(OPER.id) && (r.hora_fim || (Array.isArray(r.trajeto)&&r.trajeto.length) || r.area_ha));   // só as MINHAS de hoje
  if(!today.length){ _st('Sem sessão com trabalho hoje — abra a Tela de trabalho.','#e67e22'); return; }
  if(!confirm('Concluir o lote e enviar a comanda para aprovação?')) return;
  for(let k=0;k<today.length;k++){ const r=await _ensureLocal(today[k]); r.status='enviada'; if(!r.hora_fim) r.hora_fim=nowHM(); if(k===today.length-1) r.concluiu_lote=true; r.dirty=true; r.atualizado_em=new Date().toISOString(); try{ await _idbPut('sessions',r); }catch(e){} await _syncSession(r); }
  _updPend(); STEP='fim'; render();
}
function renderFim(){
  $('app').innerHTML=`<div class="center" style="margin-top:46px">
    <div class="big">✅</div>
    <h1 style="font-size:24px;margin:10px 0">Comanda enviada</h1>
    <div class="muted">${esc(CUR.codigo)} · lote ${esc(CUR.lote_nome||'')}</div>
    <div class="muted" style="font-size:14px;margin-top:8px">Lote concluído e enviado para aprovação do administrador.</div>
    <button class="btn g huge" id="volta" style="max-width:340px;margin:24px auto 0">Voltar às comandas</button>
  </div>`;
  $('volta').onclick=async()=>{ STEP='home'; await carregarDia(); render(); };
}

/* mantém a tela ligada e salva quando o app volta/ sai (campo: troca de app, tela apaga) */
document.addEventListener('visibilitychange',()=>{ if(GPS.watchId==null) return;
  if(document.visibilityState==='visible'){ if(navigator.wakeLock) navigator.wakeLock.request('screen').then(w=>GPS.wake=w).catch(()=>{}); }
  else { _saveGps(false); } });
window.addEventListener('pagehide',()=>{ if(GPS.watchId!=null) _saveGps(false); });
window.addEventListener('load',()=>{ setTimeout(boot,150); });
</script>
